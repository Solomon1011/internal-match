
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💘 Complete Your Profile</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">
  <h1>💘 Internal Match - Profile Setup</h1>

  <!-- Profile Picture -->
  <div style="text-align:center; margin-bottom:20px;">
    <img id="profilePicPreview" src="https://randomuser.me/api/portraits/lego/1.jpg" 
         style="width:120px;height:120px;border-radius:50%; display:block; margin:auto;">
    <input type="file" id="profilePicInput" accept="image/*" style="margin-top:10px;">
  </div>

  <!-- Profile Info Form -->
  <input type="text" id="username" placeholder="Username"><br>
  <input type="number" id="age" placeholder="Age"><br>
  <input type="text" id="location" placeholder="Location"><br>
  <select id="gender">
    <option value="">Select Gender</option>
    <option value="Male">Male</option>
    <option value="Female">Female</option>
  </select><br>
  
  <select id="interest">
    <option value="">Select Interest</option>
    <option value="Friends 💚">Friends 💚</option>
    <option value="Hangout 🩵">Hangout 🩵</option>
    <option value="Serious Relationship 💖">Serious Relationship 💖</option>
    <option value="Marriage 💘">Marriage 💘</option>
  </select><br>

  <button onclick="saveProfile()">💾 Save Profile</button>
</div>

<script>
const profilePicInput = document.getElementById('profilePicInput');
const profilePicPreview = document.getElementById('profilePicPreview');

// Preview selected image and store as Base64
let profilePicData = profilePicPreview.src;

profilePicInput.addEventListener('change', function(event){
  const file = event.target.files[0];
  if(file){
    const reader = new FileReader();
    reader.onload = function(e){
      profilePicPreview.src = e.target.result;
      profilePicData = e.target.result; // store Base64 for saving
    }
    reader.readAsDataURL(file);
  }
});

function saveProfile(){
  const username = document.getElementById('username').value.trim();
  const age = document.getElementById('age').value.trim();
  const location = document.getElementById('location').value.trim();
  const gender = document.getElementById('gender').value;
  const interest = document.getElementById('interest').value;

  if(!username || !age || !location || !gender || !interest){
    alert("Please fill all fields!");
    return;
  }

  // Save all data to localStorage
  const userProfile = {
    username,
    age,
    location,
    gender,
    interest,
    profilePic: profilePicData
  };
  localStorage.setItem("userProfile", JSON.stringify(userProfile));

  alert("Profile saved successfully!");
  window.location.href = "dashboard.html"; // redirect to dashboard
}
</script>

</body>
</html>
