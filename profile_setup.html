<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Profile Setup - 💘 Internal Match</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>Profile Setup</h2>

<form id="profileForm">

<input type="text" id="displayName" placeholder="Your Name" required>

<input type="text" id="bio" placeholder="Short Bio" required>

<button type="submit">Save Profile</button>

</form>

<script type="module">

import { checkAuth } from "./app.js";

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.6.1/firebase-app.js";

import {
getFirestore,
doc,
setDoc
} from "https://www.gstatic.com/firebasejs/10.6.1/firebase-firestore.js";


// Firebase config
const firebaseConfig = {

apiKey: "AIzaSyDIZnZjeCROX5UmcqUQIfTdt6oRU6AmvOg",

authDomain: "internal-match.firebaseapp.com",

projectId: "internal-match",

storageBucket: "internal-match.appspot.com",

messagingSenderId: "129707008837",

appId: "1:129707008837:web:f3f0033bbbe673107a542c"

};


// Initialize Firebase
const app = initializeApp(firebaseConfig);

const db = getFirestore(app);


// Protect page (must be logged in)
checkAuth((user)=>{

if(!user){

window.location.href="login.html";

}

});


// Save profile
document.getElementById("profileForm").addEventListener("submit", async (e)=>{

e.preventDefault();

const name = document.getElementById("displayName").value;

const bio = document.getElementById("bio").value;

checkAuth(async (user)=>{

if(user){

await setDoc(doc(db,"users",user.uid),{

name:name,

bio:bio,

email:user.email

});

alert("Profile saved!");

window.location.href="dashboard.html";

}

});

});

</script>

</body>
</html>
