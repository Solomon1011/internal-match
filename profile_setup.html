<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile Setup - 💘 Internal Match</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Profile Setup</h2>

<form id="profileForm">
  <input type="text" id="displayName" placeholder="Display Name"><br>
  <input type="text" id="bio" placeholder="Short Bio"><br>
  <button type="submit">Save Profile</button>
</form>

<script type="module">
import { checkAuth, updateUserProfile } from "./app.js";

checkAuth(user => {
  if (!user) window.location.href = "login.html";
  else document.getElementById("displayName").value = user.displayName || "";
});

document.getElementById("profileForm").addEventListener("submit", async e => {
  e.preventDefault();
  const name = document.getElementById("displayName").value.trim();
  await updateUserProfile({ displayName: name });
  alert("Profile updated!");
});
</script>

</body>
</html>
