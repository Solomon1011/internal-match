<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Internal Match - Profile</title>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:#1c1c1c;
padding:25px;
border-radius:20px;
width:90%;
max-width:400px;
text-align:center;
}

h2{
margin-bottom:20px;
}

#profilePic{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
margin-bottom:10px;
}

input{
width:90%;
padding:12px;
margin:8px;
border-radius:12px;
border:none;
font-size:16px;
}

button{
background:gold;
border:none;
padding:12px 25px;
border-radius:25px;
font-size:16px;
font-weight:bold;
margin-top:10px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="card">

<h2>My Profile</h2>

<img id="profilePic" src="https://randomuser.me/api/portraits/lego/1.jpg">

<br>

<input type="file" id="profileUpload" accept="image/*">

<br>

<input id="name" placeholder="Your Name">

<input id="age" type="number" placeholder="Age">

<input id="country" placeholder="Country">

<button onclick="saveProfile()">Save Profile</button>

</div>

<script>

/* -------- Profile Picture Upload -------- */

const upload = document.getElementById("profileUpload")
const profilePic = document.getElementById("profilePic")

upload.addEventListener("change", function(){

const file = this.files[0]

if(!file) return

const reader = new FileReader()

reader.onload = function(e){

profilePic.src = e.target.result

localStorage.setItem("profilePic", e.target.result)

}

reader.readAsDataURL(file)

})

/* -------- Save Profile -------- */

function saveProfile(){

const name = document.getElementById("name").value
const age = document.getElementById("age").value
const country = document.getElementById("country").value

if(!name || !age || !country){

alert("Please fill all fields")

return

}

localStorage.setItem("name", name)
localStorage.setItem("age", age)
localStorage.setItem("country", country)

alert("Profile Saved Successfully!")

}

/* -------- Load Profile -------- */

window.onload = function(){

const savedName = localStorage.getItem("name")
const savedAge = localStorage.getItem("age")
const savedCountry = localStorage.getItem("country")
const savedPic = localStorage.getItem("profilePic")

if(savedName){
document.getElementById("name").value = savedName
}

if(savedAge){
document.getElementById("age").value = savedAge
}

if(savedCountry){
document.getElementById("country").value = savedCountry
}

if(savedPic){
document.getElementById("profilePic").src = savedPic
}

}

</script>

</body>
</html>
