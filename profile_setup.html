<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Profile</title>

<style>

body{
background:#111;
font-family:Arial;
margin:0;
color:white;
}

.container{
width:90%;
max-width:420px;
margin:auto;
padding-top:30px;
}

.profile-card{
background:#1c1c1c;
border-radius:25px;
padding:20px;
text-align:center;
}

.profile-card img{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
border:3px solid gold;
}

.name{
font-size:24px;
font-weight:bold;
margin-top:10px;
}

.info{
margin-top:8px;
color:#ccc;
}

.edit-btn{
background:gold;
border:none;
padding:10px 20px;
border-radius:25px;
font-weight:bold;
margin-top:15px;
cursor:pointer;
}

.edit-form{
margin-top:20px;
display:none;
}

input{
width:90%;
padding:12px;
margin:6px;
border-radius:12px;
border:none;
}

</style>
</head>

<body>

<div class="container">

<div class="profile-card">

<img id="profilePic" src="https://randomuser.me/api/portraits/lego/1.jpg">

<div class="name" id="displayName">Your Name</div>

<div class="info" id="displayAge">Age</div>

<div class="info" id="displayCountry">Country</div>

<button class="edit-btn" onclick="toggleEdit()">Edit Profile</button>

</div>

<div class="edit-form" id="editForm">

<input type="file" id="photoInput" accept="image/*">

<input id="nameInput" placeholder="Your Name">

<input id="ageInput" type="number" placeholder="Age">

<input id="countryInput" placeholder="Country">

<button class="edit-btn" onclick="saveProfile()">Save Profile</button>

</div>

</div>

<script>

const profilePic = document.getElementById("profilePic")
const photoInput = document.getElementById("photoInput")

/* Upload photo */

photoInput.addEventListener("change", function(){

const file = this.files[0]

if(!file) return

const reader = new FileReader()

reader.onload = function(e){

profilePic.src = e.target.result

localStorage.setItem("profilePic", e.target.result)

}

reader.readAsDataURL(file)

})

/* Toggle edit form */

function toggleEdit(){

const form = document.getElementById("editForm")

form.style.display = form.style.display === "none" ? "block" : "none"

}

/* Save profile */

function saveProfile(){

const name = document.getElementById("nameInput").value
const age = document.getElementById("ageInput").value
const country = document.getElementById("countryInput").value

if(!name || !age || !country){

alert("Fill all fields")

return

}

localStorage.setItem("name", name)
localStorage.setItem("age", age)
localStorage.setItem("country", country)

loadProfile()

alert("Profile updated!")

}

/* Load profile */

function loadProfile(){

const name = localStorage.getItem("name")
const age = localStorage.getItem("age")
const country = localStorage.getItem("country")
const pic = localStorage.getItem("profilePic")

if(name){
document.getElementById("displayName").innerText = name
}

if(age){
document.getElementById("displayAge").innerText = "Age: " + age
}

if(country){
document.getElementById("displayCountry").innerText = country
}

if(pic){
profilePic.src = pic
}

}

loadProfile()

</script>

</body>
</html>
