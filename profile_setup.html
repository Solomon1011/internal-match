<!DOCTYPE html>
<html>
<head>
  <title>Profile Setup</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">
  <h2>Complete Your Profile</h2>

  <input type="text" id="username" placeholder="Username"><br>
  <input type="number" id="age" placeholder="Age"><br>
  <input type="text" id="location" placeholder="Location"><br>

  <select id="gender">
    <option value="">Select Gender</option>
    <option value="Male">Male</option>
    <option value="Female">Female</option>
  </select><br>

  <input type="text" id="interest" placeholder="Interest"><br>

  <!-- Upload from gallery -->
  <input type="file" id="profilePic" accept="image/*"><br><br>

  <button onclick="saveProfile()">Save & Continue</button>
</div>

<script>
function saveProfile() {
  const username = document.getElementById("username").value;
  const age = document.getElementById("age").value;
  const location = document.getElementById("location").value;
  const gender = document.getElementById("gender").value;
  const interest = document.getElementById("interest").value;
  const fileInput = document.getElementById("profilePic");

  if (!username || !age || !location || !gender || !interest) {
    alert("Please fill all fields");
    return;
  }

  const reader = new FileReader();

  reader.onload = function() {
    const profileData = {
      username,
      age,
      location,
      gender,
      interest,
      profilePic: reader.result
    };

    localStorage.setItem("userProfile", JSON.stringify(profileData));

    window.location.href = "dashboard.html";
  };

  if (fileInput.files[0]) {
    reader.readAsDataURL(fileInput.files[0]);
  } else {
    alert("Please upload a profile picture");
  }
}
</script>

</body>
</html>
