<!DOCTYPE html>
<html>
<head>
  <title>Profile Setup / Edit</title>
  <style>
    body { background-color:#1a1a1a; color:#f5d061; font-family:Arial, sans-serif; padding:20px; text-align:center; }
    input, select, button { display:block; margin:10px auto; padding:10px; width:80%; border-radius:5px; border:1px solid #f5d061; background:#111; color:#f5d061; }
    button { background:#f5d061; color:#1a1a1a; border:none; cursor:pointer; }
    img { max-width:120px; border-radius:50%; margin:10px 0; border:2px solid #f5d061; }
  </style>
</head>
<body>

<h2>Set Up / Edit Your Profile</h2>

<img id="profile-preview" src="" alt="Profile Picture" style="display:none;">

<input type="text" id="username" placeholder="Username">
<input type="number" id="age" placeholder="Age">
<input type="text" id="location" placeholder="Location">

<select id="gender">
  <option value="">Select Gender</option>
  <option value="Male">Male</option>
  <option value="Female">Female</option>
  <option value="Other">Other</option>
</select>

<select id="interest">
  <option value="">What are you interested in?</option>
  <option value="Hangout 🩵">Hangout 🩵</option>
  <option value="Friends 💚">Friends 💚</option>
  <option value="Serious Relationship 💖">Serious Relationship 💖</option>
  <option value="Marriage 💘">Marriage 💘</option>
</select>

<label>Profile Picture:</label>
<input type="file" id="profile-pic">
<button onclick="saveProfile()">Save Profile</button>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDIZnZjeCROX5UmcqUQIfTdt6oRU6AmvOg",
  authDomain: "internal-match.firebaseapp.com",
  projectId: "internal-match",
  storageBucket: "internal-match.appspot.com",
  messagingSenderId: "129707008837",
  appId: "1:129707008837:web:f3f0033bbbe673107a542c"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();

let currentUser = null;

// Check auth
auth.onAuthStateChanged(user=>{
  if(!user) return window.location.href="index.html";
  currentUser = user;
  loadProfile();
});

// Load existing profile if any
function loadProfile(){
  db.collection('users').doc(currentUser.uid).get().then(doc=>{
    if(doc.exists){
      const data = doc.data();
      if(data.username) document.getElementById('username').value = data.username;
      if(data.age) document.getElementById('age').value = data.age;
      if(data.location) document.getElementById('location').value = data.location;
      if(data.gender) document.getElementById('gender').value = data.gender;
      if(data.interest) document.getElementById('interest').value = data.interest;
      if(data.profilePic){
        const img = document.getElementById('profile-preview');
        img.src = data.profilePic;
        img.style.display = 'block';
      }
    }
  });
}

// Save or update profile
function saveProfile(){
  const username = document.getElementById('username').value.trim();
  const age = document.getElementById('age').value.trim();
  const location = document.getElementById('location').value.trim();
  const gender = document.getElementById('gender').value;
  const interest = document.getElementById('interest').value;
  const profilePicFile = document.getElementById('profile-pic').files[0];

  if(!username || !age || !location || !gender || !interest){
    return alert("Please fill all fields!");
  }

  const userRef = db.collection('users').doc(currentUser.uid);

  // If user selects a new profile picture
  if(profilePicFile){
    const storageRef = storage.ref().child(`profile-pictures/${currentUser.uid}`);
    storageRef.put(profilePicFile).then(snapshot=>{
      snapshot.ref.getDownloadURL().then(url=>{
        userRef.update({
          username, age: parseInt(age), location, gender, interest, profilePic: url
        }).then(()=> {
          alert("Profile saved!");
          window.location.href="dashboard.html";
        });
      });
    }).catch(err=>alert(err.message));
  } else {
    // No new profile picture, just update other fields
    userRef.update({username, age: parseInt(age), location, gender, interest})
      .then(()=> {
        alert("Profile saved!");
        window.location.href="dashboard.html";
      })
      .catch(err=>alert(err.message));
  }
}
</script>
</body>
</html>
