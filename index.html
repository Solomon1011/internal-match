
<!DOCTYPE html>
<html>
<head>
  <title>Internal Match Login</title>
  <style>
    body { background:#1a1a1a; color:#f5d061; font-family:Arial; text-align:center; padding:30px; }
    input, button { display:block; margin:10px auto; padding:10px; width:80%; border-radius:5px; border:1px solid #f5d061; background:#111; color:#f5d061; }
    button { cursor:pointer; background:#f5d061; color:#1a1a1a; border:none; }
  </style>
</head>
<body>

<h2>💘 Internal Match</h2>

<h3>Login</h3>
<input type="email" id="login-email" placeholder="Email">
<input type="password" id="login-password" placeholder="Password">
<button onclick="login()">Login</button>

<h3>Signup</h3>
<input type="email" id="signup-email" placeholder="Email">
<input type="password" id="signup-password" placeholder="Password">
<button onclick="signup()">Sign Up</button>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDIZnZjeCROX5UmcqUQIfTdt6oRU6AmvOg",
  authDomain: "internal-match.firebaseapp.com",
  projectId: "internal-match",
  storageBucket: "internal-match.appspot.com",
  messagingSenderId: "129707008837",
  appId: "1:129707008837:web:f3f0033bbbe673107a542c"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// LOGIN
function login(){
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  if(!email || !password) return alert("Fill all login fields!");
  
  auth.signInWithEmailAndPassword(email,password)
    .then(res=>checkProfile(res.user.uid))
    .catch(err=>alert(err.message));
}

// SIGNUP
function signup(){
  const email = document.getElementById('signup-email').value.trim();
  const password = document.getElementById('signup-password').value;
  if(!email || !password) return alert("Fill all signup fields!");
  
  auth.createUserWithEmailAndPassword(email,password)
    .then(res=>{
      // Create user doc in Firestore
      db.collection('users').doc(res.user.uid).set({coins:10,premium:false})
      .then(()=>checkProfile(res.user.uid));
    })
    .catch(err=>alert(err.message));
}

// Check if profile is complete
function checkProfile(uid){
  db.collection('users').doc(uid).get().then(doc=>{
    const data = doc.data();
    // If no username or profilePic, redirect to profile setup
    if(!data.username || !data.profilePic){
      window.location.href = "profile_setup.html";
    } else {
      window.location.href = "dashboard.html";
    }
  });
}

// Redirect already logged-in user
auth.onAuthStateChanged(user=>{
  if(user) checkProfile(user.uid);
});
</script>

</body>
</html>
