<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💘 Internal Match - Login</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="login-container">
  <h2>💘 Internal Match</h2>

  <div id="login">
    <input type="email" id="loginEmail" placeholder="Email">
    <input type="password" id="loginPass" placeholder="Password">
    <button onclick="login()">Login</button>
    <p onclick="showSignup()">Create account</p>
  </div>

  <div id="signup" style="display:none;">
    <input type="email" id="signEmail" placeholder="Email">
    <input type="password" id="signPass" placeholder="Password">
    <button onclick="signup()">Sign Up</button>
    <p onclick="showLogin()">Already have an account?</p>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
