
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dating App</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f5f5f5;
}

/* TOP NAV */
.nav{
    display:flex;
    justify-content:space-around;
    background:#111;
    color:white;
    padding:12px;
}
.nav button{
    background:none;
    border:none;
    color:white;
    font-size:16px;
}

/* SECTIONS */
.section{ display:none; padding:15px; }
.active{ display:block; }

/* PROFILE CARD */
.profile-card{
    background:white;
    border-radius:15px;
    padding:15px;
    margin-bottom:15px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.profile-card img{
    width:100%;
    border-radius:12px;
}

.profile-card h3{
    margin:10px 0 5px;
}

.message-btn{
    background:#25D366;
    color:white;
    border:none;
    padding:8px 15px;
    border-radius:20px;
}

/* CHAT LIST */
.chat-item{
    display:flex;
    align-items:center;
    background:white;
    padding:10px;
    border-radius:12px;
    margin-bottom:10px;
}
.chat-item img{
    width:50px;
    height:50px;
    border-radius:50%;
    margin-right:10px;
}
.chat-item span{
    font-weight:bold;
}

/* CHAT BOX */
.chat-box{
    background:white;
    border-radius:15px;
    padding:10px;
    height:300px;
    overflow-y:auto;
    margin-bottom:10px;
}
.message{
    margin:5px 0;
}
.me{
    text-align:right;
    color:green;
}

/* PROFILE EDIT */
.profile-edit{
    background:white;
    padding:20px;
    border-radius:15px;
}
.profile-edit img{
    width:120px;
    height:120px;
    border-radius:50%;
    display:block;
    margin:auto;
    object-fit:cover;
}
input{
    width:100%;
    padding:8px;
    margin:5px 0;
}
.save-btn{
    background:#111;
    color:white;
    border:none;
    padding:10px;
    border-radius:10px;
    width:100%;
}
</style>
</head>

<body>

<div class="nav">
    <button onclick="showSection('home')">Home</button>
    <button onclick="showSection('chat')">Chat</button>
    <button onclick="showSection('profile')">Profile</button>
</div>

<!-- HOME -->
<div id="home" class="section active"></div>

<!-- CHAT -->
<div id="chat" class="section">
    <div id="chatList"></div>
    <div id="chatArea" style="display:none;">
        <h3 id="chatName"></h3>
        <div class="chat-box" id="messages"></div>
        <input id="messageInput" placeholder="Type message">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<!-- PROFILE -->
<div id="profile" class="section">
    <div class="profile-edit">
        <img id="myPhoto" src="https://randomuser.me/api/portraits/men/1.jpg">
        <input type="file" accept="image/*" capture="camera" onchange="changePhoto(event)">
        <input id="myName" placeholder="Your Name">
        <input id="myAge" placeholder="Your Age">
        <button class="save-btn" onclick="saveProfile()">Save Profile</button>
    </div>
</div>

<script>

/* ---------- NAVIGATION ---------- */
function showSection(id){
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

/* ---------- DEMO PROFILES ---------- */
const profiles = [];
for(let i=1;i<=50;i++){
    profiles.push({
        name:"User "+i,
        age:18 + Math.floor(Math.random()*10),
        photo:`https://randomuser.me/api/portraits/${i%2==0?'men':'women'}/${i}.jpg`
    });
}

/* ---------- LOAD HOME ---------- */
const home = document.getElementById("home");

profiles.forEach((p,index)=>{
    const card = document.createElement("div");
    card.className="profile-card";
    card.innerHTML=`
        <img src="${p.photo}">
        <h3>${p.name}, ${p.age}</h3>
        <button class="message-btn" onclick="openChat(${index})">Message</button>
    `;
    home.appendChild(card);
});

/* ---------- CHAT SYSTEM ---------- */
let chats = {};
let currentChat = null;

function openChat(index){
    const person = profiles[index];
    currentChat = person.name;

    if(!chats[currentChat]){
        chats[currentChat] = [];
    }

    showSection('chat');
    document.getElementById("chatArea").style.display="block";
    document.getElementById("chatName").innerText=currentChat;

    renderChatList();
    renderMessages();
}

function renderChatList(){
    const chatList = document.getElementById("chatList");
    chatList.innerHTML="";
    Object.keys(chats).forEach(name=>{
        const item=document.createElement("div");
        item.className="chat-item";
        item.innerHTML=`
            <img src="https://randomuser.me/api/portraits/men/1.jpg">
            <span>${name}</span>
        `;
        item.onclick=()=>{
            currentChat=name;
            document.getElementById("chatArea").style.display="block";
            document.getElementById("chatName").innerText=name;
            renderMessages();
        }
        chatList.appendChild(item);
    });
}

function renderMessages(){
    const box=document.getElementById("messages");
    box.innerHTML="";
    chats[currentChat].forEach(m=>{
        const div=document.createElement("div");
        div.className="message "+(m.sender==="me"?"me":"");
        div.innerText=m.text;
        box.appendChild(div);
    });
}

function sendMessage(){
    const input=document.getElementById("messageInput");
    if(!input.value) return;
    chats[currentChat].push({sender:"me",text:input.value});
    input.value="";
    renderMessages();
}

/* ---------- PROFILE PHOTO ---------- */
function changePhoto(event){
    const reader=new FileReader();
    reader.onload=function(){
        document.getElementById("myPhoto").src=reader.result;
    }
    reader.readAsDataURL(event.target.files[0]);
}

function saveProfile(){
    alert("Profile Saved!");
}

</script>

</body>
</html>
