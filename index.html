<!DOCTYPE html>
<html>
<head>
<title>SoloLove Dating</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:white;
}

header{
  background:#000;
  padding:15px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
  color:#f5d061;
}

input, select{
  width:90%;
  padding:10px;
  margin:5px;
  border-radius:8px;
  border:none;
}

button{
  padding:10px 20px;
  border:none;
  border-radius:8px;
  background:#f5d061;
  font-weight:bold;
  cursor:pointer;
}

.nav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#000;
}

.nav button{
  flex:1;
  background:#000;
  color:#f5d061;
  border:none;
}

.card{
  background:#222;
  margin:15px;
  padding:15px;
  border-radius:15px;
  border:1px solid #f5d061;
}

.online{
  color:#00ff00;
  font-size:12px;
}

.profile-box{
  background:#222;
  padding:20px;
  border-radius:15px;
  text-align:center;
  margin:20px;
  border:1px solid #f5d061;
}

.profile-box img{
  width:140px;
  height:140px;
  border-radius:50%;
  object-fit:cover;
  border:3px solid #f5d061;
}

.chat-list{
  padding:10px;
}

.chat-item{
  padding:15px;
  border-bottom:1px solid #333;
  cursor:pointer;
}

.message-box{
  position:fixed;
  bottom:50px;
  width:100%;
  display:flex;
}

.message-box input{
  flex:1;
  margin:0;
  border-radius:0;
}

.message-box button{
  border-radius:0;
}
</style>
</head>

<body>

<header>SoloLove 💛</header>

<!-- LOGIN -->
<div id="login">
<center>
<h3>Login</h3>
<input id="loginEmail" placeholder="Email"><br>
<input id="loginPass" type="password" placeholder="Password"><br>
<button onclick="login()">Login</button>
<p onclick="showSignup()">Create account</p>
</center>
</div>

<!-- SIGNUP -->
<div id="signup" style="display:none;">
<center>
<h3>Sign Up</h3>
<input id="signEmail" placeholder="Email"><br>
<input id="signPass" type="password" placeholder="Password"><br>
<button onclick="signup()">Sign Up</button>
<p onclick="showLogin()">Already have account</p>
</center>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<!-- DISCOVER -->
<div id="discover">

<div class="card">
<img src="https://randomuser.me/api/portraits/women/44.jpg" width="100%">
<h3>Emily, 23</h3>
<p>USA</p>
<p>Music, Travel</p>
<p class="online">● Online</p>
<button onclick="startChat('Emily')">Message</button>
</div>

<div class="card">
<img src="https://randomuser.me/api/portraits/men/32.jpg" width="100%">
<h3>Daniel, 27</h3>
<p>UK</p>
<p>Football, Movies</p>
<p class="online">● Online</p>
<button onclick="startChat('Daniel')">Message</button>
</div>

</div>

<!-- CHAT -->
<div id="chat" style="display:none;">
<div class="chat-list" id="chatList"></div>
<div id="chatMessages" style="padding:15px;margin-bottom:80px;"></div>

<div class="message-box">
<input id="messageInput" placeholder="Type message">
<button onclick="sendMessage()">Send</button>
</div>
</div>

<!-- PROFILE -->
<div id="profile" style="display:none;">

<div class="profile-box">
<div style="position:relative;">
<img id="profilePic" src="https://randomuser.me/api/portraits/lego/1.jpg">

<label for="photoUpload"
style="position:absolute;bottom:0;right:0;
background:#f5d061;color:#000;
padding:8px;border-radius:50%;cursor:pointer;">
📷
</label>

<input type="file" id="photoUpload" accept="image/*" capture="environment" style="display:none;">
</div>

<br>
<input id="username" placeholder="Username"><br>
<input id="age" placeholder="Age"><br>
<input id="country" placeholder="Country"><br>
<input id="interest" placeholder="Interest"><br>
<button onclick="saveProfile()">Save</button>
</div>

</div>

<div class="nav">
<button onclick="showTab('discover')">Discover</button>
<button onclick="showTab('chat')">Chat</button>
<button onclick="showTab('profile')">Profile</button>
</div>

</div>

<script>

let currentChatUser = "";
let chats = {};

function showSignup(){
  document.getElementById("login").style.display="none";
  document.getElementById("signup").style.display="block";
}

function showLogin(){
  document.getElementById("signup").style.display="none";
  document.getElementById("login").style.display="block";
}

function signup(){
  document.getElementById("signup").style.display="none";
  document.getElementById("app").style.display="block";
}

function login(){
  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";
}

function showTab(tab){
  document.getElementById("discover").style.display="none";
  document.getElementById("chat").style.display="none";
  document.getElementById("profile").style.display="none";

  document.getElementById(tab).style.display="block";
}

function startChat(name){
  currentChatUser = name;
  showTab('chat');
  updateChatList();
}

function updateChatList(){
  let list = document.getElementById("chatList");
  list.innerHTML="";
  for(let user in chats){
    list.innerHTML += `<div class="chat-item" onclick="openChat('${user}')">${user}</div>`;
  }
}

function openChat(user){
  currentChatUser = user;
  displayMessages();
}

function sendMessage(){
  let msg = document.getElementById("messageInput").value;
  if(!msg) return;

  if(!chats[currentChatUser]){
    chats[currentChatUser]=[];
  }

  chats[currentChatUser].push("You: "+msg);
  document.getElementById("messageInput").value="";
  displayMessages();
  updateChatList();
}

function displayMessages(){
  let box = document.getElementById("chatMessages");
  box.innerHTML="";
  if(chats[currentChatUser]){
    chats[currentChatUser].forEach(m=>{
      box.innerHTML+=`<p>${m}</p>`;
    });
  }
}

function saveProfile(){
  alert("Profile Saved!");
}

document.getElementById("photoUpload").addEventListener("change",function(e){
  const file=e.target.files[0];
  if(file){
    const reader=new FileReader();
    reader.onload=function(ev){
      document.getElementById("profilePic").src=ev.target.result;
    };
    reader.readAsDataURL(file);
  }
});

</script>

</body>
</html>
