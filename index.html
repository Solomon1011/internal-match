<!DOCTYPE html>
<html>
<head>
  <title>Internal Match</title>
  <style>
    body { background:#1a1a1a; color:#f5d061; font-family:Arial; text-align:center; padding:20px; }
    input { display:block; margin:10px auto; padding:8px; width:80%; border-radius:5px; border:1px solid #f5d061; background:#111; color:#f5d061; }
    button { background:#f5d061; color:#1a1a1a; border:none; padding:10px 15px; margin:5px; cursor:pointer; border-radius:5px; }
  </style>
</head>
<body>

<h2>💘 Internal Match</h2>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<button onclick="signUp()">Sign Up</button>
<button onclick="login()">Login</button>
<br>
<button onclick="googleLogin()">Login with Google</button>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDIZnZjeCROX5UmcqUQIfTdt6oRU6AmvOg",
  authDomain: "internal-match.firebaseapp.com",
  projectId: "internal-match",
  storageBucket: "internal-match.firebasestorage.app",
  messagingSenderId: "129707008837",
  appId: "1:129707008837:web:f3f0033bbbe673107a542c"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// Sign Up
function signUp() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  auth.createUserWithEmailAndPassword(email, password)
    .then(() => {
      // Create basic user in Firestore with default coins/premium
      const user = auth.currentUser;
      db.collection("users").doc(user.uid).set({ coins: 10, premium: false });
      // Redirect to profile setup page
      window.location.href = "profile_setup.html";
    })
    .catch(err => alert(err.message));
}

// Login
function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email, password)
    .then(() => {
      window.location.href = "dashboard.html";
    })
    .catch(err => alert(err.message));
}

// Google Login
function googleLogin() {
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider)
    .then(result => {
      const user = result.user;
      // Create Firestore doc if new user
      db.collection("users").doc(user.uid).set({ coins: 10, premium: false }, { merge:true });
      window.location.href = "dashboard.html";
    })
    .catch(err => alert(err.message));
}
</script>
</body>
</html>
