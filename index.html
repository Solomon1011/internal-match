<!DOCTYPE html>
<html>
<head>
  <title>Internal Match</title>
  <style>
    body { background:#1a1a1a; color:#f5d061; font-family:Arial; text-align:center; padding:20px; }
    input, button { display:block; margin:10px auto; padding:10px; width:80%; border-radius:5px; border:1px solid #f5d061; background:#111; color:#f5d061; }
    button { cursor:pointer; background:#f5d061; color:#1a1a1a; border:none; }
  </style>
</head>
<body>

<h2>💘 Internal Match</h2>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<button onclick="signUp()">Sign Up</button>
<button onclick="login()">Login</button>
<button onclick="googleLogin()">Login with Google</button>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDIZnZjeCROX5UmcqUQIfTdt6oRU6AmvOg",
  authDomain: "internal-match.firebaseapp.com",
  projectId: "internal-match",
  storageBucket: "internal-match.appspot.com",
  messagingSenderId: "129707008837",
  appId: "1:129707008837:web:f3f0033bbbe673107a542c"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

function signUp(){
  const email=document.getElementById('email').value.trim();
  const password=document.getElementById('password').value.trim();
  if(!email||!password) return alert("Enter email and password");

  auth.createUserWithEmailAndPassword(email,password)
    .then(()=> {
      alert("Account Created!");
      window.location.href="profile_setup.html";
    })
    .catch(e=>alert(e.message));
}

function login(){
  const email=document.getElementById('email').value.trim();
  const password=document.getElementById('password').value.trim();
  if(!email||!password) return alert("Enter email and password");

  auth.signInWithEmailAndPassword(email,password)
    .then(()=> {
      window.location.href="dashboard.html";
    })
    .catch(e=>alert(e.message));
}

function googleLogin(){
  const provider=new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider)
    .then(()=> window.location.href="dashboard.html")
    .catch(e=>alert(e.message));
}
</script>
</body>
</html>
