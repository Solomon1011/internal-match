<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Internal Match Dashboard</title>

<style>
body { background:#1a1a1a; color:#f5d061; font-family:Arial; margin:0; padding:0; display:flex; flex-direction:column; align-items:center; }
h2{text-align:center; margin-top:20px;}

.tab-content { flex:1; width:100%; max-width:400px; padding:20px; box-sizing:border-box; display:flex; flex-direction:column; align-items:center; }

.tab-bar { position:fixed; bottom:0; width:100%; max-width:400px; display:flex; justify-content:space-around; background:#111; border-top:1px solid #f5d061; padding:10px 0; }

.tab-bar button { background:none; border:none; color:#f5d061; font-size:14px; cursor:pointer; display:flex; flex-direction:column; align-items:center; flex:1; }

.tab-bar img { width:28px; height:28px; margin-bottom:3px; }

.card { background:#222; border:1px solid #f5d061; border-radius:12px; padding:15px; margin:10px 0; width:100%; max-width:350px; display:flex; flex-direction:column; align-items:center; }

.card img { width:150px; height:150px; border-radius:50%; margin-bottom:10px; }

.card h3 { margin:5px 0; font-size:20px; font-weight:bold; }

.action-btn { background:#f5d061; color:#1a1a1a; border:none; padding:8px 12px; border-radius:6px; cursor:pointer; font-weight:bold; }

input[type=text], input[type=number], select { padding:6px; width:90%; margin:5px 0; border-radius:4px; border:1px solid #f5d061; background:#111; color:#f5d061; }

button.save-btn { width:90%; margin-top:10px; }

.chat-item { display:flex; align-items:center; background:#222; padding:8px; margin:5px 0; border-radius:6px; cursor:pointer; width:100%; max-width:350px; }

.chat-item img { width:40px; height:40px; border-radius:50%; margin-right:10px; }

#chat-box { border:1px solid #f5d061; padding:10px; height:200px; overflow-y:auto; margin-bottom:10px; text-align:left; width:100%; max-width:350px; }

.message-input { display:flex; width:100%; max-width:350px; }

.message-input input { flex:1; }

</style>
</head>

<body>

<h2>💘 Internal Match Dashboard</h2>

<div class="tab-content">

<!-- PROFILE -->
<div id="profile-tab">
<h3>My Profile</h3>

<img id="user-profile-pic" src="https://randomuser.me/api/portraits/lego/1.jpg"
style="width:120px;height:120px;border-radius:50%;object-fit:cover;"><br><br>

<input type="file" accept="image/*" capture="environment" onchange="previewImage(event)">

<input type="text" id="edit-username" placeholder="Username">
<input type="number" id="edit-age" placeholder="Age">
<input type="text" id="edit-location" placeholder="Location">

<select id="edit-gender">
<option value="Male">Male</option>
<option value="Female">Female</option>
</select>

<input type="text" id="edit-interest" placeholder="Interest">

<button class="save-btn" onclick="saveProfile()">💾 Save Profile</button>
</div>

<!-- PEOPLE -->
<div id="people-tab" style="display:none;">
<div id="swipe-container"></div>
</div>

<!-- CHATS -->
<div id="chats-tab" style="display:none; width:100%; display:flex; flex-direction:column; align-items:center;">
<div id="chat-list" style="width:100%; display:flex; flex-direction:column; align-items:center;"></div>

<div id="chat-window" style="display:none; width:100%; display:flex; flex-direction:column; align-items:center;">
<div style="display:flex; align-items:center; width:100%; max-width:350px;">
<img id="chat-profile-pic" style="width:50px;height:50px;border-radius:50%;margin-right:10px;">
<span id="chat-name" style="font-weight:bold;font-size:18px;"></span>
</div>

<div id="chat-box"></div>

<div class="message-input">
<input type="text" id="chat-input" placeholder="Type message...">
<button onclick="sendMessage()">Send</button>
</div>
</div>
</div>

</div>

<div class="tab-bar">
<button onclick="showTab('profile')">Profile</button>
<button onclick="showTab('people')">People</button>
<button onclick="showTab('chats')">Chats</button>
</div>

<script>

// TAB SWITCH
function showTab(tab){
document.getElementById('profile-tab').style.display='none';
document.getElementById('people-tab').style.display='none';
document.getElementById('chats-tab').style.display='none';
document.getElementById(tab+'-tab').style.display='block';
}

// PROFILE IMAGE UPLOAD
function previewImage(event){
const file = event.target.files[0];
if(file){
const reader = new FileReader();
reader.onload = function(){
document.getElementById('user-profile-pic').src = reader.result;
}
reader.readAsDataURL(file);
}
}

function saveProfile(){
alert("Profile updated!");
}

// DEMO PROFILES
const demoProfiles = [];
for(let i=0;i<50;i++){
demoProfiles.push({
name:"User "+(i+1),
age:20+Math.floor(Math.random()*10),
pic:`https://randomuser.me/api/portraits/${i%2==0?'men':'women'}/${i}.jpg`,
messages:[],
addedToChat:false
});
}

let currentIndex = 0;
const swipeContainer = document.getElementById("swipe-container");

function showProfile(){
if(currentIndex>=demoProfiles.length){
swipeContainer.innerHTML="No more profiles";
return;
}
const p = demoProfiles[currentIndex];

swipeContainer.innerHTML=`
<div class="card">
<img src="${p.pic}">
<h3>${p.name}, ${p.age}</h3>
<button class="action-btn" onclick="messageCurrent()">💬 Message</button>
</div>
`;
}
showProfile();

// CHAT SYSTEM
const chatListDiv = document.getElementById("chat-list");
const chatWindow = document.getElementById("chat-window");
const chatBox = document.getElementById("chat-box");
const chatInput = document.getElementById("chat-input");

let activeChat = null;

function messageCurrent(){
const p = demoProfiles[currentIndex];
if(p){
addChat(p);
showTab('chats');
}
}

function addChat(profile){
if(!profile.addedToChat){
profile.addedToChat=true;
profile.messages.push({from:profile.name,text:"Hi 💖"});
}
renderChatList();
openChat(profile);
}

function renderChatList(){
chatListDiv.innerHTML="";
demoProfiles.filter(p=>p.addedToChat).forEach(profile=>{
const div=document.createElement("div");
div.className="chat-item";
div.innerHTML=`<img src="${profile.pic}"><span>${profile.name}</span>`;
div.onclick=()=>openChat(profile);
chatListDiv.appendChild(div);
});
}

function openChat(profile){
activeChat=profile;
chatWindow.style.display="flex";
document.getElementById("chat-name").innerText=profile.name;
document.getElementById("chat-profile-pic").src=profile.pic;

chatBox.innerHTML="";
profile.messages.forEach(m=>{
const msg=document.createElement("div");
msg.innerText=m.from+": "+m.text;
chatBox.appendChild(msg);
});
}

function sendMessage(){
if(!activeChat) return;
const text=chatInput.value;
if(!text) return;
activeChat.messages.push({from:"You",text:text});
chatInput.value="";
openChat(activeChat);
}

</script>

</body>
</html>
