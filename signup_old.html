<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sign Up - Internal Match</title>
<style>
body {margin:0;font-family:Arial;background:#111;color:white;display:flex;justify-content:center;align-items:center;min-height:100vh;}
.card {background:#1c1c1c;padding:30px;border-radius:20px;width:90%;max-width:400px;text-align:center;}
h2 {margin-bottom:20px;}
input, select {width:90%;padding:12px;margin:10px 0;border-radius:10px;border:none;font-size:16px;}
button {background:gold;border:none;padding:12px 25px;border-radius:20px;font-weight:bold;cursor:pointer;margin:5px;font-size:16px;}
a {color:gold;cursor:pointer;text-decoration:underline;}
#profilePicPreview {width:120px;height:120px;border-radius:50%;display:block;margin:auto;}
</style>
</head>
<body>

<div class="card" id="signup-card">
  <h2>💘 Internal Match - Sign Up</h2>
  <input type="text" id="username" placeholder="Username">
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">
  <button onclick="signup()">Create Account</button>
  <p>Already have an account? <a href="login.html">Login</a></p>
</div>

<div class="card" id="profile-card" style="display:none;">
  <h2>Setup Your Profile</h2>
  <div style="text-align:center; margin-bottom:20px;">
    <img id="profilePicPreview" src="https://randomuser.me/api/portraits/lego/1.jpg">
    <input type="file" id="profilePicInput" accept="image/*" style="margin-top:10px;">
  </div>
  <input type="number" id="age" placeholder="Age">
  <select id="gender">
    <option value="">Select Gender</option>
    <option value="Male">Male</option>
    <option value="Female">Female</option>
  </select>
  <select id="location">
    <option value="">Select Country</option>
  </select>
  <button onclick="saveProfile()">Save Profile</button>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// --- Firebase Config ---
const firebaseConfig = {
  apiKey: "AIzaSyDIZnZjeCROX5UmcqUQIfTdt6oRU6AmvOg",
  authDomain: "internal-match.firebaseapp.com",
  projectId: "internal-match",
  storageBucket: "internal-match.appspot.com",
  messagingSenderId: "129707008837",
  appId: "1:129707008837:web:f3f0033bbbe673107a542c"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

// --- Countries for Location ---
const countries = ["Afghanistan","Albania","Algeria","Andorra","Angola","Argentina","Armenia","Australia","Austria","Azerbaijan","Bahamas","Bahrain","Bangladesh","Barbados","Belarus","Belgium","Belize","Bolivia","Bosnia & Herzegovina","Botswana","Brazil","Brunei","Bulgaria","Burkina Faso","Burundi","Cambodia","Cameroon","Canada","Chile","China","Colombia","Costa Rica","Croatia","Cuba","Cyprus","Czech Republic","Denmark","Dominica","Dominican Republic","Ecuador","Egypt","El Salvador","Estonia","Eswatini","Ethiopia","Finland","France","Gabon","Gambia","Georgia","Germany","Ghana","Greece","Grenada","Guatemala","Guinea","Guyana","Haiti","Honduras","Hungary","Iceland","India","Indonesia","Iran","Iraq","Ireland","Israel","Italy","Jamaica","Japan","Jordan","Kenya","Kuwait","Latvia","Lebanon","Lithuania","Luxembourg","Malaysia","Maldives","Malta","Mexico","Moldova","Monaco","Mongolia","Montenegro","Morocco","Myanmar","Namibia","Nepal","Netherlands","New Zealand","Nigeria","North Korea","Norway","Oman","Pakistan","Palestine","Panama","Peru","Philippines","Poland","Portugal","Qatar","Romania","Russia","Rwanda","Saudi Arabia","Senegal","Serbia","Singapore","Slovakia","Slovenia","South Africa","South Korea","Spain","Sri Lanka","Sweden","Switzerland","Taiwan","Tanzania","Thailand","Turkey","Ukraine","United Arab Emirates","United Kingdom","United States","Vietnam","Zambia","Zimbabwe"];

// Fill location dropdown
const locationSelect = document.getElementById('location');
countries.forEach(c => locationSelect.innerHTML += `<option value="${c}">${c}</option>`);

// --- Image Upload Preview ---
let profilePicData = "https://randomuser.me/api/portraits/lego/1.jpg";
const profilePicInput = document.getElementById('profilePicInput');
const profilePicPreview = document.getElementById('profilePicPreview');
profilePicInput.addEventListener('change', function(event){
  const file = event.target.files[0];
  if(file){
    const reader = new FileReader();
    reader.onload = function(e){
      profilePicPreview.src = e.target.result;
      profilePicData = e.target.result;
    }
    reader.readAsDataURL(file);
  }
});

// --- Sign Up Function ---
function signup(){
  const username = document.getElementById("username").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  if(!username || !email || !password){ alert("Fill all fields"); return; }

  auth.createUserWithEmailAndPassword(email,password)
    .then(res=>{
      const uid = res.user.uid;
      // Temporarily save username and email, prompt for profile
      db.ref('users/'+uid).set({username,email});
      // Show profile setup
      document.getElementById('signup-card').style.display='none';
      document.getElementById('profile-card').style.display='block';
      window.currentUserUid = uid;
    })
    .catch(err=> alert(err.message));
}

// --- Save Profile Setup ---
function saveProfile(){
  const age = document.getElementById('age').value.trim();
  const gender = document.getElementById('gender').value;
  const location = document.getElementById('location').value;
  if(!age || !gender || !location){ alert("Fill all profile fields"); return; }

  const uid = window.currentUserUid;
  db.ref('users/'+uid).update({
    age, gender, location, profilePic: profilePicData
  });
  alert("Profile setup complete!");
  window.location.href = "dashboard.html";
}
</script>

</body>
</html>
