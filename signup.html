<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDIZnZjeCROX5UmcqUQIfTdt6oRU6AmvOg",
    authDomain: "internal-match.firebaseapp.com",
    projectId: "internal-match",
    storageBucket: "internal-match.firebasestorage.app",
    messagingSenderId: "129707008837",
    appId: "1:129707008837:web:f3f0033bbbe673107a542c"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  document.getElementById('signupBtn').addEventListener('click', function() {
    const username = document.getElementById('username').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();

    if (!username || !email || !password) {
      alert("Please fill out all fields.");
      return;
    }

    createUserWithEmailAndPassword(auth, email, password)
      .then((userCredential) => {
        window.location = "dashboard.html";  // Redirect to dashboard after successful sign-up
      })
      .catch((error) => {
        console.error("Signup failed:", error.code, error.message);  // Log error code and message
        alert("Signup failed. Error code: " + error.code + " - " + error.message);  // Show detailed error
      });
  });
</script>
