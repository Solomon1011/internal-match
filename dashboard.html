<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Dashboard</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBP77N2Mt_P7w0lWajThFrvAhr0pr10IzY",
  authDomain: "correct-score-vip-a7d44.firebaseapp.com",
  projectId: "correct-score-vip-a7d44",
  storageBucket: "correct-score-vip-a7d44.appspot.com",
  messagingSenderId: "289684024174",
  appId: "1:289684024174:web:d1fe063d59cc0de69c6f7f"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();
</script>

<style>
html, body {margin:0;padding:0;font-family:sans-serif;background:#000;color:#fff;overflow:hidden}
#swipe-container{position:absolute;width:100%;height:100%;display:flex;justify-content:center;align-items:center}
.card{width:90%;max-width:400px;background:#111;border-radius:15px;padding:15px;text-align:center}
.card img{width:100%;border-radius:15px}
.actions{display:flex;justify-content:space-around;margin-top:10px}
.tab-bar{position:fixed;bottom:0;width:100%;display:flex;background:#111}
.tab-bar button{flex:1;background:none;color:#fff;padding:10px}
#profile,#chat-box{display:none;position:absolute;width:100%;height:100%;top:0;left:0}
</style>
</head>

<body>

<div id="swipe-container"></div>

<!-- PROFILE -->
<div id="profile">

<div id="login-form">
<h2>Login</h2>
<input type="email" id="login-email" placeholder="Email">
<input type="password" id="login-password" placeholder="Password">
<button onclick="login()">Login</button>
<p><a onclick="forgotPassword()">Forgot password?</a></p>
<p>Don't have account? <a onclick="showSignup()">Signup</a></p>
</div>

<div id="signup-form" style="display:none;">
<h2>Signup</h2>
<input type="email" id="signup-email">
<input type="password" id="signup-password">
<button onclick="signup()">Signup</button>
</div>

<div id="editable-profile" style="display:none">
<img id="profile-pic" width="120">
<input id="profile-name" placeholder="Name">
<input id="profile-age" placeholder="Age">

<select id="profile-country">
<option>Nigeria</option>
<option>United Kingdom</option>
<option>United States</option>
</select>

<select id="profile-interest">
<option>Friend 💖</option>
<option>Hangout 💚</option>
<option>Serious Relationship 💖</option>
<option>Marriage 💘</option>
</select>

<input type="file" id="photo1">

<button onclick="saveProfile()">Save Profile</button>
</div>

</div>

<!-- CHAT -->
<div id="chat-box">
<div id="chat-messages"></div>
<input id="chat-input">
<button onclick="sendMessage()">Send</button>
</div>

<!-- TABS -->
<div class="tab-bar">
<button onclick="showTab('swipe',event)">Home</button>
<button onclick="showTab('likes',event)">Likes</button>
<button onclick="showTab('messages',event)">Messages</button>
<button onclick="showTab('profile-tab',event)">Profile</button>
<button onclick="showTab('coins',event)">Coins</button>
</div>

<script>

let currentUser=null
let currentChatUser=null

// LOGIN
function login(){

const email=document.getElementById("login-email").value
const pass=document.getElementById("login-password").value

auth.signInWithEmailAndPassword(email,pass)
.then(user=>{

currentUser=user.user
loadProfile()

})
.catch(e=>alert(e.message))

}

// SIGNUP
function signup(){

const email=document.getElementById("signup-email").value
const pass=document.getElementById("signup-password").value

auth.createUserWithEmailAndPassword(email,pass)
.then(user=>{

currentUser=user.user
loadProfile()

})

.catch(e=>alert(e.message))

}

// FORGOT PASSWORD
function forgotPassword(){

const email=document.getElementById("login-email").value

auth.sendPasswordResetEmail(email)
.then(()=>alert("Reset email sent"))

}

// LOAD PROFILE
function loadProfile(){

db.collection("users").doc(currentUser.uid).get()
.then(doc=>{

if(doc.exists){

const data=doc.data()

document.getElementById("profile-name").value=data.name
document.getElementById("profile-age").value=data.age
document.getElementById("profile-pic").src=data.photo

}

document.getElementById("login-form").style.display="none"
document.getElementById("signup-form").style.display="none"
document.getElementById("editable-profile").style.display="block"

})

}

// SAVE PROFILE
function saveProfile(){

const name=document.getElementById("profile-name").value
const age=document.getElementById("profile-age").value
const country=document.getElementById("profile-country").value
const interest=document.getElementById("profile-interest").value

db.collection("users").doc(currentUser.uid).set({

name:name,
age:age,
country:country,
interest:interest

})

alert("Profile saved")

}

// PHOTO UPLOAD
document.getElementById("photo1").addEventListener("change",function(e){

const file=e.target.files[0]

const ref=storage.ref("profiles/"+currentUser.uid)

ref.put(file).then(()=>{

ref.getDownloadURL().then(url=>{

document.getElementById("profile-pic").src=url

db.collection("users").doc(currentUser.uid).update({
photo:url
})

})

})

})

// SEND MESSAGE
function sendMessage(){

if(!auth.currentUser){
alert("Login to send message")
return
}

const text=document.getElementById("chat-input").value

db.collection("messages").add({

from:currentUser.uid,
to:currentChatUser,
text:text,
time:Date.now()

})

document.getElementById("chat-input").value=""

}

// TABS
function showTab(tab){

document.getElementById("swipe-container").style.display="none"
document.getElementById("chat-box").style.display="none"
document.getElementById("profile").style.display="none"

if(tab=="swipe") document.getElementById("swipe-container").style.display="flex"
if(tab=="profile-tab") document.getElementById("profile").style.display="block"
if(tab=="messages") document.getElementById("chat-box").style.display="block"

}

</script>

</body>
</html>
