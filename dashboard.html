<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Internal Match - Dashboard</title>
<style>
body {margin:0;font-family:Arial;background:#111;color:white;display:flex;flex-direction:column;align-items:center;}
h2{text-align:center;margin:10px 0;}
.card {background:#1c1c1c;border-radius:20px;padding:20px;width:90%;max-width:400px;text-align:center;margin:15px 0;}
button {background:gold;border:none;padding:12px 25px;border-radius:20px;font-weight:bold;cursor:pointer;margin:5px;}
.tab-bar {position:fixed;bottom:0;width:100%;background:black;display:flex;justify-content:space-around;padding:10px 0;border-top:2px solid gold;}
.tab-bar button {background:none;border:none;color:gold;font-size:22px;}
#chat-box {height:300px;overflow-y:auto;background:#000;padding:10px;margin-bottom:10px;border-radius:10px;}
.message {padding:8px;margin:5px;border-radius:10px;max-width:70%;}
.user {background:#25D366;margin-left:auto;}
.other {background:#333;}
input, select {width:90%;padding:10px;margin:5px;border-radius:10px;border:none;}
</style>
</head>
<body>

<h2>💘 Internal Match</h2>

<!-- Swipe Tab -->
<div id="swipe-tab" class="tab"></div>

<!-- Liked Users Tab -->
<div class="card tab" id="liked-tab" style="display:none;">
  <h3>Liked Users</h3>
  <div id="liked-container"></div>
</div>

<!-- Chat Tab -->
<div class="card tab" id="chat-tab" style="display:none;">
  <h3 id="chatWith">Chat</h3>
  <div id="chat-box"></div>
  <input id="chat-input" placeholder="Type message">
  <button onclick="sendMessage()">Send</button>
</div>

<!-- Profile Tab -->
<div class="card tab" id="profile-tab" style="display:none;">
  <h3>My Profile</h3>
  <img id="dashboardProfilePic" src="https://randomuser.me/api/portraits/lego/1.jpg" style="width:120px;height:120px;border-radius:50%;border:3px solid gold;margin-bottom:10px;">
  <input type="file" id="photoInput" accept="image/*" capture="user">
  <input type="text" id="nameInput" placeholder="Name">
  <input type="number" id="ageInput" placeholder="Age" min="1" max="120">
  <select id="genderInput">
    <option value="">Select Gender</option>
    <option value="Male">Male</option>
    <option value="Female">Female</option>
    <option value="Other">Other</option>
  </select>
  <input type="text" id="locationInput" placeholder="Location">
  <button onclick="saveProfile()">Save Profile</button>
</div>

<!-- Shop Coins Tab -->
<div class="card tab" id="shop-tab" style="display:none;">
  <h3>💰 Shop Coins</h3>
  <p>Current Coins: <span id="coin-count">0</span> 💎</p>
  <div style="display:flex; justify-content:center; gap:10px; flex-wrap:wrap; margin-top:10px;">
    <button onclick="buyCoins(10)">Buy 10 Coins</button>
    <button onclick="buyCoins(50)">Buy 50 Coins</button>
    <button onclick="buyCoins(100)">Buy 100 Coins</button>
  </div>
</div>

<!-- Bottom Navigation -->
<div class="tab-bar">
  <button onclick="showTab('swipe')">💖 Swipe</button>
  <button onclick="showTab('liked')">❤️ Like</button>
  <button onclick="showTab('chat')">💬 Chat</button>
  <button onclick="showTab('profile')">👤 Profile</button>
  <button onclick="showTab('shop')">💎 Shop</button>
</div>

<script>
// --- Tabs ---
function showTab(tab){
  ['swipe','liked','chat','profile','shop'].forEach(t=>{
    const el = document.getElementById(t+'-tab');
    if(el) el.style.display=(t===tab?'block':'none');
  });
}

// --- Profile ---
const profilePic=document.getElementById("dashboardProfilePic");
const photoInput=document.getElementById("photoInput");
const nameInput=document.getElementById("nameInput");
const ageInput=document.getElementById("ageInput");
const genderInput=document.getElementById("genderInput");
const locationInput=document.getElementById("locationInput");

function loadProfile(){
  profilePic.src=localStorage.getItem("profilePic")||profilePic.src;
  nameInput.value=localStorage.getItem("name")||"";
  ageInput.value=localStorage.getItem("age")||"";
  genderInput.value=localStorage.getItem("gender")||"";
  locationInput.value=localStorage.getItem("location")||"";
}
function saveProfile(){
  if(!nameInput.value||!ageInput.value||!genderInput.value||!locationInput.value){alert("Fill all fields!"); return;}
  localStorage.setItem("profilePic",profilePic.src);
  localStorage.setItem("name",nameInput.value);
  localStorage.setItem("age",ageInput.value);
  localStorage.setItem("gender",genderInput.value);
  localStorage.setItem("location",locationInput.value);
  alert("Profile saved!");
}

// --- Profile Picture Upload ---
photoInput.addEventListener("change",function(){
  const file=this.files[0];
  if(!file) return;
  profilePic.src=URL.createObjectURL(file);
  const reader=new FileReader();
  reader.onload=e=>localStorage.setItem("profilePic",e.target.result);
  reader.readAsDataURL(file);
});

// --- Swipe Profiles ---
let profiles=[];
for(let i=1;i<=10;i++){
  profiles.push({name:'User'+i,age:20+i,gender:i%2===0?'Male':'Female',location:'City'+i,pic:`https://randomuser.me/api/portraits/${i%2===0?'men':'women'}/${i}.jpg`,liked:false,messages:[]});
}
let currentIndex=0;
function showSwipe(){
  const container=document.getElementById('swipe-tab');
  if(currentIndex>=profiles.length){ container.innerHTML="No more profiles!"; return; }
  const p=profiles[currentIndex];
  container.innerHTML=`
    <div class="card">
      <img src="${p.pic}">
      <h3>${p.name}, ${p.age}</h3>
      <p>${p.gender} | ${p.location}</p>
      <div style="display:flex; justify-content:center; gap:10px; margin-top:10px;">
        <button onclick="likeProfile()">💖 Like</button>
        <button onclick="openChat('${p.name}')">💬 Message</button>
        <button onclick="nextProfile()">❌ Ignore</button>
      </div>
    </div>
  `;
}
function likeProfile(){ profiles[currentIndex].liked=true; addLike(profiles[currentIndex]); nextProfile(); }
function nextProfile(){ currentIndex++; showSwipe(); }

// --- Liked Users ---
function addLike(profile){
  const container=document.getElementById("liked-container");
  const div=document.createElement("div");
  div.textContent=profile.name+" 💖";
  container.appendChild(div);
}

// --- Chat ---
let currentChat=null;
function openChat(user){
  currentChat=user;
  showTab('chat');
  document.getElementById('chatWith').innerText="Chat with "+user;
  const box=document.getElementById("chat-box");
  box.innerHTML=`<div class="message other">Chat with ${user} started!</div>`;
}
function sendMessage(){
  if(!currentChat) return;
  const input=document.getElementById("chat-input");
  if(!input.value) return;
  const box=document.getElementById("chat-box");
  const msg=document.createElement("div");
  msg.className="message user";
  msg.innerText=input.value;
  box.appendChild(msg);
  input.value="";
  box.scrollTop=box.scrollHeight;
}

// --- Shop Coins ---
let coins = parseInt(localStorage.getItem("coins")) || 0;
const coinCount = document.getElementById("coin-count");
function updateCoins(){ coinCount.innerText = coins; }
function buyCoins(amount){
  coins += amount;
  localStorage.setItem("coins", coins);
  updateCoins();
  alert(`You bought ${amount} coins!`);
}

// --- Initialize ---
window.onload=()=>{
  loadProfile();
  showTab('swipe');
  showSwipe();
  updateCoins();
};
</script>
</body>
</html>
