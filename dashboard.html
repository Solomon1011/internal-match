<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="stylesheet" href="style.css">
<title>Dashboard</title>
</head>
<body>

<h2>💘 Internal Match Dashboard</h2>

<div class="tab-content">

  <!-- Profile Tab -->
  <div id="profile-tab" style="display:none;">
    <h3>My Profile</h3>
    <img id="user-profile-pic" src="https://randomuser.me/api/portraits/lego/1.jpg" style="width:120px;height:120px;border-radius:50%;"><br>
    <input type="text" placeholder="Username"><br>
    <input type="number" placeholder="Age"><br>
    <input type="text" placeholder="Location"><br>
    <select>
      <option>Male</option>
      <option>Female</option>
    </select><br>
    <input type="text" placeholder="Interest"><br>
    <input type="text" placeholder="Profile Picture URL"><br>
    <button onclick="saveProfile()">💾 Save Profile</button>
  </div>

  <!-- People Tab -->
  <div id="people-tab" style="display:none;">
    <div id="swipe-container">Loading profiles...</div>
  </div>

  <!-- Likes Tab -->
  <div id="liked-tab" style="display:none;">
    <h3>Who Likes Me</h3>
    <div>No likes yet!</div>
  </div>

  <!-- Chats Tab -->
  <div id="chats-tab" style="display:none;">
    <h3>Chats</h3>
    <div id="chat-box"></div>
  </div>

</div>

<!-- Bottom Navigation -->
<div class="tab-bar">
  <button onclick="showTab('profile')">👤</button>
  <button onclick="showTab('people')">🔥</button>
  <button onclick="showTab('liked')">💖</button>
  <button onclick="showTab('chats')">💬</button>
</div>

<script>

function showTab(tab){
  ['profile-tab','people-tab','liked-tab','chats-tab'].forEach(t=>{
    document.getElementById(t).style.display='none';
  });

  document.getElementById(tab+'-tab').style.display='block';
}

function saveProfile(){
  alert("Profile saved!");
}

// Show Profile first
showTab('profile');

</script>

</body>
</html>
