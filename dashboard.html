<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Internal Match Dashboard</title>
<style>
body { background:#1a1a1a; color:#f5d061; font-family:Arial, sans-serif; margin:0; padding:0; display:flex; flex-direction:column; align-items:center; }
h2{text-align:center; margin-top:20px;}
.tab-content { flex:1; width:100%; max-width:400px; text-align:center; padding:20px; box-sizing:border-box; display:flex; flex-direction:column; align-items:center; }
.tab-bar { position:fixed; bottom:0; width:100%; max-width:400px; display:flex; justify-content:space-around; background:#111; border-top:1px solid #f5d061; padding:10px 0; }
.tab-bar button { background:none; border:none; color:#f5d061; font-size:14px; cursor:pointer; display:flex; flex-direction:column; align-items:center; flex:1; }
.tab-bar img { width:28px; height:28px; margin-bottom:3px; }
.card { background:#222; border:1px solid #f5d061; border-radius:12px; padding:15px; margin:10px 0; width:100%; max-width:350px; display:flex; flex-direction:column; align-items:center; position:relative; }
.card img { width:150px; height:150px; border-radius:50%; margin-bottom:10px; }
.card h3 { margin:5px 0; font-size:20px; font-weight:bold; }
.card p { margin:2px 0; font-size:14px; }
.card .actions { display:flex; justify-content:space-around; width:100%; margin-top:10px; }
.action-btn { background:#f5d061; color:#1a1a1a; border:none; padding:8px 12px; border-radius:6px; cursor:pointer; font-weight:bold; display:flex; align-items:center; justify-content:center; }
.action-btn img { width:20px; height:20px; margin-left:5px; }
#chat-header { display:flex; align-items:center; justify-content:flex-start; margin-bottom:10px; width:100%; max-width:350px; }
#chat-header img { width:60px; height:60px; border-radius:50%; margin-right:10px; }
#chat-box { border:1px solid #f5d061; padding:10px; height:200px; overflow-y:scroll; margin-bottom:10px; text-align:left; width:100%; max-width:350px; }
#chat-users button { display:flex; justify-content:space-between; width:100%; margin:5px 0; background:#222; border:none; color:#f5d061; padding:6px 8px; border-radius:4px; cursor:pointer; }
#chat-users img { width:24px; height:24px; cursor:pointer; }
input[type=text], input[type=number], select { padding:6px; width:80%; margin:5px 0; border-radius:4px; border:1px solid #f5d061; background:#111; color:#f5d061; }
button.save-btn { width:80%; margin-top:10px; }
.filter-panel { display:flex; flex-direction:column; align-items:center; margin-bottom:10px; width:100%; }
.filter-panel select { margin:5px; width:80%; }
.online-dot {width:12px; height:12px; border-radius:50%; background:lime; position:absolute; top:10px; right:10px; border:2px solid #1a1a1a;}
</style>
</head>
<body>

<h2>💘 Internal Match Dashboard</h2>

<div class="tab-content">

  <!-- User Profile -->
  <div id="profile-tab" style="display:none;">
    <h3>My Profile</h3>
    <img id="user-profile-pic" src="https://randomuser.me/api/portraits/lego/1.jpg" alt="Profile" style="width:120px;height:120px;border-radius:50%;"><br>
    <input type="text" id="edit-username" placeholder="Username"><br>
    <input type="number" id="edit-age" placeholder="Age"><br>
    <input type="text" id="edit-location" placeholder="Location"><br>
    <select id="edit-gender">
      <option value="Male">Male</option>
      <option value="Female">Female</option>
    </select><br>
    <input type="text" id="edit-interest" placeholder="Interest"><br>
    <input type="text" id="edit-pic" placeholder="Profile Picture URL"><br>
    <div class="filter-panel">
      <h4>Filters</h4>
      <select id="filter-gender">
        <option value="">All Genders</option>
        <option value="Male">Male</option>
        <option value="Female">Female</option>
      </select>
      <select id="filter-location">
        <option value="">All Locations</option>
      </select>
      <select id="filter-interest">
        <option value="">All Interests</option>
      </select>
      <button class="save-btn" onclick="applyFilters()">🔍 Apply Filters</button>
    </div>
    <button class="save-btn" onclick="saveProfile()">💾 Save Profile</button>
  </div>

  <!-- People Profiles -->
  <div id="people-tab" style="display:none;">
    <div id="swipe-container">Loading profiles...</div>
    <div id="chat-users"></div>
  </div>

  <!-- Likes -->
  <div id="liked-tab" style="display:none;">
    <h3>Who Likes Me</h3>
    <div id="liked-container">No likes yet!</div>
  </div>

  <!-- Chat -->
  <div id="chats-tab" style="display:none;">
    <div id="chat-header">
      <img id="chat-profile-pic" src="">
      <span id="chat-name" style="font-weight:bold;font-size:18px;"></span>
    </div>
    <div id="chat-box"></div>
  </div>

</div>

<div class="tab-bar">
  <button onclick="showTab('profile')"><img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">Profile</button>
  <button onclick="showTab('people')"><img src="https://cdn-icons-png.flaticon.com/512/1077/1077114.png">People</button>
  <button onclick="showTab('liked')"><img src="https://cdn-icons-png.flaticon.com/512/833/833472.png">Likes</button>
  <button onclick="showTab('chats')"><img src="https://cdn-icons-png.flaticon.com/512/2462/2462719.png">Chats</button>
</div>

<script>
// Tab switching
function showTab(tab){
  ['profile-tab','people-tab','liked-tab','chats-tab'].forEach(t=>document.getElementById(t).style.display='none');
  document.getElementById(tab+'-tab').style.display='block';
}
showTab('profile');

// Demo profiles
const malePics = Array.from({length:2000}, (_,i)=>`https://randomuser.me/api/portraits/men/${i%100}.jpg`);
const femalePics = Array.from({length:2000}, (_,i)=>`https://randomuser.me/api/portraits/women/${i%100}.jpg`);
const maleNames = ["John","David","Michael","James","Robert","William","Thomas","Henry","Jack","Luke"];
const femaleNames = ["Alice","Emma","Olivia","Sophia","Clara","Mia","Grace","Eva","Lily","Amelia"];
const locations = ["New York","London","Paris","Tokyo","Berlin","Madrid","Sydney","Lagos","Dubai","Rome"];
const interests = ["Friends 💚","Hangout 🩵","Serious Relationship 💖","Marriage 💘"];
const romanticMessages = ["Hey you 😘, I was hoping to meet you today!","You have the most amazing smile 💖","Can't stop thinking about you 💘","Would love to go on a date with you 🥰","You're amazing 😍"];

const demoProfiles = [];
for(let i=0;i<2000;i++){
  demoProfiles.push({name: maleNames[Math.floor(Math.random()*maleNames.length)], age:20+Math.floor(Math.random()*15), gender:"Male", location:locations[Math.floor(Math.random()*locations.length)], interest:interests[Math.floor(Math.random()*interests.length)], pic: malePics[i], messages: [], addedToChat:false, ignored:false, online:true});
  demoProfiles.push({name: femaleNames[Math.floor(Math.random()*femaleNames.length)], age:20+Math.floor(Math.random()*15), gender:"Female", location:locations[Math.floor(Math.random()*locations.length)], interest:interests[Math.floor(Math.random()*interests.length)], pic: femalePics[i], messages: [], addedToChat:false, ignored:false, online:true});
}

// Fill filter options
const locationSelect = document.getElementById('filter-location');
const interestSelect = document.getElementById('filter-interest');
locations.forEach(l=>locationSelect.innerHTML+=`<option value="${l}">${l}</option>`);
interests.forEach(i=>interestSelect.innerHTML+=`<option value="${i}">${i}</option>`);

// Swipe system
let currentIndex = 0;
let filteredProfiles = demoProfiles.slice();
const swipeContainer = document.getElementById('swipe-container');
const chatUsersDiv = document.getElementById('chat-users');
const chatBox = document.getElementById('chat-box');
const chatProfilePic = document.getElementById('chat-profile-pic');
const chatName = document.getElementById('chat-name');

function showProfile(){
  while(currentIndex < filteredProfiles.length && filteredProfiles[currentIndex].ignored) currentIndex++;
  if(currentIndex >= filteredProfiles.length){ swipeContainer.innerHTML="No more profiles!"; return; }
  const p = filteredProfiles[currentIndex];
  swipeContainer.innerHTML=`
    <div class="card">
      <span class="online-dot"></span>
      <img src="${p.pic}">
      <h3>${p.name}, ${p.age}</h3>
      <p>${p.gender} | ${p.location}</p>
      <p>Interest: ${p.interest}</p>
      <div class="actions">
        <button class="action-btn" onclick="swipe('like')">💖 Like</button>
        <button class="action-btn" onclick="swipe('ignore')">❌ Ignore</button>
        <button class="action-btn" onclick="messageCurrent()">💬 Message</button>
      </div>
    </div>
  `;
}

function swipe(action){
  const p = filteredProfiles[currentIndex];
  if(action==="like") { addChat(p); autoReply(p); }
  if(action==="ignore") { p.ignored = true; }
  currentIndex++;
  showProfile();
}

function messageCurrent(){
  const p = filteredProfiles[currentIndex];
  if(p) addChat(p);
}

function addChat(profile){
  if(!profile.addedToChat) {
    const btn = document.createElement('button');
    btn.innerHTML=`<span>${profile.name}</span> <img src="https://cdn-icons-png.flaticon.com/512/2462/2462719.png" title="Message">`;
    btn.onclick = ()=>openChat(profile);
    chatUsersDiv.appendChild(btn);
    profile.addedToChat=true;
    profile.messages.push({from:profile.name,text:"Hi there! 💖 Let's chat romantically!"});
  }
  openChat(profile);
}

function openChat(profile){
  chatName.innerText = profile.name;
  chatProfilePic.src = profile.pic;
  chatBox.innerHTML = "";
  profile.messages.forEach(msg=>addMessage(msg.from,msg.text));
}

function addMessage(sender,text){
  const div = document.createElement('div');
  div.innerText = sender+": "+text;
  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
}

function autoReply(profile){
  const randomMsg = romanticMessages[Math.floor(Math.random()*romanticMessages.length)];
  setTimeout(()=> {
    profile.messages.push({from:profile.name, text: randomMsg});
    if(chatName.innerText === profile.name){
      addMessage(profile.name, randomMsg);
    }
  }, 1000 + Math.random()*2000);
}

// Profile edit
function saveProfile(){
  const userProfile = {
    name: document.getElementById('edit-username').value || "DemoUser",
    age: document.getElementById('edit-age').value || 25,
    location: document.getElementById('edit-location').value || "Lagos",
    gender: document.getElementById('edit-gender').value,
    interest: document.getElementById('edit-interest').value || "Serious Relationship 💖",
    pic: document.getElementById('edit-pic').value || "https://randomuser.me/api/portraits/lego/1.jpg"
  };
  document.getElementById('user-profile-pic').src = userProfile.pic;
  alert("Profile updated!");
}

// Filters
function applyFilters(){
  const gender = document.getElementById('filter-gender').value;
  const location = document.getElementById('filter-location').value;
  const interest = document.getElementById('filter-interest').value;
  filteredProfiles = demoProfiles.filter(p=>{
    return !p.ignored &&
           (!gender || p.gender===gender) &&
           (!location || p.location===location) &&
           (!interest || p.interest===interest);
  });
  currentIndex = 0;
  showProfile();
}

// Initial
showProfile();
</script>

</body>
</html>
