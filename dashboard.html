
<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <!-- Paystack script -->
  <script src="https://js.paystack.co/v1/inline.js"></script>
</head>
<body>

<h2>Welcome to Internal Match</h2>

<h3>Coins: <span id="coins">Loading...</span></h3>

<!-- Buttons -->
<button onclick="buyPremium()">Buy Premium</button>
<button onclick="useCoin()">Use 1 Coin</button>
<button onclick="logout()">Logout</button>

<hr>

<!-- Swipe container -->
<div id="swipe-container">Loading profiles...</div>
<button onclick="swipe('like')">Like</button>
<button onclick="swipe('dislike')">Dislike</button>

<hr>

<!-- Chat UI -->
<h3>Chat with your matches</h3>
<div id="chat-users">
  <!-- Matched users buttons will appear here -->
</div>

<div id="chat-box" style="border:1px solid #ccc; padding:10px; height:200px; overflow-y:scroll;">
  <!-- Messages will appear here -->
</div>

<input type="text" id="message-input" placeholder="Type a message">
<button onclick="sendMessage()">Send</button>

<!-- Firebase scripts -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDIZnZjeCROX5UmcqUQIfTdt6oRU6AmvOg",
  authDomain: "internal-match.firebaseapp.com",
  projectId: "internal-match",
  storageBucket: "internal-match.firebasestorage.app",
  messagingSenderId: "129707008837",
  appId: "1:129707008837:web:f3f0033bbbe673107a542c"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// Protect dashboard
auth.onAuthStateChanged(user => {
  if (!user) {
    window.location.href = "index.html";
  } else {
    loadCoins(user.uid);
    loadProfiles(user.uid); // Swipe system
    loadMatches();          // Chat system
  }
});

// Load coins
function loadCoins(uid) {
  db.collection("users").doc(uid).get().then(doc => {
    if (doc.exists) {
      document.getElementById("coins").innerText = doc.data().coins;
    } else {
      db.collection("users").doc(uid).set({coins: 10, premium: false});
      document.getElementById("coins").innerText = 10;
    }
  });
}

// Logout
function logout() {
  auth.signOut().then(() => window.location.href = "index.html");
}

// Use 1 coin
function useCoin() {
  const user = auth.currentUser;
  const userRef = db.collection("users").doc(user.uid);

  userRef.get().then(doc => {
    let currentCoins = doc.data().coins;
    if(currentCoins > 0){
      userRef.update({coins: currentCoins - 1});
      document.getElementById("coins").innerText = currentCoins - 1;
    } else {
      alert("No coins left! Buy premium 🔥");
    }
  });
}

// Buy Premium with Paystack
function buyPremium() {
  const user = auth.currentUser;
  const userRef = db.collection("users").doc(user.uid);

  let handler = PaystackPop.setup({
    key: 'YOUR_PUBLIC_PAYSTACK_KEY', // Replace with your Paystack key
    email: user.email,
    amount: 5000, // 50 NGN
    currency: "NGN",
    ref: '' + Math.floor(Math.random() * 1000000000 + 1),
    onClose: function(){ alert('Payment cancelled'); },
    callback: function(response){
      userRef.update({premium: true});
      alert("You are now a Premium user 🔥");
    }
  });

  handler.openIframe();
}

// ===== Swipe System =====
let currentProfileIndex = 0;
let profiles = [];

function loadProfiles(uid) {
  db.collection("users").get().then(snapshot => {
    profiles = snapshot.docs
      .filter(doc => doc.id !== uid)
      .map(doc => ({ id: doc.id, ...doc.data() }));
    showProfile();
  });
}

function showProfile() {
  const container = document.getElementById("swipe-container");
  if(currentProfileIndex >= profiles.length){
    container.innerHTML = "No more profiles!";
    return;
  }
  const profile = profiles[currentProfileIndex];
  container.innerHTML = `<h3>${profile.email}</h3>`;
}

function swipe(type) {
  const user = auth.currentUser;
  const profile = profiles[currentProfileIndex];

  db.collection("likes").add({
    from: user.uid,
    to: profile.id,
    type: type
  });

  // Check for match
  db.collection("likes")
    .where("from", "==", profile.id)
    .where("to", "==", user.uid)
    .where("type", "==", "like")
    .get()
    .then(snap => {
      if(!snap.empty){
        db.collection("matches").add({user1: user.uid, user2: profile.id});
        alert("It's a match! 💘");
      }
    });

  currentProfileIndex++;
  showProfile();
}

// ===== Chat System =====
let currentChatId = null;

function loadMatches() {
  const user = auth.currentUser;
  db.collection("matches").where("user1","==",user.uid).get().then(showMatchUsers);
  db.collection("matches").where("user2","==",user.uid).get().then(showMatchUsers);
}

function showMatchUsers(snapshot){
  const chatUsersDiv = document.getElementById("chat-users");
  snapshot.forEach(doc=>{
    const data = doc.data();
    const matchUid = data.user1===auth.currentUser.uid ? data.user2 : data.user1;

    const btn = document.createElement("button");
    btn.innerText = "Chat with " + matchUid;
    btn.onclick = () => openChat(doc.id, matchUid);
    chatUsersDiv.appendChild(btn);
  });
}

function openChat(chatId, matchUid){
  currentChatId = chatId;
  const chatBox = document.getElementById("chat-box");
  chatBox.innerHTML = "";

  const chatDocRef = db.collection("chats").doc(chatId);

  chatDocRef.get().then(doc=>{
    if(!doc.exists){
      chatDocRef.set({participants:[auth.currentUser.uid, matchUid], messages:[]});
    }
  });

  chatDocRef.onSnapshot(doc=>{
    chatBox.innerHTML = "";
    const messages = doc.data().messages || [];
    messages.forEach(msg=>{
      const div = document.createElement("div");
      div.innerText = (msg.from===auth.currentUser.uid?"Me: ":"Them: ")+msg.text;
      chatBox.appendChild(div);
    });
    chatBox.scrollTop = chatBox.scrollHeight;
  });
}

function sendMessage(){
  if(!currentChatId) return alert("Select a match first!");
  const input = document.getElementById("message-input");
  const text = input.value.trim();
  if(!text) return;

  db.collection("chats").doc(currentChatId).update({
    messages: firebase.firestore.FieldValue.arrayUnion({
      from: auth.currentUser.uid,
      text: text,
      timestamp: firebase.firestore.Timestamp.now()
    })
  });

  input.value = "";
}

</script>

</body>
</html>
