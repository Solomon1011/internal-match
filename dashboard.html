
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="stylesheet" href="style.css">
<title>💘 Internal Match Dashboard</title>
</head>
<body>

<h2>💘 Internal Match Dashboard</h2>

<div class="tab-content">

  <!-- Profile Tab -->
  <div id="profile-tab" style="display:none;">
    <h3>My Profile</h3>
    <div style="text-align:center; margin-bottom:20px;">
      <img id="user-profile-pic" src="https://randomuser.me/api/portraits/lego/1.jpg" 
           style="width:120px;height:120px;border-radius:50%; display:block; margin:auto;">
      <input type="file" id="profilePicInput" accept="image/*" style="margin-top:10px;">
    </div>

    <input type="text" id="edit-username" placeholder="Username"><br>
    <input type="number" id="edit-age" placeholder="Age"><br>
    
    <select id="edit-location">
      <option value="">Select Country</option>
    </select><br>

    <select id="edit-gender">
      <option value="">Select Gender</option>
      <option value="Male">Male</option>
      <option value="Female">Female</option>
    </select><br>
    
    <select id="edit-interest">
      <option value="">Select Interest</option>
      <option value="Friends 💚">Friends 💚</option>
      <option value="Hangout 🩵">Hangout 🩵</option>
      <option value="Serious Relationship 💖">Serious Relationship 💖</option>
      <option value="Marriage 💘">Marriage 💘</option>
    </select><br>

    <button class="save-btn" onclick="saveProfile()">💾 Save Profile</button>
  </div>

  <!-- People Tab -->
  <div id="people-tab" style="display:none;">
    <div class="filter-panel">
      <select id="filter-gender">
        <option value="">All Genders</option>
        <option value="Male">Male</option>
        <option value="Female">Female</option>
      </select>
      <select id="filter-location-people">
        <option value="">All Locations</option>
      </select>
      <select id="filter-interest">
        <option value="">All Interests</option>
        <option value="Friends 💚">Friends 💚</option>
        <option value="Hangout 🩵">Hangout 🩵</option>
        <option value="Serious Relationship 💖">Serious Relationship 💖</option>
        <option value="Marriage 💘">Marriage 💘</option>
      </select>
      <button class="save-btn" onclick="applyFilters()">🔍 Apply Filters</button>
    </div>
    <div id="swipe-container">Loading profiles...</div>
    <div id="chat-users"></div>
  </div>

  <!-- Likes Tab -->
  <div id="liked-tab" style="display:none;">
    <h3>Who Likes Me</h3>
    <div id="liked-container">No likes yet!</div>
  </div>

  <!-- Chat Tab -->
  <div id="chats-tab" style="display:none;">
    <div id="chat-header">
      <img id="chat-profile-pic" src="" style="width:50px;height:50px;border-radius:50%;">
      <span id="chat-name" style="font-weight:bold;font-size:18px;margin-left:10px;"></span>
    </div>
    <div id="chat-box" style="border:1px solid #ccc; padding:10px; height:300px; overflow-y:auto;"></div>
  </div>

</div>

<!-- Bottom Navigation -->
<div class="tab-bar">
  <button onclick="showTab('profile')">👤</button>
  <button onclick="showTab('people')">🔥</button>
  <button onclick="showTab('liked')">💖</button>
  <button onclick="showTab('chats')">💬</button>
</div>

<script>
// Countries for location dropdown
const countries = ["Afghanistan","Albania","Algeria","Andorra","Angola","Antigua & Barbuda","Argentina","Armenia","Australia","Austria","Azerbaijan","Bahamas","Bahrain","Bangladesh","Barbados","Belarus","Belgium","Belize","Benin","Bhutan","Bolivia","Bosnia & Herzegovina","Botswana","Brazil","Brunei","Bulgaria","Burkina Faso","Burundi","Cabo Verde","Cambodia","Cameroon","Canada","Central African Republic","Chad","Chile","China","Colombia","Comoros","Congo","Costa Rica","Croatia","Cuba","Cyprus","Czech Republic","Denmark","Djibouti","Dominica","Dominican Republic","Ecuador","Egypt","El Salvador","Equatorial Guinea","Eritrea","Estonia","Eswatini","Ethiopia","Fiji","Finland","France","Gabon","Gambia","Georgia","Germany","Ghana","Greece","Grenada","Guatemala","Guinea","Guinea-Bissau","Guyana","Haiti","Honduras","Hungary","Iceland","India","Indonesia","Iran","Iraq","Ireland","Israel","Italy","Jamaica","Japan","Jordan","Kazakhstan","Kenya","Kiribati","Kuwait","Kyrgyzstan","Laos","Latvia","Lebanon","Lesotho","Liberia","Libya","Liechtenstein","Lithuania","Luxembourg","Madagascar","Malawi","Malaysia","Maldives","Mali","Malta","Marshall Islands","Mauritania","Mauritius","Mexico","Micronesia","Moldova","Monaco","Mongolia","Montenegro","Morocco","Mozambique","Myanmar","Namibia","Nauru","Nepal","Netherlands","New Zealand","Nicaragua","Niger","Nigeria","North Korea","North Macedonia","Norway","Oman","Pakistan","Palau","Palestine","Panama","Papua New Guinea","Paraguay","Peru","Philippines","Poland","Portugal","Qatar","Romania","Russia","Rwanda","Saint Kitts & Nevis","Saint Lucia","Saint Vincent & the Grenadines","Samoa","San Marino","Sao Tome & Principe","Saudi Arabia","Senegal","Serbia","Seychelles","Sierra Leone","Singapore","Slovakia","Slovenia","Solomon Islands","Somalia","South Africa","South Korea","South Sudan","Spain","Sri Lanka","Sudan","Suriname","Sweden","Switzerland","Syria","Taiwan","Tajikistan","Tanzania","Thailand","Timor-Leste","Togo","Tonga","Trinidad & Tobago","Tunisia","Turkey","Turkmenistan","Tuvalu","Uganda","Ukraine","United Arab Emirates","United Kingdom","United States","Uruguay","Uzbekistan","Vanuatu","Vatican City","Venezuela","Vietnam","Yemen","Zambia","Zimbabwe"];

// Fill location dropdowns
const editLocation = document.getElementById('edit-location');
countries.forEach(c => { editLocation.innerHTML += `<option value="${c}">${c}</option>`; });

const filterLocationPeople = document.getElementById('filter-location-people');
countries.forEach(c => { filterLocationPeople.innerHTML += `<option value="${c}">${c}</option>`; });

const profilePicInput = document.getElementById('profilePicInput');
const profilePicPreview = document.getElementById('user-profile-pic');
const usernameInput = document.getElementById('edit-username');
const ageInput = document.getElementById('edit-age');
const genderInput = document.getElementById('edit-gender');
const interestInput = document.getElementById('edit-interest');

// Load saved profile info
let profileData = JSON.parse(localStorage.getItem('userProfile'));
if(profileData){
  usernameInput.value = profileData.username;
  ageInput.value = profileData.age;
  editLocation.value = profileData.location;
  genderInput.value = profileData.gender;
  interestInput.value = profileData.interest;
  profilePicPreview.src = profileData.profilePic;
}

// Handle profile pic change
profilePicInput.addEventListener('change', function(e){
  const file = e.target.files[0];
  if(file){
    const reader = new FileReader();
    reader.onload = function(event){
      profilePicPreview.src = event.target.result;
      profileData.profilePic = event.target.result;
      localStorage.setItem('userProfile', JSON.stringify(profileData));
    }
    reader.readAsDataURL(file);
  }
});

// Save profile
function saveProfile(){
  const username = usernameInput.value.trim();
  const age = ageInput.value.trim();
  const location = editLocation.value;
  const gender = genderInput.value;
  const interest = interestInput.value;

  if(!username || !age || !location || !gender || !interest){
    alert("Please fill all fields!");
    return;
  }

  profileData = {
    username,
    age,
    location,
    gender,
    interest,
    profilePic: profilePicPreview.src
  };

  localStorage.setItem('userProfile', JSON.stringify(profileData));
  alert("Profile saved successfully!");
}

// ----- Tabs -----
function showTab(tab){
  ['profile-tab','people-tab','liked-tab','chats-tab'].forEach(t=>{
    document.getElementById(t).style.display='none';
  });
  document.getElementById(tab+'-tab').style.display='block';
}

// Show profile tab first
showTab('profile');

// ----- Demo People Profiles -----
const demoProfiles = [];
const demoNamesMale = ["John","David","Michael","James","Robert","William","Thomas","Henry","Jack","Luke"];
const demoNamesFemale = ["Alice","Emma","Olivia","Sophia","Clara","Mia","Grace","Eva","Lily","Amelia"];
const locations = countries;
const interests = ["Friends 💚","Hangout 🩵","Serious Relationship 💖","Marriage 💘"];
for(let i=0;i<20;i++){
  demoProfiles.push({name: demoNamesMale[Math.floor(Math.random()*demoNamesMale.length)], age:20+Math.floor(Math.random()*15), gender:"Male", location:locations[Math.floor(Math.random()*locations.length)], interest:interests[Math.floor(Math.random()*interests.length)], pic:`https://randomuser.me/api/portraits/men/${i}.jpg`, messages: [], addedToChat:false, ignored:false});
  demoProfiles.push({name: demoNamesFemale[Math.floor(Math.random()*demoNamesFemale.length)], age:20+Math.floor(Math.random()*15), gender:"Female", location:locations[Math.floor(Math.random()*locations.length)], interest:interests[Math.floor(Math.random()*interests.length)], pic:`https://randomuser.me/api/portraits/women/${i}.jpg`, messages: [], addedToChat:false, ignored:false});
}

let currentIndex = 0;
let filteredProfiles = demoProfiles.slice();
const swipeContainer = document.getElementById('swipe-container');
const chatUsersDiv = document.getElementById('chat-users');
const chatBox = document.getElementById('chat-box');
const chatProfilePic = document.getElementById('chat-profile-pic');
const chatName = document.getElementById('chat-name');

function showProfileCard(){
  while(currentIndex < filteredProfiles.length && filteredProfiles[currentIndex].ignored) currentIndex++;
  if(currentIndex >= filteredProfiles.length){ swipeContainer.innerHTML="No more profiles!"; return; }
  const p = filteredProfiles[currentIndex];
  swipeContainer.innerHTML=`
    <div class="card">
      <img src="${p.pic}" style="width:120px;height:120px;border-radius:50%;"><br>
      <h3>${p.name}, ${p.age}</h3>
      <p>${p.gender} | ${p.location}</p>
      <p>Interest: ${p.interest}</p>
      <div class="actions">
        <button onclick="swipe('like')">💖 Like</button>
        <button onclick="swipe('ignore')">❌ Ignore</button>
        <button onclick="messageCurrent()">💬 Message</button>
      </div>
    </div>
  `;
}

// Swipe functions
function swipe(action){
  const p = filteredProfiles[currentIndex];
  if(action==="like") addChat(p);
  if(action==="ignore") p.ignored=true;
  currentIndex++;
  showProfileCard();
}

function messageCurrent(){
  const p = filteredProfiles[currentIndex];
  if(p) addChat(p);
}

function addChat(profile){
  if(!profile.addedToChat){
    const btn = document.createElement('button');
    btn.innerHTML=`<span>${profile.name}</span> 💬`;
    btn.onclick = ()=>openChat(profile);
    chatUsersDiv.appendChild(btn);
    profile.addedToChat=true;
    profile.messages.push({from:profile.name,text:"Hi there! 💖 Let's chat!"});
  }
  openChat(profile);
}

function openChat(profile){
  chatName.innerText = profile.name;
  chatProfilePic.src = profile.pic;
  chatBox.innerHTML = "";
  profile.messages.forEach(msg=>addMessage(msg.from,msg.text));
}

function addMessage(sender,text){
  const div = document.createElement('div');
  div.innerText = sender+": "+text;
  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
}

// Auto reply demo
function autoReply(profile){
  const messages = ["Hey you 😘","You have the most amazing smile 💖","Can't stop thinking about you 💘","Would love to go on a date with you 🥰","You're amazing 😍"];
  const randomMsg = messages[Math.floor(Math.random()*messages.length)];
  setTimeout(()=> {
    profile.messages.push({from:profile.name, text: randomMsg});
    if(chatName.innerText === profile.name){
      addMessage(profile.name, randomMsg);
    }
  }, 1000 + Math.random()*2000);
}

// Filters
function applyFilters(){
  const gender = document.getElementById('filter-gender').value;
  const location = document.getElementById('filter-location-people').value;
  const interest = document.getElementById('filter-interest').value;

  filteredProfiles = demoProfiles.filter(p=>{
    return !p.ignored &&
           (!gender || p.gender===gender) &&
           (!location || p.location===location) &&
           (!interest || p.interest===interest);
  });

  currentIndex=0;
  showProfileCard();
}

// Initial load
showTab('profile');
showProfileCard();

</script>

</body>
</html>
