<!DOCTYPE html>
<html>
<head>
  <title>Internal Match</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Tinder-style swipe cards */
    #card-container {
      position: relative;
      width: 300px;
      height: 400px;
      margin: 50px auto;
    }
    .card {
      position: absolute;
      width: 100%;
      height: 100%;
      background: #111;
      border-radius: 15px;
      box-shadow: 0 0 15px gold;
      color: gold;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 10px;
      cursor: grab;
      user-select: none;
      transition: transform 0.3s ease;
    }
    .card img {
      width: 100%;
      border-radius: 15px;
      flex: 1;
    }
    .buttons {
      display: flex;
      justify-content: space-between;
      width: 100%;
    }
    .buttons button {
      width: 45%;
      padding: 10px;
      background: gold;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }
  </style>
</head>
<body class="bg">
  <h2 id="welcome"></h2>
  <p>Coins: <span id="coins">10</span></p>
  <a href="premium.html"><button class="premium-btn">Buy Premium</button></a>

  <div id="card-container"></div>

  <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, collection, getDocs, doc, setDoc, updateDoc, getDoc, query } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    // 🔴 PASTE YOUR FIREBASE CONFIG HERE
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  const cardContainer = document.getElementById("card-container");
  const coinsEl = document.getElementById("coins");
  const welcomeEl = document.getElementById("welcome");

  let currentUser = null;
  let coins = 10;
  let profiles = [];

  // Monitor auth state
  onAuthStateChanged(auth, async user => {
    if (!user) {
      window.location.href = "index.html";
    } else {
      currentUser = user;
      welcomeEl.innerText = `Welcome ${user.email}`;
      coins = 10;
      coinsEl.innerText = coins;

      await loadProfiles();
      renderCards();
    }
  });

  // Load all profiles from Firestore except current user
  async function loadProfiles() {
    const q = query(collection(db, "users"));
    const snapshot = await getDocs(q);
    profiles = [];
    snapshot.forEach(docSnap => {
      const data = docSnap.data();
      if(data.uid !== currentUser.uid) profiles.push(data);
    });
  }

  // Render Tinder-style cards
  function renderCards() {
    cardContainer.innerHTML = "";
    profiles.forEach((profile, index) => {
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <img src="${profile.photoURL || 'https://randomuser.me/api/portraits/lego/1.jpg'}">
        <h3>${profile.name || profile.email}</h3>
        <p>Age: ${profile.age || '18+'}</p>
        <div class="buttons">
          <button onclick="ignoreCard(${index})">❌</button>
          <button onclick="likeCard(${index})">❤️</button>
        </div>
      `;
      cardContainer.appendChild(card);
    });
  }

  async function likeCard(index) {
    if(coins <= 0){
      alert("No coins! Buy premium.");
      return;
    }
    coins--;
    coinsEl.innerText = coins;

    const likedUser = profiles[index];
    // Save like in Firestore
    await setDoc(doc(db, "likes", `${currentUser.uid}_${likedUser.uid}`), {from: currentUser.uid, to: likedUser.uid});

    // Check for match
    const docSnap = await getDoc(doc(db, "likes", `${likedUser.uid}_${currentUser.uid}`));
    if(docSnap.exists()){
      alert(`💘 It's a Match with ${likedUser.name || likedUser.email}!`);
      // Optional: create chat room here
      await setDoc(doc(db, "matches", `${currentUser.uid}_${likedUser.uid}`), {users:[currentUser.uid, likedUser.uid], createdAt: new Date()});
    }

    profiles.splice(index,1);
    renderCards();
  }

  function ignoreCard(index){
    profiles.splice(index,1);
    renderCards();
  }

  </script>
</body>
</html>
