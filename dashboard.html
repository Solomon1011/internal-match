<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>Welcome to 💘 Internal Match</h2>

<button id="logoutBtn">Logout</button>

<script type="module">

import { logout, checkAuth } from "./app.js";

checkAuth(user => {

if(!user){

window.location.href = "login.html";

}

});

document.getElementById("logoutBtn").onclick = async () => {

await logout();

window.location.href = "login.html";

};

</script>

</body>
</html>
