<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Internal Match - Dashboard</title>
<link rel="stylesheet" href="style.css">
<style>
body {margin:0; font-family:Arial; background:#111; color:white;}
h2{text-align:center;margin:10px 0;}
.tab-content{padding-bottom:80px;}
.tab{display:none;padding:15px;text-align:center;}
.card{background:#1c1c1c;padding:20px;border-radius:20px;margin:10px 0;}
input,select,button{width:90%;padding:10px;margin:5px 0;border-radius:10px;border:none;font-size:16px;}
button{background:gold;font-weight:bold;cursor:pointer;}
.tab-bar{position:fixed;bottom:0;width:100%;background:black;display:flex;justify-content:space-around;padding:10px 0;border-top:2px solid gold;}
.tab-bar button{background:none;border:none;color:gold;font-size:22px;}
#profilePic{width:120px;height:120px;border-radius:50%;border:2px solid gold;margin-bottom:10px;}
</style>
</head>
<body>

<h2>💘 Internal Match</h2>

<div class="tab-content">

  <!-- PROFILE -->
  <div id="profile" class="tab">
    <div class="card">
      <h3>My Profile</h3>
      <img id="dashboardProfilePic" src="https://randomuser.me/api/portraits/lego/1.jpg" alt="Profile Picture">
      <input type="file" id="photoInput" accept="image/*" capture="user">

      <input type="text" id="nameInput" placeholder="Name">
      <input type="number" id="ageInput" placeholder="Age" min="1" max="120">
      <select id="genderInput">
        <option value="">Select Gender</option>
        <option value="Male">Male</option>
        <option value="Female">Female</option>
        <option value="Other">Other</option>
      </select>
      <input type="text" id="locationInput" placeholder="Location">

      <button onclick="saveProfile()">Save Profile</button>
    </div>
  </div>

  <!-- PEOPLE -->
  <div id="people" class="tab">
    <div class="card">
      <h3>People</h3>
      <p>User 1 <button onclick="openChat('User 1')">Chat</button></p>
      <p>User 2 <button onclick="openChat('User 2')">Chat</button></p>
    </div>
  </div>

  <!-- LIKED -->
  <div id="liked" class="tab">
    <div class="card">
      <h3>Liked</h3>
      <div id="liked-container">No liked users yet</div>
    </div>
  </div>

  <!-- CHAT -->
  <div id="chat" class="tab">
    <div id="chat-box" style="height:300px; overflow-y:auto; background:#000; padding:10px; margin-bottom:10px; border-radius:10px;"></div>
    <input id="chat-input" placeholder="Type message">
    <button onclick="sendMessage()">Send</button>
  </div>

</div>

<!-- bottom navigation -->
<div class="tab-bar">
  <button onclick="showTab('profile')">👤</button>
  <button onclick="showTab('people')">❤️</button>
  <button onclick="showTab('liked')">⭐</button>
  <button onclick="showTab('chat')">💬</button>
</div>

<script>
function showTab(tab){
  document.querySelectorAll(".tab").forEach(t=>t.style.display="none");
  document.getElementById(tab).style.display="block";
}
showTab('profile');

// Elements
const profilePic = document.getElementById("dashboardProfilePic");
const photoInput = document.getElementById("photoInput");
const nameInput = document.getElementById("nameInput");
const ageInput = document.getElementById("ageInput");
const genderInput = document.getElementById("genderInput");
const locationInput = document.getElementById("locationInput");

// Load profile
function loadProfile(){
  const savedPic = localStorage.getItem("profilePic") || "https://randomuser.me/api/portraits/lego/1.jpg";
  const savedName = localStorage.getItem("name") || "";
  const savedAge = localStorage.getItem("age") || "";
  const savedGender = localStorage.getItem("gender") || "";
  const savedLocation = localStorage.getItem("location") || "";

  profilePic.src = savedPic;
  nameInput.value = savedName;
  ageInput.value = savedAge;
  genderInput.value = savedGender;
  locationInput.value = savedLocation;
}

// Save profile
function saveProfile(){
  if(!nameInput.value || !ageInput.value || !genderInput.value || !locationInput.value){
    alert("Please fill all fields.");
    return;
  }
  localStorage.setItem("profilePic", profilePic.src);
  localStorage.setItem("name", nameInput.value);
  localStorage.setItem("age", ageInput.value);
  localStorage.setItem("gender", genderInput.value);
  localStorage.setItem("location", locationInput.value);
  alert("Profile updated successfully!");
}

// Photo upload (Android-friendly)
photoInput.addEventListener("change", function(){
  const file = this.files[0];
  if(!file) return;
  profilePic.src = URL.createObjectURL(file);
  // Save as Data URL
  const reader = new FileReader();
  reader.onload = function(e){
    localStorage.setItem("profilePic", e.target.result);
  }
  reader.readAsDataURL(file);
});

// Chat
let currentChat = null;
function openChat(user){ currentChat=user; showTab('chat'); updateChatBox(); }
function sendMessage(){
  if(!currentChat) return;
  const input=document.getElementById("chat-input");
  if(input.value.trim()=="") return;
  const box=document.getElementById("chat-box");
  const msg=document.createElement("div");
  msg.className="message user";
  msg.innerText=input.value;
  box.appendChild(msg);
  input.value="";
  box.scrollTop=box.scrollHeight;
}
function updateChatBox(){
  const box=document.getElementById("chat-box");
  box.innerHTML="";
  if(currentChat){
    const msg=document.createElement("div");
    msg.className="message other";
    msg.innerText="Chat with "+currentChat+" started!";
    box.appendChild(msg);
  }
}

// Load profile on page load
window.onload = loadProfile;
</script>

</body>
</html>
