<!DOCTYPE html>
<html>
<head>
  <title>Internal Match Dashboard</title>
  <script src="https://js.paystack.co/v1/inline.js"></script>
  <style>
    body { background:#1a1a1a; color:#f5d061; font-family:Arial; padding:20px; margin:0; }
    h2 { text-align:center; }
    .tab-bar { position:fixed; bottom:0; width:100%; display:flex; justify-content:space-around; background:#111; border-top:1px solid #f5d061; padding:10px 0; }
    .tab-bar button { background:none; border:none; color:#f5d061; font-size:16px; cursor:pointer; }
    .tab-content { margin-bottom:80px; }
    #chat-box { border:1px solid #f5d061; padding:10px; height:200px; overflow-y:scroll; margin-bottom:10px; }
    button { background:#f5d061; color:#1a1a1a; border:none; padding:8px 12px; margin:2px; cursor:pointer; border-radius:4px; }
    input[type=text] { padding:6px; width:70%; margin-right:5px; border-radius:4px; border:1px solid #f5d061; background:#111; color:#f5d061; }
    img { border-radius:50%; }
  </style>
</head>
<body>

<h2>💘 Internal Match Dashboard</h2>

<div class="tab-content">

  <!-- Profile Tab -->
  <div id="profile-tab" style="display:none;">
    <h3>My Profile</h3>
    <img id="profile-pic-display" src="" width="100"><br>
    <p>Username: <span id="user-name"></span></p>
    <p>Email: <span id="user-email"></span></p>
    <p>Age: <span id="user-age"></span></p>
    <p>DOB: <span id="user-dob"></span></p>
    <p>Location: <span id="user-location"></span></p>
    <p>Gender: <span id="user-gender"></span></p>
    <p>Interest: <span id="user-interest"></span></p>
    <p>Coins: <span id="coins">Loading...</span></p>
    <p>Premium: <span id="premium-status">No</span></p>
    <button onclick="buyPremium()">Buy Premium</button>
    <button onclick="useCoin()">Use 1 Coin</button><br><br>
    <button onclick="logout()">Logout</button>
  </div>

  <!-- People Profiles Tab -->
  <div id="people-tab" style="display:none;">
    <h3>People Profiles</h3>
    <div id="swipe-container">Loading profiles...</div>
    <button onclick="swipe('like')">Like</button>
    <button onclick="swipe('dislike')">Dislike</button>
  </div>

  <!-- Who Likes Me Tab -->
  <div id="liked-tab" style="display:none;">
    <h3>Who Likes Me</h3>
    <div id="liked-container">Loading...</div>
  </div>

  <!-- Chat Tab -->
  <div id="chats-tab" style="display:none;">
    <h3>Chat with Matches</h3>
    <div id="chat-users" style="margin-bottom:10px;"></div>
    <div id="chat-box"></div>
    <input type="text" id="message-input" placeholder="Type a message">
    <button onclick="sendMessage()">Send</button>
  </div>

</div>

<!-- Bottom Tab Bar -->
<div class="tab-bar">
  <button onclick="showTab('profile')">Profile</button>
  <button onclick="showTab('people')">People</button>
  <button onclick="showTab('liked')">Likes</button>
  <button onclick="showTab('chats')">Chats</button>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDIZnZjeCROX5UmcqUQIfTdt6oRU6AmvOg",
  authDomain: "internal-match.firebaseapp.com",
  projectId: "internal-match",
  storageBucket: "internal-match.appspot.com",
  messagingSenderId: "129707008837",
  appId: "1:129707008837:web:f3f0033bbbe673107a542c"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();

// Tabs
function showTab(tab){
  ['profile','people','liked','chats'].forEach(t=>{
    document.getElementById(t+'-tab').style.display='none';
  });
  document.getElementById(tab+'-tab').style.display='block';
}

// Auth
auth.onAuthStateChanged(user=>{
  if(!user) window.location.href="index.html";
  else {
    loadUserProfile(user.uid);
    loadProfiles(user.uid);
    loadMatches();
    loadWhoLikedMe();
    showTab('profile');
  }
});

// Load Profile
function loadUserProfile(uid){
  db.collection('users').doc(uid).get().then(doc=>{
    if(doc.exists){
      const data = doc.data();
      document.getElementById('user-name').innerText = data.username||'';
      document.getElementById('user-email').innerText = auth.currentUser.email;
      document.getElementById('user-age').innerText = data.age||'';
      document.getElementById('user-dob').innerText = data.dob||'';
      document.getElementById('user-location').innerText = data.location||'';
      document.getElementById('user-gender').innerText = data.gender||'';
      document.getElementById('user-interest').innerText = data.interest||'';
      document.getElementById('profile-pic-display').src = data.profilePic||'';
      document.getElementById('coins').innerText = data.coins;
      document.getElementById('premium-status').innerText = data.premium?'Yes':'No';
    }
  });
}

// Coins
function useCoin(){
  const user = auth.currentUser;
  const userRef = db.collection('users').doc(user.uid);
  userRef.get().then(doc=>{
    let coins = doc.data().coins;
    if(coins>0){
      userRef.update({coins: coins-1});
      document.getElementById('coins').innerText = coins-1;
    } else alert("No coins left!");
  });
}

// Buy Premium
function buyPremium(){
  const user = auth.currentUser;
  const userRef = db.collection('users').doc(user.uid);
  let handler = PaystackPop.setup({
    key:'YOUR_PUBLIC_PAYSTACK_KEY', // Replace
    email:user.email,
    amount:5000,
    currency:'NGN',
    ref:''+Math.floor(Math.random()*1000000000+1),
    onClose:()=>alert('Payment cancelled'),
    callback:()=>{ userRef.update({premium:true}); document.getElementById('premium-status').innerText='Yes'; alert("You are now Premium!"); }
  });
  handler.openIframe();
}

// Logout
function logout(){ auth.signOut().then(()=>window.location.href='index.html'); }

// Swipe
let currentProfileIndex=0, profiles=[];
function loadProfiles(uid){
  db.collection('users').get().then(snapshot=>{
    profiles=snapshot.docs.filter(d=>d.id!==uid).map(d=>({id:d.id,...d.data()}));
    showProfile();
  });
}
function showProfile(){
  const container=document.getElementById('swipe-container');
  if(currentProfileIndex>=profiles.length){ container.innerHTML="No more profiles!"; return; }
  const p=profiles[currentProfileIndex];
  container.innerHTML=`<img src="${p.profilePic||''}" width="80"><br>${p.username} | ${p.age} | ${p.gender}<br>${p.location}<br>${p.interest}`;
}
function swipe(type){
  const user=auth.currentUser;
  const profile=profiles[currentProfileIndex];
  db.collection('likes').add({from:user.uid,to:profile.id,type:type});
  db.collection('likes').where('from','==',profile.id).where('to','==',user.uid).where('type','==','like').get()
  .then(snap=>{ if(!snap.empty){ db.collection('matches').add({user1:user.uid,user2:profile.id}); alert("It's a match! 💘"); }});
  currentProfileIndex++;
  showProfile();
}

// Who likes me
function loadWhoLikedMe(){
  const user=auth.currentUser;
  db.collection('likes').where('to','==',user.uid).where('type','==','like').get()
  .then(snap=>{
    const container=document.getElementById('liked-container');
    container.innerHTML='';
    if(snap.empty) container.innerText='No one liked you yet!';
    else snap.forEach(d=>{ container.innerHTML+='<div>'+d.data().from+'</div>'; });
  });
}

// Chat
let currentChatId=null;
function loadMatches(){
  const user=auth.currentUser;
  db.collection('matches').where('user1','==',user.uid).get().then(showMatchUsers);
  db.collection('matches').where('user2','==',user.uid).get().then(showMatchUsers);
}
function showMatchUsers(snapshot){
  const chatUsersDiv=document.getElementById('chat-users');
  snapshot.forEach(doc=>{
    const data=doc.data();
    const matchUid = data.user1===auth.currentUser.uid?data.user2:data.user1;
    const btn=document.createElement('button');
    btn.innerText='Chat with '+matchUid;
    btn.onclick=()=>openChat(doc.id,matchUid);
    chatUsersDiv.appendChild(btn);
  });
}
function openChat(chatId,matchUid){
  currentChatId=chatId;
  const chatBox=document.getElementById('chat-box');
  chatBox.innerHTML='';
  const chatRef=db.collection('chats').doc(chatId);
  chatRef.get().then(doc=>{ if(!doc.exists){ chatRef.set({participants:[auth.currentUser.uid,matchUid],messages:[]}); } });
  chatRef.onSnapshot(doc=>{
    chatBox.innerHTML='';
    const messages=doc.data().messages||[];
    messages.forEach(m=>{
      const div=document.createElement('div');
      div.innerText=(m.from===auth.currentUser.uid?'Me: ':'Them: ')+m.text;
      chatBox.appendChild(div);
    });
    chatBox.scrollTop = chatBox.scrollHeight;
  });
}
function sendMessage(){
  if(!currentChatId) return alert("Select a match first!");
  const input=document.getElementById('message-input');
  const text=input.value.trim();
  if(!text) return;
  db.collection('chats').doc(currentChatId).update({
    messages: firebase.firestore.FieldValue.arrayUnion({from:auth.currentUser.uid,text:text,timestamp:firebase.firestore.Timestamp.now()})
  });
  input.value='';
}
</script>
</body>
</html>
