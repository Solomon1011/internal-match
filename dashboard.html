<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💘 Internal Match - Dashboard</title>
<link rel="stylesheet" href="style.css">

<style>
body { font-family: Arial, sans-serif; margin:0; background:#fff0f6; text-align:center; }
h2 { color:#ff4d6d; margin-top:10px; }
.card { width:90%; max-width:350px; margin:20px auto; background:#fff; border-radius:15px; box-shadow:0 4px 6px rgba(0,0,0,0.1); position:relative; overflow:hidden; }
.card img { width:100%; height:300px; object-fit:cover; border-top-left-radius:15px; border-top-right-radius:15px; }
.card-content { padding:10px; text-align:left; }
.card-content h3 { margin:0; font-size:18px; }
.card-content p { margin:5px 0; font-size:14px; color:#555; }
.button-row { display:flex; justify-content:space-around; margin-top:10px; }
.button-row button { width:60px; height:60px; border-radius:50%; border:none; cursor:pointer; font-size:24px; color:#fff; }
.like { background:#ff4d6d; }
.ignore { background:#888; }
.message { background:#4caf50; }
.online-dot { width:12px; height:12px; border-radius:50%; background:#00ff00; display:inline-block; margin-left:5px; }
.bottom-tabs { position:fixed; bottom:0; left:0; width:100%; height:60px; background:#fff; display:flex; justify-content:space-around; align-items:center; border-top:1px solid #ccc; }
.bottom-tabs button { background:none; border:none; display:flex; flex-direction:column; align-items:center; font-size:12px; color:#333; cursor:pointer; }
.bottom-tabs img { width:24px; height:24px; margin-bottom:2px; }
#profileModal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); justify-content:center; align-items:center; }
#profileModal .modal-content { width:90%; max-width:400px; background:#fff; border-radius:15px; padding:20px; text-align:left; position:relative; }
#profileModal img { width:100%; height:250px; object-fit:cover; border-radius:10px; }
#profileModal .close { position:absolute; top:10px; right:15px; font-size:24px; cursor:pointer; }
#chatModal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); justify-content:center; align-items:center; }
#chatModal .modal-content { width:90%; max-width:400px; background:#fff; border-radius:15px; padding:20px; text-align:left; display:flex; flex-direction:column; height:80%; }
#chatMessages { flex:1; overflow-y:auto; margin-bottom:10px; }
#chatMessages p { margin:5px 0; }
#chatInputRow { display:flex; }
#chatInputRow input { flex:1; padding:10px; border-radius:10px; border:1px solid #ccc; }
#chatInputRow button { padding:10px; background:#ff4d6d; color:#fff; border:none; border-radius:10px; margin-left:5px; cursor:pointer; }
</style>
</head>
<body>

<h2>💘 Internal Match</h2>

<div id="swipeContainer">
  <!-- Profile cards dynamically inserted here -->
</div>

<!-- Profile Modal -->
<div id="profileModal">
  <div class="modal-content">
    <span class="close" onclick="closeProfile()">×</span>
    <img id="modalProfileImg" src="">
    <h3 id="modalProfileName"></h3>
    <p id="modalProfileAge"></p>
    <p id="modalProfileCountry"></p>
    <p id="modalProfileInterest"></p>
  </div>
</div>

<!-- Chat Modal -->
<div id="chatModal">
  <div class="modal-content">
    <span class="close" onclick="closeChat()">×</span>
    <h3 id="chatProfileName"></h3>
    <div id="chatMessages"></div>
    <div id="chatInputRow">
      <input type="text" id="chatInput" placeholder="Type a message">
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>
</div>

<!-- Bottom Tabs -->
<div class="bottom-tabs">
  <button onclick="showTab('swipe')"><img src="assets/swipe.svg">Swipe</button>
  <button onclick="showTab('like')"><img src="assets/like.svg">Like</button>
  <button onclick="showTab('message')"><img src="assets/message.svg">Message</button>
  <button onclick="showTab('coins')"><img src="assets/coins.svg">Coins</button>
  <button onclick="showTab('profile')"><img src="assets/user.svg">Profile</button>
</div>

<script>
const demoProfiles = []
for(let i=1;i<=5000;i++){
demoProfiles.push({
id:i,
name:'User'+i,
age:18+Math.floor(Math.random()*12),
country:'Country'+((i%152)+1),
interest:['Friend 💖','Hangout 💚','Serious Relationship 💖','Marriage 💘'][Math.floor(Math.random()*4)],
photos:['https://picsum.photos/400/300?random='+i],
online: Math.random()<0.6
})
}

let currentIndex = 0
const swipeContainer = document.getElementById("swipeContainer")

function showProfile(index){
if(index>=demoProfiles.length){
swipeContainer.innerHTML="<p>No more profiles</p>"
return
}
let profile=demoProfiles[index]
swipeContainer.innerHTML=`
<div class="card" onclick="openProfile(${profile.id})">
<img src="${profile.photos[0]}">
<div class="card-content">
<h3>${profile.name} ${profile.online?'<span class="online-dot"></span>':''}</h3>
<p>Age: ${profile.age}</p>
<p>Country: ${profile.country}</p>
<p>Interest: ${profile.interest}</p>
<div class="button-row">
<button class="like" onclick="likeProfile(event,${profile.id})">❤</button>
<button class="ignore" onclick="ignoreProfile(event,${profile.id})">✖</button>
<button class="message" onclick="openChat(event,${profile.id})">💬</button>
</div>
</div>
</div>
`
}

function nextProfile(){ currentIndex++; showProfile(currentIndex) }

function likeProfile(e,id){ e.stopPropagation(); alert('Liked '+id); nextProfile() }
function ignoreProfile(e,id){ e.stopPropagation(); nextProfile() }
function openChat(e,id){ e.stopPropagation(); currentChatId=id; openChatModal(id) }
function openProfile(id){ const profile=demoProfiles.find(p=>p.id===id); document.getElementById("modalProfileImg").src=profile.photos[0]; document.getElementById("modalProfileName").innerText=profile.name; document.getElementById("modalProfileAge").innerText="Age: "+profile.age; document.getElementById("modalProfileCountry").innerText="Country: "+profile.country; document.getElementById("modalProfileInterest").innerText="Interest: "+profile.interest; document.getElementById("profileModal").style.display="flex"; }
function closeProfile(){ document.getElementById("profileModal").style.display="none" }

let currentChatId=null
function openChatModal(id){
const profile=demoProfiles.find(p=>p.id===id)
document.getElementById("chatProfileName").innerText=profile.name
document.getElementById("chatMessages").innerHTML=""
document.getElementById("chatModal").style.display="flex"
}
function closeChat(){ document.getElementById("chatModal").style.display="none" }

function aiReply(message){
message = message.toLowerCase()
if(message.includes("hi") || message.includes("hello")) return "Hi 😊 nice to meet you!"
if(message.includes("how are you")) return "I'm good 💕 what about you?"
let replies=["You seem interesting 😊","Tell me more about yourself","I enjoy chatting with you","What are your hobbies?","You seem kind"]
return replies[Math.floor(Math.random()*replies.length)]
}

function sendMessage(){
let input=document.getElementById("chatInput")
let text=input.value
if(!text) return
let chat=document.getElementById("chatMessages")
chat.innerHTML+=`<p><b>You:</b> ${text}</p>`
input.value=""
setTimeout(()=>{
chat.innerHTML+=`<p><b>${demoProfiles.find(p=>p.id===currentChatId).name}:</b> ${aiReply(text)}</p>`
chat.scrollTop=chat.scrollHeight
},1000)
}

function showTab(tab){
if(tab==='swipe'){ swipeContainer.style.display='block' }
else{ swipeContainer.style.display='none'; }
alert(tab+' tab clicked')
}

// Initialize
showProfile(currentIndex)
</script>

</body>
</html>
