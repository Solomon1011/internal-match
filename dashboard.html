<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💘 Internal Match - Dashboard</title>
<style>
body { font-family: Arial, sans-serif; margin:0; padding-bottom:60px; background:#fff0f6; text-align:center;}
h2 { color:#ff4d6d; margin-top:20px; }

/* Tab content */
.tab-content { display:none; padding-top:20px; min-height:80vh; }
.tab-content.active { display:block; }

/* Swipe Cards */
.card-container { position:relative; width:90%; max-width:350px; margin:20px auto; height:400px; }
.card { position:absolute; width:100%; height:100%; background:#fff; border-radius:12px; box-shadow:0 4px 8px rgba(0,0,0,0.2); transition:transform 0.3s ease; overflow:hidden; }
.card img { width:100%; height:60%; object-fit:cover; border-top-left-radius:12px; border-top-right-radius:12px; }
.card h3 { margin:10px 0 5px; }
.card p { margin:0 0 10px; color:#666; }
.card-actions { display:flex; justify-content:space-around; margin-top:auto; padding:10px; }
.card-actions button { padding:8px 12px; border:none; border-radius:6px; cursor:pointer; color:#fff; }
.like-btn { background:#28a745; }
.message-btn { background:#17a2b8; }
.ignore-btn { background:#dc3545; }

/* Liked Tab */
#likedList .liked-card { display:flex; align-items:center; margin:10px; padding:5px; border:1px solid #ccc; border-radius:8px; background:#fff; }
#likedList .liked-card img { width:50px; height:50px; border-radius:50%; margin-right:10px; }

/* Message Tab */
#messagesList .message-card { background:#fff; margin:5px; padding:10px; border-radius:8px; text-align:left; }
#messagesList .message-card.you { background:#ffdee0; }

/* Profile Tab */
.profile-form input, .profile-form select { width:80%; padding:8px; margin:8px 0; border-radius:6px; border:1px solid #ccc; }
.profile-form button { background:#ff4d6d; color:#fff; border:none; padding:10px 15px; border-radius:8px; cursor:pointer; }
.profile-form label { display:block; text-align:left; margin-left:10%; }

/* Bottom Tabs */
.bottom-tabs { position:fixed; bottom:0; left:0; width:100%; height:60px; background:#fff; display:flex; justify-content:space-around; align-items:center; border-top:1px solid #ccc; z-index:100; }
.bottom-tabs button { flex:1; border:none; background:#fff; color:#333; font-size:12px; display:flex; flex-direction:column; align-items:center; cursor:pointer; }
.bottom-tabs button.active { color:#ff4d6d; }
.bottom-tabs img { width:24px; height:24px; margin-bottom:2px; }
</style>
</head>
<body>

<h2>💘 Internal Match Dashboard</h2>

<!-- Swipe Tab -->
<div id="swipeTab" class="tab-content active">
  <div class="card-container" id="cards"></div>
</div>

<!-- Like Tab -->
<div id="likeTab" class="tab-content">
  <h3>People who liked you</h3>
  <div id="likedList"></div>
</div>

<!-- Message Tab -->
<div id="messageTab" class="tab-content">
  <h3>Messages</h3>
  <div id="messagesList"></div>
  <input type="text" id="messageInput" placeholder="Type message">
  <button onclick="sendMessage()">Send</button>
</div>

<!-- Profile Tab -->
<div id="profileTab" class="tab-content">
  <h3>Edit Profile</h3>
  <form class="profile-form" onsubmit="saveProfile(event)">
    <input type="text" id="username" placeholder="Username" required><br>
    <input type="number" id="age" placeholder="Age" min="13"><br>
    <input type="file" id="photo" accept="image/*"><br>
    <select id="country" required>
      <option value="">Select Country</option>
      <option value="USA">USA</option>
      <option value="UK">UK</option>
      <option value="Canada">Canada</option>
      <option value="France">France</option>
      <option value="Germany">Germany</option>
      <!-- Add the remaining 152+ countries -->
    </select><br>
    <label>Interest:</label>
    <label><input type="checkbox" value="Friend 💖" class="interest"> Friend 💖</label>
    <label><input type="checkbox" value="Hangout 💚" class="interest"> Hangout 💚</label>
    <label><input type="checkbox" value="Serious Relationship 💖" class="interest"> Serious Relationship 💖</label>
    <label><input type="checkbox" value="Marriage 💘" class="interest"> Marriage 💘</label><br>
    <button type="submit">Save Profile</button>
  </form>
</div>

<!-- Coins Tab -->
<div id="coinsTab" class="tab-content">
  <h3>Your Coins</h3>
  <p>You have <span id="coinCount">100</span> coins.</p>
</div>

<!-- Bottom Tab Buttons -->
<div class="bottom-tabs">
  <button class="tab-btn active" data-tab="swipeTab"><img src="https://img.icons8.com/ios/50/000000/swipe-right.png"/><span>Swipe</span></button>
  <button class="tab-btn" data-tab="likeTab"><img src="https://img.icons8.com/ios/50/000000/like--v1.png"/><span>Like</span></button>
  <button class="tab-btn" data-tab="messageTab"><img src="https://img.icons8.com/ios/50/000000/chat.png"/><span>Message</span></button>
  <button class="tab-btn" data-tab="profileTab"><img src="https://img.icons8.com/ios/50/000000/user.png"/><span>Profile</span></button>
  <button class="tab-btn" data-tab="coinsTab"><img src="https://img.icons8.com/ios/50/000000/coin.png"/><span>Coins</span></button>
</div>

<script>
// Tab switch
document.querySelectorAll(".tab-btn").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    document.querySelectorAll(".tab-content").forEach(c=>c.classList.remove("active"));
    document.getElementById(btn.dataset.tab).classList.add("active");
  });
});

// Demo swipe profiles
const demoProfiles = [
  {id:1, name:"Alice", age:24, photo:"https://randomuser.me/api/portraits/women/65.jpg", location:"USA", interests:["Friend 💖","Hangout 💚"]},
  {id:2, name:"Bob", age:27, photo:"https://randomuser.me/api/portraits/men/12.jpg", location:"UK", interests:["Serious Relationship 💖"]},
  {id:3, name:"Clara", age:22, photo:"https://randomuser.me/api/portraits/women/43.jpg", location:"Canada", interests:["Marriage 💘","Friend 💖"]},
];
let likedProfiles = [];
let messages = [];

// Render swipe cards
function renderCards(){
  const container = document.getElementById("cards");
  container.innerHTML="";
  demoProfiles.slice().reverse().forEach(p=>{
    const card = document.createElement("div");
    card.className="card";
    card.style.zIndex = demoProfiles.length - p.id;
    card.innerHTML = `
      <img src="${p.photo}" alt="${p.name}">
      <h3>${p.name}, ${p.age}</h3>
      <p>${p.location}</p>
      <div class="card-actions">
        <button class="like-btn" onclick="likeProfile(${p.id})">Like</button>
        <button class="message-btn" onclick="messageProfile(${p.id})">Message</button>
        <button class="ignore-btn" onclick="ignoreProfile(${p.id})">Ignore</button>
      </div>
    `;

    let startX=0, startY=0, isDragging=false;
    card.addEventListener("touchstart",e=>{ startX=e.touches[0].clientX; startY=e.touches[0].clientY; isDragging=true; });
    card.addEventListener("touchmove",e=>{
      if(!isDragging) return;
      const dx=e.touches[0].clientX-startX;
      const dy=e.touches[0].clientY-startY;
      card.style.transform=`translate(${dx}px,${dy}px) rotate(${dx/10}deg)`;
    });
    card.addEventListener("touchend",e=>{
      isDragging=false;
      const dx=e.changedTouches[0].clientX-startX;
      if(dx>100){ likeProfile(p.id); }
      else if(dx<-100){ ignoreProfile(p.id); }
      else{ card.style.transform="translate(0,0) rotate(0)"; }
    });
    container.appendChild(card);
  });
}

// Like, Ignore, Message
function likeProfile(id){
  const index=demoProfiles.findIndex(p=>p.id===id);
  likedProfiles.push(demoProfiles[index]);
  demoProfiles.splice(index,1);
  renderCards();
  renderLiked();
}
function ignoreProfile(id){ const index=demoProfiles.findIndex(p=>p.id===id); demoProfiles.splice(index,1); renderCards();}
function messageProfile(id){ alert(`Open chat with ${demoProfiles.find(p=>p.id===id).name}`);}
function renderLiked(){ const container=document.getElementById("likedList"); container.innerHTML=""; likedProfiles.forEach(p=>{ const div=document.createElement("div"); div.className="liked-card"; div.innerHTML=`<img src="${p.photo}" alt="${p.name}"><p>${p.name}</p>`; container.appendChild(div);});}

// Messages
function sendMessage(){ 
  const input=document.getElementById("messageInput"); 
  if(input.value.trim()==="") return;
  messages.push({text:input.value, you:true}); 
  renderMessages(); 
  input.value=""; 
}
function renderMessages(){
  const container=document.getElementById("messagesList");
  container.innerHTML="";
  messages.forEach(m=>{ 
    const div=document.createElement("div"); 
    div.className="message-card"+(m.you?" you":""); 
    div.textContent=m.text; 
    container.appendChild(div);
  });
}

// Profile Save
function saveProfile(e){ 
  e.preventDefault();
  const username=document.getElementById("username").value;
  const age=document.getElementById("age").value;
  const country=document.getElementById("country").value;
  const interests=Array.from(document.querySelectorAll(".interest:checked")).map(i=>i.value);
  alert(`Profile saved!\nName: ${username}\nAge: ${age}\nCountry: ${country}\nInterests: ${interests.join(", ")}`);
}

// Initialize
renderCards();
renderLiked();
renderMessages();
</script>
</body>
</html>
