<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Internal Match Dashboard</title>
<style>
body { background:#1a1a1a; color:#f5d061; font-family:Arial; margin:0; padding:0; display:flex; flex-direction:column; align-items:center; }
h2{text-align:center; margin-top:20px;}
.tab-content { flex:1; width:100%; max-width:400px; text-align:center; padding:20px; box-sizing:border-box; display:flex; flex-direction:column; align-items:center; }
.tab-bar { position:fixed; bottom:0; width:100%; max-width:400px; display:flex; justify-content:space-around; background:#111; border-top:1px solid #f5d061; padding:10px 0; }
.tab-bar button { background:none; border:none; color:#f5d061; font-size:14px; cursor:pointer; display:flex; flex-direction:column; align-items:center; flex:1; }
.tab-bar img { width:28px; height:28px; margin-bottom:3px; }
.card { background:#222; border:1px solid #f5d061; border-radius:12px; padding:15px; margin:10px 0; width:100%; max-width:350px; display:flex; flex-direction:column; align-items:center; }
.card img { width:150px; height:150px; border-radius:50%; margin-bottom:10px; }
.card h3 { margin:5px 0; font-size:20px; font-weight:bold; }
.card p { margin:2px 0; font-size:14px; }
.card .actions { display:flex; justify-content:space-around; width:100%; margin-top:10px; }
.action-btn { background:#f5d061; color:#1a1a1a; border:none; padding:8px 12px; border-radius:6px; cursor:pointer; font-weight:bold; display:flex; align-items:center; justify-content:center; }
.action-btn img { width:20px; height:20px; margin-left:5px; }
#chat-box { border:1px solid #f5d061; padding:10px; height:200px; overflow-y:scroll; margin-bottom:10px; text-align:left; width:100%; max-width:350px; }
#chat-users button { display:flex; justify-content:space-between; width:100%; margin:5px 0; background:#222; border:none; color:#f5d061; padding:6px 8px; border-radius:4px; cursor:pointer; }
#chat-users img { width:24px; height:24px; cursor:pointer; }
</style>
</head>
<body>

<h2>💘 Internal Match Dashboard</h2>

<div class="tab-content">
  <div id="profile-tab" style="display:none;">
    <h3>My Profile</h3>
    <img id="user-profile-pic" src="https://randomuser.me/api/portraits/lego/1.jpg" alt="Profile"><br>
    <p>Email: <span id="user-email">demo@internal.com</span></p>
    <p>Username: <span id="user-username">DemoUser</span></p>
    <p>Age: <span id="user-age">25</span></p>
    <p>Location: <span id="user-location">Lagos</span></p>
    <p>Gender: <span id="user-gender">Male</span></p>
    <p>Interest: <span id="user-interest">Serious Relationship 💖</span></p>
  </div>

  <div id="people-tab" style="display:none;">
    <div id="swipe-container">Loading profiles...</div>
  </div>

  <div id="liked-tab" style="display:none;">
    <h3>Who Likes Me</h3>
    <div id="liked-container">No likes yet!</div>
  </div>

  <div id="chats-tab" style="display:none;">
    <h3 id="chat-with">Chat</h3>
    <div id="chat-box"></div>
  </div>
</div>

<div class="tab-bar">
  <button onclick="showTab('profile')"><img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">Profile</button>
  <button onclick="showTab('people')"><img src="https://cdn-icons-png.flaticon.com/512/1077/1077114.png">People</button>
  <button onclick="showTab('liked')"><img src="https://cdn-icons-png.flaticon.com/512/833/833472.png">Likes</button>
  <button onclick="showTab('chats')"><img src="https://cdn-icons-png.flaticon.com/512/2462/2462719.png">Chats</button>
</div>

<script>
// Tab switching
function showTab(tab){
  ['profile-tab','people-tab','liked-tab','chats-tab'].forEach(t=>document.getElementById(t).style.display='none');
  document.getElementById(tab+'-tab').style.display='block';
}
showTab('profile');

// Demo profiles
const malePics = Array.from({length:500}, (_,i)=>`https://randomuser.me/api/portraits/men/${i%100}.jpg`);
const femalePics = Array.from({length:500}, (_,i)=>`https://randomuser.me/api/portraits/women/${i%100}.jpg`);
const maleNames = ["John","David","Michael","James","Robert","William","Thomas","Henry","Jack","Luke"];
const femaleNames = ["Alice","Emma","Olivia","Sophia","Clara","Mia","Grace","Eva","Lily","Amelia"];
const locations = ["New York","London","Paris","Tokyo","Berlin","Madrid","Sydney","Lagos","Dubai","Rome"];
const interests = ["Friends 💚","Hangout 🩵","Serious Relationship 💖","Marriage 💘"];
const romanticMessages = ["Hey you 😘, I was hoping to meet you today!","You have the most amazing smile 💖","Can't stop thinking about you 💘","Would love to go on a date with you 🥰","You're amazing 😍"];

const demoProfiles = [];
for(let i=0;i<500;i++){
  demoProfiles.push({
    name: maleNames[Math.floor(Math.random()*maleNames.length)],
    age:20+Math.floor(Math.random()*15),
    gender:"Male",
    location:locations[Math.floor(Math.random()*locations.length)],
    interest:interests[Math.floor(Math.random()*interests.length)],
    pic: malePics[i],
    messages: [],
    addedToChat:false
  });
  demoProfiles.push({
    name: femaleNames[Math.floor(Math.random()*femaleNames.length)],
    age:20+Math.floor(Math.random()*15),
    gender:"Female",
    location:locations[Math.floor(Math.random()*locations.length)],
    interest:interests[Math.floor(Math.random()*interests.length)],
    pic: femalePics[i],
    messages: [],
    addedToChat:false
  });
}

let currentIndex = 0;
const swipeContainer = document.getElementById('swipe-container');
const chatUsersDiv = document.createElement('div');
document.getElementById('people-tab').appendChild(chatUsersDiv);
const chatBox = document.getElementById('chat-box');
const chatWithTitle = document.getElementById('chat-with');

function showProfile(){
  if(currentIndex >= demoProfiles.length){
    swipeContainer.innerHTML="No more profiles!";
    return;
  }
  const p = demoProfiles[currentIndex];
  swipeContainer.innerHTML=`
    <div class="card">
      <img src="${p.pic}">
      <h3>${p.name}, ${p.age}</h3>
      <p>${p.gender} | ${p.location}</p>
      <p>Interest: ${p.interest}</p>
      <div class="actions">
        <button class="action-btn" onclick="swipe('like')">💖 Like</button>
        <button class="action-btn" onclick="swipe('ignore')">❌ Ignore</button>
        <button class="action-btn" onclick="messageCurrent()">💬 Message</button>
      </div>
    </div>
  `;
}

function swipe(action){
  const p = demoProfiles[currentIndex];
  if(action==="like") {
    addChat(p);
    autoReply(p);
  }
  currentIndex++;
  showProfile();
}

function messageCurrent(){
  const p = demoProfiles[currentIndex];
  if(p) addChat(p);
}

function addChat(profile){
  if(!profile.addedToChat) {
    const btn = document.createElement('button');
    btn.innerHTML=`<span>${profile.name}</span> <img src="https://cdn-icons-png.flaticon.com/512/2462/2462719.png" title="Message">`;
    btn.onclick = ()=>openChat(profile);
    chatUsersDiv.appendChild(btn);
    profile.addedToChat=true;
    profile.messages.push({from:profile.name,text:"Hi there! 💖 Let's chat romantically!"});
  }
}

function openChat(profile){
  chatWithTitle.innerText = profile.name;
  chatBox.innerHTML = "";
  profile.messages.forEach(msg=>addMessage(msg.from,msg.text));
}

function addMessage(sender,text){
  const div = document.createElement('div');
  div.innerText = sender+": "+text;
  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
}

function autoReply(profile){
  // send 1-2 random romantic messages after 1-3 seconds
  const randomMsg = romanticMessages[Math.floor(Math.random()*romanticMessages.length)];
  setTimeout(()=> {
    profile.messages.push({from:profile.name, text: randomMsg});
    if(chatWithTitle.innerText === profile.name){
      addMessage(profile.name, randomMsg);
    }
  }, 1000 + Math.random()*2000);
}

// Initial display
showProfile();
</script>

</body>
</html>
