<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💘 Internal Match - Dashboard</title>
<style>
body { font-family: Arial, sans-serif; margin:0; padding-bottom:70px; background:#fff0f6; }
h2 { color:#ff4d6d; text-align:center; margin:10px 0; }
.section { display:none; padding:10px; }
.section.active { display:block; }
.profile-card { width:90%; max-width:350px; margin:20px auto; padding:10px; background:#fff; border-radius:10px; box-shadow:0 4px 8px rgba(0,0,0,0.2); text-align:center; position:relative; cursor:pointer;}
.profile-card img { width:150px; height:150px; border-radius:50%; object-fit:cover; margin-bottom:10px; }
.online-dot { position:absolute; top:10px; right:10px; width:15px; height:15px; background:green; border-radius:50%; border:2px solid white; }
.profile-actions { display:flex; justify-content:space-around; margin-top:10px; }
.profile-actions button { padding:10px; border:none; border-radius:50%; cursor:pointer; font-size:18px; }
.profile-actions button.like { background:#ff4d6d; color:white; }
.profile-actions button.ignore { background:#ccc; }
.profile-actions button.message { background:#4CAF50; color:white; }
.bottom-tabs { position:fixed; bottom:0; left:0; width:100%; height:60px; background:#fff; display:flex; justify-content:space-around; align-items:center; border-top:1px solid #ccc; }
.bottom-tabs button { border:none; background:none; display:flex; flex-direction:column; align-items:center; font-size:12px; cursor:pointer; }
.bottom-tabs span { font-size:20px; }
#profile-edit input, #profile-edit select { width:80%; padding:8px; margin:5px 0; border-radius:6px; border:1px solid #ccc; }
#profile-edit img { width:80px; height:80px; margin:5px; border-radius:8px; object-fit:cover; }
#chat-box { display:flex; flex-direction:column; height:60vh; overflow-y:auto; padding:10px; background:#fefefe; border-radius:10px; }
.chat-message { display:flex; align-items:flex-start; margin:5px 0; }
.chat-message.user img { order:2; margin-left:10px; width:40px; height:40px; border-radius:50%; }
.chat-message.other img { margin-right:10px; width:40px; height:40px; border-radius:50%; }
.chat-message p { max-width:70%; padding:8px; border-radius:10px; margin:0; }
.chat-message.user p { background:#ff4d6d; color:white; align-self:flex-end; }
.chat-message.other p { background:#ccc; }
</style>
</head>
<body>

<h2>💘 Internal Match</h2>

<!-- Sections -->
<div id="section-swipe" class="section active">
  <div id="swipe-area"></div>
</div>

<div id="section-like" class="section">
  <p>❤️ People who liked you will appear here.</p>
</div>

<div id="section-message" class="section">
  <h3 id="chat-with"></h3>
  <div id="chat-box"></div>
  <input type="text" id="chat-input" placeholder="Type message..." style="width:80%; padding:8px;">
  <button id="send-chat">Send</button>
</div>

<div id="section-coins" class="section">
  <p>💰 Coins store and purchases.</p>
</div>

<div id="section-profile" class="section">
  <div id="profile-edit">
    <h3>Edit Profile</h3>
    <input type="text" id="myName" placeholder="Your Name">
    <input type="number" id="myAge" placeholder="Age">
    <select id="myCountry"></select>
    <select id="myInterest">
      <option value="Friend 💖">Friend 💖</option>
      <option value="Hangout 💚">Hangout 💚</option>
      <option value="Serious Relationship 💖">Serious Relationship 💖</option>
      <option value="Marriage 💘">Marriage 💘</option>
    </select>
    <input type="file" id="photo1">
    <input type="file" id="photo2">
    <input type="file" id="photo3">
    <div id="photo-preview"></div>
    <button id="saveProfile">Save Profile</button>
  </div>
</div>

<!-- Bottom tabs -->
<div class="bottom-tabs">
  <button data-tab="section-swipe"><span>💖</span>Swipe</button>
  <button data-tab="section-like"><span>❤️</span>Like</button>
  <button data-tab="section-message"><span>💬</span>Messages</button>
  <button data-tab="section-coins"><span>💰</span>Coins</button>
  <button data-tab="section-profile"><span>👤</span>Profile</button>
</div>

<script>
// Tabs
const tabs = document.querySelectorAll('.bottom-tabs button');
tabs.forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll('.section').forEach(sec=>sec.classList.remove('active'));
    document.getElementById(btn.dataset.tab).classList.add('active');
  }
});

// Countries and skin tone mapping
const countries = [
  {name:"Nigeria", skin:"black"}, {name:"Kenya", skin:"black"}, {name:"USA", skin:"white"}, {name:"UK", skin:"white"},
  {name:"Germany", skin:"white"}, {name:"South Africa", skin:"black"}, {name:"India", skin:"brown"},
  {name:"Brazil", skin:"white"}, {name:"Mexico", skin:"white"}, {name:"France", skin:"white"}
  // …extend to 152 countries similarly
];
const countrySelect = document.getElementById("myCountry");
countries.forEach(c=>{ const opt=document.createElement("option"); opt.value=c.name; opt.textContent=c.name; countrySelect.appendChild(opt); });

// Demo profiles
let demoProfiles=[], currentProfileIndex=0, currentChatUser=null, userProfilePic='https://randomuser.me/api/portraits/lego/1.jpg';
const swipeArea=document.getElementById("swipe-area");

// Generate 5000+ profiles
function generateProfiles(){
  const malePicsWhite=[...Array(100).keys()].map(i=>`https://randomuser.me/api/portraits/men/${i}.jpg`);
  const femalePicsWhite=[...Array(100).keys()].map(i=>`https://randomuser.me/api/portraits/women/${i}.jpg`);
  const malePicsBlack=[...Array(100).keys()].map(i=>`https://randomuser.me/api/portraits/black/men${i}.jpg`);
  const femalePicsBlack=[...Array(100).keys()].map(i=>`https://randomuser.me/api/portraits/black/women${i}.jpg`);
  const namesMale=["John","Mike","David","James","Robert","William"];
  const namesFemale=["Emily","Sophia","Olivia","Emma","Ava"];

  for(let i=0;i<5000;i++){
    const country=countries[Math.floor(Math.random()*countries.length)];
    const gender=Math.random()>0.5?"male":"female";
    let photo="";
    if(country.skin==="white") photo=gender==="male"?malePicsWhite[Math.floor(Math.random()*malePicsWhite.length)]:femalePicsWhite[Math.floor(Math.random()*femalePicsWhite.length)];
    else if(country.skin==="black") photo=gender==="male"?malePicsBlack[Math.floor(Math.random()*malePicsBlack.length)]:femalePicsBlack[Math.floor(Math.random()*femalePicsBlack.length)];
    else photo='https://randomuser.me/api/portraits/lego/1.jpg';
    demoProfiles.push({
      name:gender==="male"?namesMale[Math.floor(Math.random()*namesMale.length)]:namesFemale[Math.floor(Math.random()*namesFemale.length)],
      age:Math.floor(Math.random()*30)+18,
      country:country.name,
      gender:gender,
      photo:photo,
      interest:["Friend 💖","Hangout 💚","Serious Relationship 💖","Marriage 💘"][Math.floor(Math.random()*4)],
      online: Math.random()>0.3
    });
  }
}
generateProfiles();

// Swipe function
function showProfile(){
  swipeArea.innerHTML='';
  if(currentProfileIndex>=demoProfiles.length) return;
  const p=demoProfiles[currentProfileIndex];
  const card=document.createElement('div'); card.className='profile-card';
  card.innerHTML=`
    ${p.online?'<div class="online-dot"></div>':''}
    <img src="${p.photo}">
    <h3>${p.name}, ${p.age}</h3>
    <p>${p.country} | ${p.interest}</p>
    <div class="profile-actions">
      <button class="like">❤️</button>
      <button class="ignore">❌</button>
      <button class="message">💬</button>
    </div>
  `;
  swipeArea.appendChild(card);

  card.querySelector(".like").onclick=e=>{e.stopPropagation(); currentProfileIndex++; showProfile(); autoReply(p);}
  card.querySelector(".ignore").onclick=e=>{e.stopPropagation(); currentProfileIndex++; showProfile(); autoReply(p);}
  card.querySelector(".message").onclick=e=>{
    e.stopPropagation(); currentChatUser=p; openChatWithUser(p);
  }
  card.onclick=()=>{ alert(`${p.name}'s Profile\nAge: ${p.age}\nCountry: ${p.country}\nInterest: ${p.interest}`);}
}
showProfile();

// Chat
const chatBox=document.getElementById("chat-box");
function openChatWithUser(user){
  currentChatUser=user;
  document.getElementById("chat-with").textContent=`Chat with ${user.name}`;
  chatBox.innerHTML='';
  document.querySelectorAll('.section').forEach(sec=>sec.classList.remove('active'));
  document.getElementById("section-message").classList.add('active');
}
document.getElementById("send-chat").onclick=()=>{
  const input=document.getElementById("chat-input");
  if(!input.value || !currentChatUser) return;
  addChatMessage(input.value,'user',userProfilePic);
  input.value='';
  setTimeout(()=>{ autoReply(currentChatUser); },1000);
};
function addChatMessage(msg,type,photo){
  const msgDiv=document.createElement('div'); msgDiv.className=`chat-message ${type}`;
  msgDiv.innerHTML=`${type==='other'?'<img src="'+photo+'">':''}<p>${msg}</p>${type==='user'?'<img src="'+photo+'">':''}`;
  chatBox.appendChild(msgDiv);
  chatBox.scrollTop=chatBox.scrollHeight;
}
function autoReply(profile){
  const replies=["Hey! 😊","How are you? 💖","I like your profile! 😍","Hello, wanna chat? 💚"];
  const reply=replies[Math.floor(Math.random()*replies.length)];
  addChatMessage(reply,'other',profile.photo);
}

// Profile photos preview
const photoInputs=[document.getElementById("photo1"),document.getElementById("photo2"),document.getElementById("photo3")];
const previewDiv=document.getElementById("photo-preview");
photoInputs.forEach(input=>{
  input.onchange=()=>{ previewDiv.innerHTML=''; photoInputs.forEach(pi=>{ if(pi.files[0]){ const img=document.createElement('img'); img.src=URL.createObjectURL(pi.files[0]); previewDiv.appendChild(img); } }) };
});
document.getElementById("saveProfile").onclick=()=>{ alert('Profile saved!'); }

</script>
</body>
</html>
