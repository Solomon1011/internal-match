
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Internal Match Dashboard</title>

<style>
body{
margin:0;
font-family:Arial;
background:#111;
color:white;
}

h2{
text-align:center;
margin-top:10px;
}

.tab-content{
padding-bottom:80px;
}

.tab{
display:none;
padding:15px;
text-align:center;
}

.card{
background:#1c1c1c;
padding:20px;
border-radius:20px;
margin:10px;
}

input{
width:90%;
padding:10px;
margin:5px;
border-radius:10px;
border:none;
}

button{
background:gold;
border:none;
padding:10px 20px;
border-radius:20px;
margin-top:10px;
font-weight:bold;
}

/* bottom navigation */
.tab-bar{
position:fixed;
bottom:0;
width:100%;
background:black;
display:flex;
justify-content:space-around;
padding:10px 0;
border-top:2px solid gold;
}

.tab-bar button{
background:none;
border:none;
color:gold;
font-size:22px;
}

/* chat */
#chat-box{
height:300px;
overflow-y:auto;
background:#000;
padding:10px;
margin-bottom:10px;
border-radius:10px;
}

.message{
padding:8px;
margin:5px;
border-radius:10px;
max-width:70%;
}

.user{
background:#25D366;
margin-left:auto;
}

.other{
background:#333;
}
</style>
</head>

<body>

<h2>💘 Internal Match</h2>

<div class="tab-content">

<!-- PROFILE -->
<div id="profile" class="tab">
<div class="card">
<h3>My Profile</h3>

<img src="https://randomuser.me/api/portraits/men/1.jpg" width="100" style="border-radius:50%"><br><br>

<input placeholder="Your Name">
<input placeholder="Age">
<input placeholder="Country">

<button>Save Profile</button>

</div>
</div>

<!-- PEOPLE -->
<div id="people" class="tab">
<div class="card">
<h3>People</h3>

<p>User 1</p>
<button onclick="openChat()">Chat</button>

<p>User 2</p>
<button onclick="openChat()">Chat</button>

</div>
</div>

<!-- LIKED -->
<div id="liked" class="tab">
<div class="card">
<h3>Liked</h3>
<p>No liked users yet</p>
</div>
</div>

<!-- CHAT -->
<div id="chat" class="tab">

<div id="chat-box"></div>

<input id="chat-input" placeholder="Type message">
<button onclick="sendMessage()">Send</button>

</div>

</div>

<!-- bottom navigation -->
<div class="tab-bar">

<button onclick="showTab('profile')">👤</button>
<button onclick="showTab('people')">❤️</button>
<button onclick="showTab('liked')">⭐</button>
<button onclick="showTab('chat')">💬</button>

</div>

<script>

function showTab(tab){

document.querySelectorAll(".tab").forEach(function(el){
el.style.display="none"
})

document.getElementById(tab).style.display="block"

}

showTab("profile")

function sendMessage(){

let input=document.getElementById("chat-input")
let box=document.getElementById("chat-box")

if(input.value.trim()=="") return

let msg=document.createElement("div")
msg.className="message user"
msg.innerText=input.value

box.appendChild(msg)

input.value=""

box.scrollTop=box.scrollHeight

}

</script>

</body>
</html>
