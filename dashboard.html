<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💘 Internal Match - Dashboard</title>
<style>
body { font-family: Arial, sans-serif; margin:0; background:#fff0f6; text-align:center; }
h2 { color:#ff4d6d; margin-top:10px; }
.card { width:90%; max-width:350px; margin:20px auto; background:#fff; border-radius:15px; box-shadow:0 4px 6px rgba(0,0,0,0.1); position:relative; overflow:hidden; touch-action: pan-y; }
.card img { width:100%; height:300px; object-fit:cover; border-top-left-radius:15px; border-top-right-radius:15px; }
.card-content { padding:10px; text-align:left; }
.card-content h3 { margin:0; font-size:18px; }
.card-content p { margin:5px 0; font-size:14px; color:#555; }
.button-row { display:flex; justify-content:space-around; margin-top:10px; }
.button-row button { width:60px; height:60px; border-radius:50%; border:none; cursor:pointer; font-size:24px; color:#fff; }
.like { background:#ff4d6d; }
.ignore { background:#888; }
.message { background:#4caf50; }
.online-dot { width:12px; height:12px; border-radius:50%; background:#00ff00; display:inline-block; margin-left:5px; }
.bottom-tabs { position:fixed; bottom:0; left:0; width:100%; height:60px; background:#fff; display:flex; justify-content:space-around; align-items:center; border-top:1px solid #ccc; }
.bottom-tabs button { background:none; border:none; display:flex; flex-direction:column; align-items:center; font-size:12px; color:#333; cursor:pointer; }
.bottom-tabs span { font-size:24px; margin-bottom:2px; }
.tab-content { display:none; padding-bottom:80px; }
#profileModal, #chatModal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); justify-content:center; align-items:center; }
.modal-content { width:90%; max-width:400px; background:#fff; border-radius:15px; padding:20px; text-align:left; position:relative; }
#profileModal img, #chatModal img { width:100%; height:250px; object-fit:cover; border-radius:10px; }
.close { position:absolute; top:10px; right:15px; font-size:24px; cursor:pointer; }
#chatModal .modal-content { display:flex; flex-direction:column; height:80%; }
#chatMessages { flex:1; overflow-y:auto; margin-bottom:10px; }
#chatMessages p { margin:5px 0; }
#chatInputRow { display:flex; }
#chatInputRow input { flex:1; padding:10px; border-radius:10px; border:1px solid #ccc; }
#chatInputRow button { padding:10px; background:#ff4d6d; color:#fff; border:none; border-radius:10px; margin-left:5px; cursor:pointer; }
input, select { margin:5px 0; padding:8px; width:100%; border-radius:10px; border:1px solid #ccc; }
</style>
</head>
<body>

<h2>💘 Internal Match</h2>

<!-- Tabs -->
<div id="swipe" class="tab-content"></div>
<div id="like" class="tab-content"></div>
<div id="message" class="tab-content">
  <div id="threads"></div>
</div>
<div id="coins" class="tab-content"><p>💰 Coins coming soon</p></div>
<div id="userProfileTab" class="tab-content">
  <h3>Edit Profile</h3>
  <input type="text" id="profileName" placeholder="Name">
  <input type="number" id="profileAge" placeholder="Age">
  <select id="profileCountry"></select>
  <select id="profileInterest">
    <option value="Friend 💖">Friend 💖</option>
    <option value="Hangout 💚">Hangout 💚</option>
    <option value="Serious Relationship 💖">Serious Relationship 💖</option>
    <option value="Marriage 💘">Marriage 💘</option>
  </select>
  <input type="file" id="profilePhotos" multiple accept="image/*">
  <button onclick="saveProfile()">Save Profile</button>
</div>

<!-- Profile Modal -->
<div id="profileModal">
  <div class="modal-content">
    <span class="close" onclick="closeProfile()">×</span>
    <img id="modalProfileImg" src="">
    <h3 id="modalProfileName"></h3>
    <p id="modalProfileAge"></p>
    <p id="modalProfileCountry"></p>
    <p id="modalProfileInterest"></p>
  </div>
</div>

<!-- Chat Modal -->
<div id="chatModal">
  <div class="modal-content">
    <span class="close" onclick="closeChat()">×</span>
    <img id="chatProfileImg" src="">
    <h3 id="chatProfileName"></h3>
    <div id="chatMessages"></div>
    <div id="chatInputRow">
      <input type="text" id="chatInput" placeholder="Type a message">
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>
</div>

<!-- Bottom Tabs -->
<div class="bottom-tabs">
  <button onclick="showTab('swipe')"><span>🔄</span>Swipe</button>
  <button onclick="showTab('like')"><span>💖</span>Like</button>
  <button onclick="showTab('message')"><span>💬</span>Message</button>
  <button onclick="showTab('coins')"><span>💰</span>Coins</button>
  <button onclick="showTab('userProfileTab')"><span>👤</span>Profile</button>
</div>

<script>
// 152 countries
const countries=["Afghanistan","Albania","Algeria","Andorra","Angola","Antigua & Barbuda","Argentina","Armenia","Australia","Austria","Azerbaijan","Bahamas","Bahrain","Bangladesh","Barbados","Belarus","Belgium","Belize","Benin","Bhutan","Bolivia","Bosnia & Herzegovina","Botswana","Brazil","Brunei","Bulgaria","Burkina Faso","Burundi","Cabo Verde","Cambodia","Cameroon","Canada","Central African Republic","Chad","Chile","China","Colombia","Comoros","Congo, Democratic Republic","Congo, Republic","Costa Rica","Croatia","Cuba","Cyprus","Czech Republic","Denmark","Djibouti","Dominica","Dominican Republic","Ecuador","Egypt","El Salvador","Equatorial Guinea","Eritrea","Estonia","Eswatini","Ethiopia","Fiji","Finland","France","Gabon","Gambia","Georgia","Germany","Ghana","Greece","Grenada","Guatemala","Guinea","Guinea-Bissau","Guyana","Haiti","Honduras","Hungary","Iceland","India","Indonesia","Iran","Iraq","Ireland","Israel","Italy","Jamaica","Japan","Jordan","Kazakhstan","Kenya","Kiribati","Kuwait","Kyrgyzstan","Laos","Latvia","Lebanon","Lesotho","Liberia","Libya","Liechtenstein","Lithuania","Luxembourg","Madagascar","Malawi","Malaysia","Maldives","Mali","Malta","Marshall Islands","Mauritania","Mauritius","Mexico","Micronesia","Moldova","Monaco","Mongolia","Montenegro","Morocco","Mozambique","Myanmar","Namibia","Nauru","Nepal","Netherlands","New Zealand","Nicaragua","Niger","Nigeria","North Korea","North Macedonia","Norway","Oman","Pakistan","Palau","Palestine","Panama","Papua New Guinea","Paraguay","Peru","Philippines","Poland","Portugal","Qatar","Romania","Russia","Rwanda","Saint Kitts & Nevis","Saint Lucia","Saint Vincent & the Grenadines","Samoa","San Marino","Sao Tome & Principe","Saudi Arabia","Senegal","Serbia","Seychelles","Sierra Leone","Singapore","Slovakia","Slovenia","Solomon Islands","Somalia","South Africa","South Korea","South Sudan","Spain","Sri Lanka","Sudan","Suriname","Sweden","Switzerland","Syria","Taiwan","Tajikistan","Tanzania","Thailand","Timor-Leste","Togo","Tonga","Trinidad & Tobago","Tunisia","Turkey","Turkmenistan","Tuvalu","Uganda","Ukraine","United Arab Emirates","United Kingdom","United States","Uruguay","Uzbekistan","Vanuatu","Vatican City","Venezuela","Vietnam","Yemen","Zambia","Zimbabwe"];

const countrySelect=document.getElementById("profileCountry");
countries.forEach(c=>{ let o=document.createElement("option"); o.value=c;o.innerText=c; countrySelect.appendChild(o) });

// Demo profiles
const demoProfiles=[]
for(let i=1;i<=5000;i++){
  demoProfiles.push({
    id:i,
    name:'User'+i,
    age:18+Math.floor(Math.random()*12),
    country:countries[i%152],
    interest:['Friend 💖','Hangout 💚','Serious Relationship 💖','Marriage 💘'][Math.floor(Math.random()*4)],
    photos:['https://picsum.photos/400/300?random='+i],
    online: Math.random()<0.6
  })
}

let currentIndex=0
const swipeContainer=document.getElementById("swipe")

function showProfile(index){
  if(index>=demoProfiles.length){ swipeContainer.innerHTML="<p>No more profiles</p>"; return; }
  let profile=demoProfiles[index]
  swipeContainer.innerHTML=`
  <div class="card" id="card${profile.id}" onclick="openProfile(${profile.id})">
    <img src="${profile.photos[0]}">
    <div class="card-content">
      <h3>${profile.name} ${profile.online?'<span class="online-dot"></span>':''}</h3>
      <p>Age: ${profile.age}</p>
      <p>Country: ${profile.country}</p>
      <p>Interest: ${profile.interest}</p>
      <div class="button-row">
        <button class="like" onclick="likeProfile(event,${profile.id})">❤</button>
        <button class="ignore" onclick="ignoreProfile(event,${profile.id})">✖</button>
        <button class="message" onclick="openChat(event,${profile.id})">💬</button>
      </div>
    </div>
  </div>`
  addSwipeEvents(document.getElementById(`card${profile.id}`))
}

// Swipe gestures
function addSwipeEvents(card){
  let startX=null
  card.addEventListener('touchstart', e=>{ startX=e.touches[0].clientX })
  card.addEventListener('touchend', e=>{
    let endX=e.changedTouches[0].clientX
    if(startX-endX>50){ nextProfile() } // swipe left
    if(endX-startX>50){ likeProfile({stopPropagation:()=>{}},demoProfiles[currentIndex].id) } // swipe right
  })
}

function nextProfile(){ currentIndex++; showProfile(currentIndex) }
let likedProfiles=[]
function likeProfile(e,id){ e.stopPropagation(); likedProfiles.push(demoProfiles.find(p=>p.id===id)); nextProfile(); updateLikeTab() }
function ignoreProfile(e,id){ e.stopPropagation(); nextProfile() }
let currentChatId=null
function openChat(e,id){ e.stopPropagation(); currentChatId=id; openChatModal(id) }
function openProfile(id){ 
  const profile=demoProfiles.find(p=>p.id===id)
  document.getElementById("modalProfileImg").src=profile.photos[0]
  document.getElementById("modalProfileName").innerText=profile.name
  document.getElementById("modalProfileAge").innerText="Age: "+profile.age
  document.getElementById("modalProfileCountry").innerText="Country: "+profile.country
  document.getElementById("modalProfileInterest").innerText="Interest: "+profile.interest
  document.getElementById("profileModal").style.display="flex"
}
function closeProfile(){ document.getElementById("profileModal").style.display="none" }

function openChatModal(id){
  const profile=demoProfiles.find(p=>p.id===id)
  document.getElementById("chatProfileImg").src=profile.photos[0]
  document.getElementById("chatProfileName").innerText=profile.name
  document.getElementById("chatMessages").innerHTML=""
  document.getElementById("chatModal").style.display="flex"
}
function closeChat(){ document.getElementById("chatModal").style.display="none" }

function aiReply(message){
  message=message.toLowerCase()
  if(message.includes("hi")||message.includes("hello")) return "Hi 😊 nice to meet you!"
  if(message.includes("how are you")) return "I'm good 💕 what about you?"
  let replies=["You seem interesting 😊","Tell me more about yourself","I enjoy chatting with you","What are your hobbies?","You seem kind"]
  return replies[Math.floor(Math.random()*replies.length)]
}

function sendMessage(){
  let input=document.getElementById("chatInput")
  let text=input.value
  if(!text) return
  let chat=document.getElementById("chatMessages")
  chat.innerHTML+=`<p><b>You:</b> ${text}</p>`
  input.value=""
  setTimeout(()=>{
    chat.innerHTML+=`<p><b>${demoProfiles.find(p=>p.id===currentChatId).name}:</b> ${aiReply(text)}</p>`
    chat.scrollTop=chat.scrollHeight
  },1000)
}

function showTab(tab){
  document.querySelectorAll('.tab-content').forEach(c=>c.style.display='none')
  document.getElementById(tab).style.display='block'
}

// Profile tab saving
function saveProfile(){
  const profile={name:document.getElementById("profileName").value,
                 age:document.getElementById("profileAge").value,
                 country:document.getElementById("profileCountry").value,
                 interest:document.getElementById("profileInterest").value}
  alert("Profile Saved! "+JSON.stringify(profile))
}

// Update like tab
function updateLikeTab(){
  const container=document.getElementById("like")
  container.innerHTML=""
  likedProfiles.forEach(p=>{
    container.innerHTML+=`<div class="card" onclick="openProfile(${p.id})">
      <img src="${p.photos[0]}">
      <div class="card-content">
        <h3>${p.name}</h3>
        <p>Age: ${p.age}</p>
        <p>Country: ${p.country}</p>
        <p>Interest: ${p.interest}</p>
      </div>
    </div>`
  })
}

// Initialize
showProfile(currentIndex)
showTab('swipe')
</script>
</body>
</html>
