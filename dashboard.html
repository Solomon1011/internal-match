<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Internal Match</title>

<style>

body{
font-family:Arial;
margin:0;
background:#fff0f5;
text-align:center;
padding-bottom:80px;
}

h2{color:#ff2a6d;}

.tab{display:none;padding:20px;}
.active{display:block;}

.card-container{
width:90%;
max-width:350px;
margin:auto;
}

.card{
background:white;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
overflow:hidden;
margin-bottom:20px;
cursor:pointer;
}

.card img{
width:100%;
height:260px;
object-fit:cover;
}

.actions{
display:flex;
justify-content:space-around;
padding:10px;
}

.actions button{
border:none;
padding:8px 12px;
border-radius:8px;
color:white;
cursor:pointer;
}

.like{background:#28a745;}
.ignore{background:#dc3545;}
.msg{background:#007bff;}

.nav{
position:fixed;
bottom:0;
width:100%;
background:white;
border-top:1px solid #ddd;
display:flex;
justify-content:space-around;
height:65px;
}

.nav button{
background:none;
border:none;
font-size:12px;
display:flex;
flex-direction:column;
align-items:center;
cursor:pointer;
}

.message{
display:flex;
align-items:center;
gap:10px;
background:white;
padding:8px;
margin:6px;
border-radius:8px;
}

.message img{
width:35px;
height:35px;
border-radius:50%;
}

form input,form select{
width:80%;
padding:10px;
margin:6px;
border-radius:8px;
border:1px solid #ccc;
}

.save{
background:#ff2a6d;
color:white;
border:none;
padding:10px 20px;
border-radius:8px;
}

.photo-preview{
display:flex;
justify-content:center;
gap:10px;
margin:10px;
}

.photo-preview img{
width:70px;
height:70px;
border-radius:10px;
object-fit:cover;
}

</style>
</head>

<body>

<h2>💘 Internal Match</h2>

<!-- SWIPE -->

<div id="swipe" class="tab active">
<div class="card-container" id="cards"></div>
</div>

<!-- LIKES -->

<div id="likes" class="tab">
<h3>People You Liked</h3>
<div id="likedList"></div>
</div>

<!-- MESSAGES -->

<div id="messages" class="tab">

<h3 id="chatTitle">Messages</h3>

<div id="chatBox"></div>

<input id="msgInput" placeholder="Type message">

<button onclick="sendMessage()">Send</button>

</div>

<!-- PROFILE -->

<div id="profile" class="tab">

<h3>Edit Profile</h3>

<form onsubmit="saveProfile(event)">

<input id="username" placeholder="Username" required>

<input id="age" type="number" placeholder="Age">

<select id="country">

<option>Nigeria</option>
<option>United States</option>
<option>United Kingdom</option>
<option>Canada</option>
<option>Australia</option>
<option>Germany</option>
<option>France</option>
<option>Italy</option>
<option>Spain</option>
<option>Brazil</option>
<option>India</option>
<option>China</option>
<option>Japan</option>
<option>South Korea</option>
<option>Mexico</option>
<option>Argentina</option>
<option>South Africa</option>
<option>Kenya</option>
<option>Ghana</option>
<option>Egypt</option>
<option>Morocco</option>
<option>Turkey</option>
<option>Saudi Arabia</option>
<option>UAE</option>
<option>Qatar</option>
<option>Indonesia</option>
<option>Malaysia</option>
<option>Thailand</option>
<option>Vietnam</option>
<option>Philippines</option>
<option>Singapore</option>
<option>Netherlands</option>
<option>Belgium</option>
<option>Sweden</option>
<option>Norway</option>
<option>Finland</option>
<option>Denmark</option>
<option>Poland</option>
<option>Portugal</option>
<option>Switzerland</option>
<option>Austria</option>
<option>New Zealand</option>
<option>Ukraine</option>
<option>Romania</option>
<option>Hungary</option>
<option>Greece</option>
<option>Israel</option>
<option>Pakistan</option>
<option>Bangladesh</option>
<option>Sri Lanka</option>
<option>Nepal</option>
<option>Chile</option>
<option>Peru</option>
<option>Colombia</option>
<option>Venezuela</option>
<option>Costa Rica</option>
<option>Panama</option>
<option>Dominican Republic</option>
<option>Jamaica</option>
<option>Cuba</option>

</select>

<select id="interest">

<option>Friend 💖</option>
<option>Hangout 💚</option>
<option>Serious Relationship 💖</option>
<option>Marriage 💘</option>

</select>

<p>Upload up to 3 Photos</p>

<input type="file" id="photos" multiple accept="image/*">

<div class="photo-preview" id="preview"></div>

<button class="save">Save Profile</button>

</form>

</div>

<!-- COINS -->

<div id="coins" class="tab">
<h3>Your Coins</h3>
<h1>100</h1>
</div>

<!-- PROFILE VIEW -->

<div id="viewProfile" class="tab">

<h3 id="viewName"></h3>

<img id="viewImg" width="200">

<p id="viewCountry"></p>

</div>

<!-- NAV -->

<div class="nav">

<button onclick="showTab('swipe')">🔥 Swipe</button>
<button onclick="showTab('likes')">❤️ Likes</button>
<button onclick="showTab('messages')">💬 Messages</button>
<button onclick="showTab('profile')">👤 Profile</button>
<button onclick="showTab('coins')">🪙 Coins</button>

</div>

<script>

let users=[

{
id:1,
name:"Alice",
age:24,
interest:"Friend 💖",
country:"USA",
photo:"https://randomuser.me/api/portraits/women/65.jpg"
},

{
id:2,
name:"Bob",
age:27,
interest:"Serious Relationship 💖",
country:"UK",
photo:"https://randomuser.me/api/portraits/men/32.jpg"
}

]

let liked=[]
let messages=[]
let currentChat=null

function showTab(id){

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))
document.getElementById(id).classList.add("active")

}

function renderCards(){

const container=document.getElementById("cards")
container.innerHTML=""

users.forEach(u=>{

container.innerHTML+=`

<div class="card" onclick="viewProfile(${u.id})">

<img src="${u.photo}">

<h3>${u.name}, ${u.age} • ${u.interest}</h3>

<p>${u.country}</p>

<div class="actions">

<button class="like" onclick="event.stopPropagation();likeUser(${u.id})">Like</button>

<button class="msg" onclick="event.stopPropagation();openChat(${u.id})">Message</button>

<button class="ignore" onclick="event.stopPropagation();ignoreUser(${u.id})">Ignore</button>

</div>

</div>

`

})

}

function likeUser(id){

let u=users.find(x=>x.id==id)

liked.push(u)

users=users.filter(x=>x.id!=id)

renderCards()

renderLikes()

}

function ignoreUser(id){

users=users.filter(x=>x.id!=id)

renderCards()

}

function renderLikes(){

const list=document.getElementById("likedList")

list.innerHTML=""

liked.forEach(u=>{

list.innerHTML+=`

<div class="message">

<img src="${u.photo}">

${u.name}, ${u.age} • ${u.interest}

</div>

`

})

}

function openChat(id){

let u=liked.find(x=>x.id==id) || users.find(x=>x.id==id)

currentChat=u

document.getElementById("chatTitle").innerHTML=`<img src="${u.photo}" width="30" style="border-radius:50%"> Chat with ${u.name}`

showTab("messages")

}

function sendMessage(){

let text=document.getElementById("msgInput").value

if(!text)return

messages.push({user:currentChat.name,text,photo:currentChat.photo})

renderMessages()

document.getElementById("msgInput").value=""

}

function renderMessages(){

const box=document.getElementById("chatBox")

box.innerHTML=""

messages.forEach(m=>{

box.innerHTML+=`

<div class="message">

<img src="${m.photo}">

${m.user}: ${m.text}

</div>

`

})

}

function viewProfile(id){

let u=users.find(x=>x.id==id) || liked.find(x=>x.id==id)

document.getElementById("viewName").innerText=u.name+", "+u.age+" • "+u.interest

document.getElementById("viewImg").src=u.photo

document.getElementById("viewCountry").innerText=u.country

showTab("viewProfile")

}

document.getElementById("photos").addEventListener("change",function(){

const preview=document.getElementById("preview")

preview.innerHTML=""

const files=[...this.files].slice(0,3)

files.forEach(file=>{

const img=document.createElement("img")

img.src=URL.createObjectURL(file)

preview.appendChild(img)

})

})

renderCards()

</script>

</body>
</html>
