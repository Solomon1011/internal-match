<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💘 Internal Match Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h2>💘 Internal Match</h2>

<div class="tab-content">

  <!-- Profile -->
  <div id="profile-tab">
    <h3>My Profile</h3>
    <img id="userProfilePic" src="https://randomuser.me/api/portraits/lego/1.jpg">
    <input type="text" id="username" placeholder="Username">
    <input type="number" id="age" placeholder="Age">
    <input type="text" id="location" placeholder="Location">
    <select id="gender">
      <option value="Male">Male</option>
      <option value="Female">Female</option>
    </select>
    <input type="text" id="interest" placeholder="Interest">
    <button onclick="saveProfile()">💾 Save Profile</button>
  </div>

  <!-- People -->
  <div id="people-tab" style="display:none;">
    <div id="swipe-container"></div>
  </div>

  <!-- Likes -->
  <div id="liked-tab" style="display:none;">
    <h3>Who Likes Me</h3>
    <div id="liked-container">No likes yet!</div>
  </div>

  <!-- Chat -->
  <div id="chats-tab" style="display:none;">
    <div id="chat-users"></div>
    <div id="chat-box"></div>
    <input type="text" id="messageInput" placeholder="Type message">
    <button onclick="sendMessage()">Send</button>
  </div>

</div>

<div class="tab-bar">
  <button onclick="showTab('profile')">Profile</button>
  <button onclick="showTab('people')">People</button>
  <button onclick="showTab('liked')">Likes</button>
  <button onclick="showTab('chats')">Chat</button>
</div>

<script src="script.js"></script>
</body>
</html>
