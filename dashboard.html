<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Internal Match Dashboard</title>

<style>
body { background:#1a1a1a; color:#f5d061; font-family:Arial; margin:0; padding:0; display:flex; flex-direction:column; align-items:center; }
h2{text-align:center; margin-top:20px;}
.tab-content { flex:1; width:100%; max-width:400px; text-align:center; padding:20px; box-sizing:border-box; display:flex; flex-direction:column; align-items:center; }
.tab-bar { position:fixed; bottom:0; width:100%; max-width:400px; display:flex; justify-content:space-around; background:#111; border-top:1px solid #f5d061; padding:10px 0; }
.tab-bar button { background:none; border:none; color:#f5d061; font-size:14px; cursor:pointer; display:flex; flex-direction:column; align-items:center; flex:1; }
.tab-bar img { width:28px; height:28px; margin-bottom:3px; }

.card { background:#222; border:1px solid #f5d061; border-radius:12px; padding:15px; margin:10px 0; width:100%; max-width:350px; display:flex; flex-direction:column; align-items:center; }
.card img { width:150px; height:150px; border-radius:50%; margin-bottom:10px; object-fit:cover; }
.card h3 { margin:5px 0; font-size:20px; font-weight:bold; }
.card p { margin:2px 0; font-size:14px; }

#swipe-container { position:relative; width:100%; max-width:350px; height:420px; }
.swipe-card { position:absolute; width:100%; transition: transform 0.3s ease; cursor:grab; }

#chat-header { display:flex; align-items:center; margin-bottom:10px; width:100%; max-width:350px; }
#chat-header img { width:60px; height:60px; border-radius:50%; margin-right:10px; }
#chat-box { border:1px solid #f5d061; padding:10px; height:200px; overflow-y:auto; margin-bottom:10px; text-align:left; width:100%; max-width:350px; }
#chat-users button { display:flex; justify-content:space-between; width:100%; margin:5px 0; background:#222; border:none; color:#f5d061; padding:6px 8px; border-radius:4px; cursor:pointer; }

input[type=text], input[type=number], select { padding:6px; width:80%; margin:5px 0; border-radius:4px; border:1px solid #f5d061; background:#111; color:#f5d061; }

.filter-panel { display:flex; flex-direction:column; align-items:center; margin-bottom:10px; width:100%; }
.filter-panel select { margin:5px; width:80%; }
</style>
</head>

<body>

<h2>💘 Internal Match Dashboard</h2>

<div class="tab-content">

<div id="profile-tab" style="display:none;">
<h3>My Profile</h3>
<div class="card">
<img id="user-profile-pic" src="https://randomuser.me/api/portraits/lego/1.jpg">
<input type="text" placeholder="Username">
<input type="number" placeholder="Age">
<input type="text" placeholder="Location">
<select>
<option>Male</option>
<option>Female</option>
</select>
<input type="text" placeholder="Interest">
</div>
</div>

<div id="people-tab" style="display:none;">
<div class="filter-panel">
<select id="filter-gender"><option value="">All Genders</option><option>Male</option><option>Female</option></select>
<button onclick="applyFilters()">🔍 Apply Filters</button>
</div>
<div id="swipe-container"></div>
</div>

<div id="liked-tab" style="display:none;">
<h3>Who Likes Me</h3>
<div id="liked-container"></div>
</div>

<div id="chats-tab" style="display:none;">
<div id="chat-header">
<img id="chat-profile-pic">
<span id="chat-name"></span>
</div>
<div id="chat-box"></div>
<div id="chat-users"></div>
</div>

</div>

<div class="tab-bar">
<button onclick="showTab('profile')">Profile</button>
<button onclick="showTab('people')">People</button>
<button onclick="showTab('liked')">Likes</button>
<button onclick="showTab('chats')">Chats</button>
</div>

<script>

function showTab(tab){
['profile-tab','people-tab','liked-tab','chats-tab'].forEach(t=>document.getElementById(t).style.display='none');
document.getElementById(tab+'-tab').style.display='block';
}
showTab('people');

const malePics = Array.from({length:2000},(_,i)=>`https://randomuser.me/api/portraits/men/${i%100}.jpg`);
const femalePics = Array.from({length:2000},(_,i)=>`https://randomuser.me/api/portraits/women/${i%100}.jpg`);
const maleNames=["John","David","Michael","James","Robert","William","Thomas","Henry","Jack","Luke"];
const femaleNames=["Alice","Emma","Olivia","Sophia","Clara","Mia","Grace","Eva","Lily","Amelia"];
const locations=["New York","London","Paris","Tokyo","Berlin","Madrid","Sydney","Lagos","Dubai","Rome"];
const interests=["Friends 💚","Hangout 🩵","Serious Relationship 💖","Marriage 💘"];
const romanticMessages=["Hey you 😘","You have amazing smile 💖","Can't stop thinking about you 💘","Let's go on date 🥰"];

let demoProfiles=[];
for(let i=0;i<2000;i++){
demoProfiles.push({name:maleNames[Math.floor(Math.random()*maleNames.length)],age:20+Math.floor(Math.random()*15),gender:"Male",location:locations[Math.floor(Math.random()*locations.length)],interest:interests[Math.floor(Math.random()*interests.length)],pic:malePics[i],messages:[],added:false});
demoProfiles.push({name:femaleNames[Math.floor(Math.random()*femaleNames.length)],age:20+Math.floor(Math.random()*15),gender:"Female",location:locations[Math.floor(Math.random()*locations.length)],interest:interests[Math.floor(Math.random()*interests.length)],pic:femalePics[i],messages:[],added:false});
}

let filteredProfiles=demoProfiles;
let currentIndex=0;
const swipeContainer=document.getElementById("swipe-container");

function showProfile(){
if(currentIndex>=filteredProfiles.length){swipeContainer.innerHTML="No more profiles";return;}
const p=filteredProfiles[currentIndex];
swipeContainer.innerHTML=`<div class="card swipe-card" id="card">
<img src="${p.pic}">
<h3>${p.name}, ${p.age}</h3>
<p>${p.gender} | ${p.location}</p>
<p>${p.interest}</p>
</div>`;
enableSwipe();
}
showProfile();

function enableSwipe(){
const card=document.getElementById("card");
let startX=0,currentX=0,isDragging=false;

card.addEventListener("touchstart",e=>{startX=e.touches[0].clientX;isDragging=true;});
card.addEventListener("touchmove",e=>{
if(!isDragging)return;
currentX=e.touches[0].clientX-startX;
card.style.transform=`translateX(${currentX}px) rotate(${currentX/10}deg)`;
});
card.addEventListener("touchend",()=>{
isDragging=false;
if(currentX>120) swipeRight();
else if(currentX<-120) swipeLeft();
else card.style.transform="translateX(0)";
currentX=0;
});
}

function swipeRight(){
const p=filteredProfiles[currentIndex];
addToLiked(p);
addChat(p);
nextProfile();
}

function swipeLeft(){ nextProfile(); }

function nextProfile(){ currentIndex++; showProfile(); }

function addToLiked(p){
const div=document.createElement("div");
div.className="card";
div.innerHTML=`<img src="${p.pic}"><h3>${p.name}, ${p.age}</h3>`;
document.getElementById("liked-container").appendChild(div);
}

function addChat(p){
if(p.added) return;
p.added=true;
const btn=document.createElement("button");
btn.innerText=p.name;
btn.onclick=()=>openChat(p);
document.getElementById("chat-users").appendChild(btn);
p.messages.push({from:p.name,text:"Hi there 💖"});
}

function openChat(p){
showTab('chats');
document.getElementById("chat-name").innerText=p.name;
document.getElementById("chat-profile-pic").src=p.pic;
const box=document.getElementById("chat-box");
box.innerHTML="";
p.messages.forEach(m=>{
const d=document.createElement("div");
d.innerText=m.from+": "+m.text;
box.appendChild(d);
});
}

function applyFilters(){
const gender=document.getElementById("filter-gender").value;
filteredProfiles=demoProfiles.filter(p=>!gender||p.gender===gender);
currentIndex=0;
showProfile();
}

</script>
</body>
</html>
