<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Dating App Dashboard</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

.tab{
display:none;
padding-bottom:80px;
}

.active{
display:block;
}

.swipe-container{
height:70vh;
display:flex;
justify-content:center;
align-items:center;
position:relative;
overflow:hidden;
touch-action:none;
}

.card{
position:absolute;
width:90%;
max-width:350px;
background:white;
border-radius:15px;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
overflow:hidden;
touch-action:none;
}

.card img{
width:100%;
height:320px;
object-fit:cover;
}

.card-info{
padding:15px;
text-align:center;
}

.buttons{
display:flex;
justify-content:space-around;
margin-top:10px;
}

.buttons button{
border:none;
padding:10px;
border-radius:8px;
cursor:pointer;
}

.like{background:#ff4d6d;color:white;}
.ignore{background:#ccc;}
.message{background:#4CAF50;color:white;}

.bottom-nav{
position:fixed;
bottom:0;
width:100%;
background:white;
display:flex;
justify-content:space-around;
border-top:1px solid #ddd;
}

.bottom-nav button{
flex:1;
padding:15px;
border:none;
background:white;
font-size:16px;
}

.chat-user{
display:flex;
align-items:center;
gap:10px;
padding:12px;
border-bottom:1px solid #eee;
cursor:pointer;
}

.chat-user img{
width:40px;
height:40px;
border-radius:50%;
}

.profile-viewer{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
justify-content:center;
align-items:center;
}

.profile-box{
background:white;
padding:20px;
border-radius:10px;
width:90%;
max-width:350px;
text-align:center;
}

.profile-box img{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
}

.close{
float:right;
cursor:pointer;
}

input,select{
width:100%;
padding:10px;
margin:5px 0;
}

</style>
</head>

<body>

<!-- SWIPE TAB -->
<div id="swipeTab" class="tab active">

<div class="swipe-container" id="cardStack"></div>

</div>

<!-- LIKES TAB -->
<div id="likesTab" class="tab">

<h2 style="padding:15px">People Who Liked You</h2>

<div id="likesList"></div>

</div>

<!-- MESSAGE TAB -->
<div id="messagesTab" class="tab">

<h2 style="padding:15px">Messages</h2>

<div id="messagesList"></div>

</div>

<!-- PROFILE TAB -->
<div id="profileTab" class="tab">

<h2 style="padding:15px">Edit Profile</h2>

<div style="padding:15px">

<input id="username" placeholder="Username">

<input id="age" type="number" placeholder="Age">

<select id="country">
<option>Nigeria</option>
<option>United States</option>
<option>United Kingdom</option>
<option>Canada</option>
<option>France</option>
<option>Germany</option>
<option>Italy</option>
<option>Spain</option>
<option>Brazil</option>
<option>India</option>
<option>China</option>
<option>Japan</option>
<option>South Africa</option>
<option>Mexico</option>
<option>Argentina</option>
<option>Turkey</option>
<option>Indonesia</option>
<option>Philippines</option>
<option>Thailand</option>
<option>Australia</option>
</select>

<select id="interest">
<option>Friend 💖</option>
<option>Hangout 💚</option>
<option>Serious Relationship 💖</option>
<option>Marriage 💘</option>
</select>

<input type="file" multiple>

<button onclick="saveProfile()">Save Profile</button>

</div>

</div>

<!-- COINS TAB -->
<div id="coinsTab" class="tab">

<h2 style="padding:20px">Coins</h2>

<p style="padding:20px">You have 0 coins</p>

<button style="margin:20px">Buy Coins</button>

</div>

<!-- PROFILE VIEWER -->
<div class="profile-viewer" id="profileViewer">

<div class="profile-box">

<span class="close" onclick="closeProfile()">✖</span>

<img id="viewPhoto">

<h3 id="viewName"></h3>

<p id="viewAge"></p>

<p id="viewInterest"></p>

<p id="viewCountry"></p>

</div>

</div>

<!-- NAVIGATION -->
<div class="bottom-nav">

<button onclick="openTab('swipeTab')">🔥</button>

<button onclick="openTab('likesTab')">❤️</button>

<button onclick="openTab('messagesTab')">💬</button>

<button onclick="openTab('profileTab')">👤</button>

<button onclick="openTab('coinsTab')">💰</button>

</div>

<script>

let profiles=[
{name:"Linda",age:24,interest:"Friend 💖",country:"USA",photo:"https://randomuser.me/api/portraits/women/65.jpg"},
{name:"Anna",age:22,interest:"Hangout 💚",country:"Canada",photo:"https://randomuser.me/api/portraits/women/44.jpg"},
{name:"Sophia",age:26,interest:"Marriage 💘",country:"UK",photo:"https://randomuser.me/api/portraits/women/68.jpg"}
]

function loadCards(){

let container=document.getElementById("cardStack")

container.innerHTML=""

profiles.forEach((p,i)=>{

let card=document.createElement("div")

card.className="card"

card.innerHTML=`

<img src="${p.photo}">

<div class="card-info" onclick="viewProfile(${i})">

<h3>${p.name}, ${p.age}</h3>

<p>${p.interest}</p>

</div>

<div class="buttons">

<button class="ignore" onclick="ignoreUser(${i})">❌</button>

<button class="message" onclick="openChat(${i})">💬</button>

<button class="like" onclick="likeUser(${i})">❤️</button>

</div>

`

container.appendChild(card)

})

}

function likeUser(i){

let likes=JSON.parse(localStorage.getItem("likes"))||[]

likes.push(profiles[i])

localStorage.setItem("likes",JSON.stringify(likes))

alert("You liked "+profiles[i].name)

}

function ignoreUser(i){

alert("Ignored")

}

function viewProfile(i){

let p=profiles[i]

document.getElementById("viewPhoto").src=p.photo

document.getElementById("viewName").innerText=p.name

document.getElementById("viewAge").innerText="Age: "+p.age

document.getElementById("viewInterest").innerText=p.interest

document.getElementById("viewCountry").innerText=p.country

document.getElementById("profileViewer").style.display="flex"

}

function closeProfile(){

document.getElementById("profileViewer").style.display="none"

}

function openChat(i){

let p=profiles[i]

let messages=document.getElementById("messagesList")

messages.innerHTML+=`

<div class="chat-user" onclick="viewProfile(${i})">

<img src="${p.photo}">

<span>${p.name}</span>

</div>

`

openTab("messagesTab")

}

function openTab(tab){

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))

document.getElementById(tab).classList.add("active")

}

function saveProfile(){

alert("Profile Saved")

}

loadCards()

</script>

</body>
</html>
