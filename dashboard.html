
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="stylesheet" href="style.css">
<title>Dashboard</title>
</head>
<body>

<h2>💘 Internal Match Dashboard</h2>

<div class="tab-content">

  <!-- Profile Tab -->
  <div id="profile-tab" style="display:none; text-align:center;">
    <h3>My Profile</h3>
    <img id="display-pic" style="width:120px;height:120px;border-radius:50%;"><br><br>
    <p id="display-name"></p>
    <p id="display-age"></p>
    <p id="display-location"></p>
    <p id="display-gender"></p>
    <p id="display-interest"></p>
  </div>

  <!-- People Tab -->
  <div id="people-tab" style="display:none;">
    <div id="swipe-container">People section coming soon...</div>
  </div>

  <!-- Likes Tab -->
  <div id="liked-tab" style="display:none;">
    <h3>Who Likes Me</h3>
    <div>No likes yet!</div>
  </div>

  <!-- Chats Tab -->
  <div id="chats-tab" style="display:none;">
    <h3>Chats</h3>
    <div id="chat-box"></div>
  </div>

</div>

<!-- Bottom Navigation -->
<div class="tab-bar">
  <button onclick="showTab('profile')">👤</button>
  <button onclick="showTab('people')">🔥</button>
  <button onclick="showTab('liked')">💖</button>
  <button onclick="showTab('chats')">💬</button>
</div>

<script>

function showTab(tab){
  ['profile-tab','people-tab','liked-tab','chats-tab'].forEach(t=>{
    document.getElementById(t).style.display='none';
  });

  document.getElementById(tab+'-tab').style.display='block';
}

// 🔥 LOAD USER PROFILE FROM LOCAL STORAGE
const user = JSON.parse(localStorage.getItem("userProfile"));

if(user){
  document.getElementById("display-pic").src = user.profilePic;
  document.getElementById("display-name").innerText = "Name: " + user.username;
  document.getElementById("display-age").innerText = "Age: " + user.age;
  document.getElementById("display-location").innerText = "Location: " + user.location;
  document.getElementById("display-gender").innerText = "Gender: " + user.gender;
  document.getElementById("display-interest").innerText = "Interest: " + user.interest;
} else {
  // If no profile found, send back to setup
  window.location.href = "profile_setup.html";
}

// Show Profile first
showTab('profile');

</script>

</body>
</html>
