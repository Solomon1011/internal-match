<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<style>
body{margin:0;font-family:sans-serif;background:#000;color:#fff;overflow:hidden}
#swipe-container,.tab-content{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;justify-content:center;align-items:center;flex-direction:column}
.card{width:90%;max-width:400px;background:#111;border-radius:10px;padding:15px;box-shadow:0 4px 10px rgba(0,0,0,0.5);position:relative;text-align:center}
.card img{width:100%;border-radius:10px}
.card-info{margin-top:10px;text-align:left}
.actions{display:flex;justify-content:space-around;margin-top:10px}
button{cursor:pointer;font-size:18px}
.online-dot{width:12px;height:12px;border-radius:50%;position:absolute;top:10px;right:10px;border:2px solid #fff}
#profile,#chat-box,#tabs{display:none;position:absolute;width:100%;height:100%;top:0;left:0}
#profile img,#chat-box img{width:100px;height:100px;border-radius:50%}
input,select{width:100%;padding:5px;margin:5px 0;border-radius:5px;border:none}
.tab-bar{position:absolute;bottom:0;width:100%;display:flex;background:#111;justify-content:space-around;padding:10px 0}
.tab-bar button{flex:1;background:none;border:none;color:#fff;font-size:18px}
.tab-bar button.active{color:#FFD700}
.chat-message{display:flex;align-items:center;margin:5px}
.chat-message img{width:40px;height:40px;border-radius:50%;margin-right:5px}
</style>
</head>
<body>

<!-- Swipe container -->
<div id="swipe-container"></div>

<!-- Profile view -->
<div id="profile">
  <img id="profile-pic" src="" alt="Profile">
  <input id="profile-name" placeholder="Name">
  <input id="profile-age" placeholder="Age">
  <select id="profile-country"></select>
  <select id="profile-interest">
    <option value="Friend 💖">Friend 💖</option>
    <option value="Hangout 💚">Hangout 💚</option>
    <option value="Serious Relationship 💖">Serious Relationship 💖</option>
    <option value="Marriage 💘">Marriage 💘</option>
  </select>
  <input type="file" id="photo1" accept="image/*">
  <input type="file" id="photo2" accept="image/*">
  <input type="file" id="photo3" accept="image/*">
</div>

<!-- Chat box -->
<div id="chat-box">
  <div id="chat-messages" style="overflow-y:auto;height:80%;width:90%;margin:auto"></div>
  <input id="chat-input" placeholder="Type a message">
  <button onclick="sendMessage()">Send</button>
</div>

<!-- Tabs -->
<div class="tab-bar" id="tabs">
  <button class="active" onclick="showTab('swipe')">🏠</button>
  <button onclick="showTab('likes')">💖</button>
  <button onclick="showTab('messages')">💬</button>
  <button onclick="showTab('profile-tab')">👤</button>
  <button onclick="showTab('coins')">💰</button>
</div>

<script>
// 152+ countries (example, you can expand)
const countries = ["United States","United Kingdom","Nigeria","South Africa","India","Canada","Brazil","France","Germany","China","Japan","Russia","Italy","Spain","Mexico","Australia","Egypt","Kenya","Ghana","Morocco","Algeria","Others"];
const profileCountry = document.getElementById("profile-country");
countries.forEach(c=>{let o=document.createElement("option");o.value=c;o.textContent=c;profileCountry.appendChild(o)});

// Demo profiles
const demoProfiles = [];
const names = ["Alice","Bob","Charlie","Diana","Eve","Frank","Grace","Hank","Ivy","Jack","Kathy","Leo","Mona","Nate","Olivia","Paul","Quincy","Rachel","Steve","Tina","Uma","Victor","Wendy","Xander","Yara","Zane"];
const malePhotos = ["https://randomuser.me/api/portraits/men/1.jpg","https://randomuser.me/api/portraits/men/2.jpg"];
const femalePhotos = ["https://randomuser.me/api/portraits/women/1.jpg","https://randomuser.me/api/portraits/women/2.jpg"];
for(let i=0;i<5000;i++){
  let gender = Math.random()>0.5?'male':'female';
  demoProfiles.push({
    name:names[Math.floor(Math.random()*names.length)] + i,
    age:18+Math.floor(Math.random()*30),
    location:countries[Math.floor(Math.random()*countries.length)],
    interest:["Friend 💖","Hangout 💚","Serious Relationship 💖","Marriage 💘"][Math.floor(Math.random()*4)],
    online:Math.random()>0.5,
    photo:gender==='male'?malePhotos[Math.floor(Math.random()*malePhotos.length)]:femalePhotos[Math.floor(Math.random()*femalePhotos.length)]
  });
}

// Swipe logic
let currentIndex = 0;
const swipeContainer = document.getElementById("swipe-container");

function showProfileCard(i){
  if(i>=demoProfiles.length) return;
  swipeContainer.innerHTML="";
  const p = demoProfiles[i];
  const card = document.createElement("div");
  card.className="card";
  card.addEventListener("click",()=>openUserProfile(p));
  card.innerHTML=`
    <div class="online-dot" style="background:${p.online?'lime':'gray'}"></div>
    <img src="${p.photo}">
    <div class="card-info">
      <span><b>${p.name}</b>, ${p.age}</span>
      <span>${p.location}</span>
      <span>${p.interest}</span>
    </div>
    <div class="actions">
      <button onclick="event.stopPropagation(); likeProfile(${i})">💖</button>
      <button onclick="event.stopPropagation(); openChat(demoProfiles[${i}])">💬</button>
      <button onclick="event.stopPropagation(); ignoreProfile(${i})">❌</button>
    </div>`;
  swipeContainer.appendChild(card);
}
function likeProfile(i){nextProfile();}
function ignoreProfile(i){nextProfile();}
function nextProfile(){currentIndex++;showProfileCard(currentIndex);}
showProfileCard(currentIndex);

// Open profile
function openUserProfile(user){
  document.getElementById("profile").style.display="block";
  swipeContainer.style.display="none";
  document.getElementById("profile-pic").src=user.photo;
  document.getElementById("profile-name").value=user.name;
  document.getElementById("profile-age").value=user.age;
  document.getElementById("profile-country").value=user.location;
  document.getElementById("profile-interest").value=user.interest;

  const msgBtn = document.createElement("button");
  msgBtn.textContent="Message 💬";
  msgBtn.style.width="100%";msgBtn.style.padding="10px";
  msgBtn.style.marginTop="10px";msgBtn.style.borderRadius="5px";
  msgBtn.style.border="none";msgBtn.style.background="#FFD700";msgBtn.style.color="#000";
  msgBtn.onclick=()=>{openChat(user);document.getElementById("profile").style.display="none";document.getElementById("chat-box").style.display="flex";};
  const oldBtn = document.getElementById("profile").querySelector("button");
  if(oldBtn) oldBtn.remove();
  document.getElementById("profile").appendChild(msgBtn);
}

// Chat
let currentChatUser=null;
function openChat(user){
  currentChatUser=user;
  document.getElementById("chat-box").style.display="flex";
  document.getElementById("swipe-container").style.display="none";
  loadChatMessages();
}

function loadChatMessages(){
  const container=document.getElementById("chat-messages");
  container.innerHTML="";
  if(!currentChatUser) return;
  currentChatUser.messages=currentChatUser.messages||[];
  currentChatUser.messages.forEach(msg=>{
    const div=document.createElement("div");
    div.className="chat-message";
    div.innerHTML=`<img src="${msg.sender==='me'?demoProfiles[0].photo:currentChatUser.photo}"> <span>${msg.text}</span>`;
    container.appendChild(div);
  });
  container.scrollTop=container.scrollHeight;
}

function sendMessage(){
  const input=document.getElementById("chat-input");
  if(!input.value) return;
  currentChatUser.messages=currentChatUser.messages||[];
  currentChatUser.messages.push({sender:'me',text:input.value});
  // Auto-reply
  currentChatUser.messages.push({sender:'them',text:"Hi! I am "+currentChatUser.name});
  input.value="";
  loadChatMessages();
}

// Tabs
function showTab(tab){
  document.getElementById("swipe-container").style.display="none";
  document.getElementById("chat-box").style.display="none";
  document.getElementById("profile").style.display="none";
  if(tab==='swipe') swipeContainer.style.display="flex";
  if(tab==='messages') document.getElementById("chat-box").style.display="flex";
  if(tab==='profile-tab') document.getElementById("profile").style.display="block";
  document.querySelectorAll(".tab-bar button").forEach(b=>b.classList.remove("active"));
  event.target.classList.add("active");
}

// Photo preview
['photo1','photo2','photo3'].forEach(id=>{
  document.getElementById(id).addEventListener("change",function(e){
    if(e.target.files[0]){
      const reader=new FileReader();
      reader.onload=function(ev){document.getElementById("profile-pic").src=ev.target.result;}
      reader.readAsDataURL(e.target.files[0]);
    }
  });
});

</script>
</body>
</html>
