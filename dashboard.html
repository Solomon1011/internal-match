<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💘 Internal Match - Dashboard</title>
<link rel="stylesheet" href="style.css">
<style>
body { font-family: Arial, sans-serif; margin:0; padding-bottom:70px; background:#fff0f6; }
h2 { color:#ff4d6d; text-align:center; }
.profile-card { width:90%; max-width:350px; margin:20px auto; padding:10px; background:#fff; border-radius:10px; box-shadow:0 4px 8px rgba(0,0,0,0.2); text-align:center; position:relative; }
.profile-card img { width:150px; height:150px; border-radius:50%; object-fit:cover; margin-bottom:10px; }
.profile-actions { display:flex; justify-content:space-around; margin-top:10px; }
.profile-actions button { padding:10px; border:none; border-radius:50%; cursor:pointer; font-size:18px; }
.profile-actions button.like { background:#ff4d6d; color:white; }
.profile-actions button.ignore { background:#ccc; }
.profile-actions button.message { background:#4CAF50; color:white; }
.bottom-tabs { position:fixed; bottom:0; left:0; width:100%; height:60px; background:#fff; display:flex; justify-content:space-around; align-items:center; border-top:1px solid #ccc; }
.bottom-tabs button { border:none; background:none; display:flex; flex-direction:column; align-items:center; font-size:12px; cursor:pointer; }
.bottom-tabs img { width:24px; height:24px; margin-bottom:2px; }
#profile-edit { display:none; text-align:center; padding:10px; }
#profile-edit input, #profile-edit select { width:80%; padding:8px; margin:5px 0; border-radius:6px; border:1px solid #ccc; }
#profile-edit img { width:80px; height:80px; margin:5px; border-radius:8px; object-fit:cover; }
#chat-box { display:none; flex-direction:column; height:60vh; overflow-y:auto; padding:10px; }
.chat-message { display:flex; align-items:flex-start; margin:5px 0; }
.chat-message.user img { order:2; margin-left:10px; }
.chat-message.other img { margin-right:10px; }
.chat-message p { max-width:70%; padding:8px; border-radius:10px; }
.chat-message.user p { background:#ff4d6d; color:white; align-self:flex-end; }
.chat-message.other p { background:#ccc; }
</style>
</head>
<body>

<h2>💘 Internal Match</h2>

<!-- Swipe area -->
<div id="swipe-area"></div>

<!-- Profile edit -->
<div id="profile-edit">
  <h3>Edit Profile</h3>
  <input type="text" id="myName" placeholder="Your Name">
  <input type="number" id="myAge" placeholder="Age">
  <select id="myCountry"></select>
  <select id="myInterest">
    <option value="Friend 💖">Friend 💖</option>
    <option value="Hangout 💚">Hangout 💚</option>
    <option value="Serious Relationship 💖">Serious Relationship 💖</option>
    <option value="Marriage 💘">Marriage 💘</option>
  </select>
  <input type="file" id="photo1">
  <input type="file" id="photo2">
  <input type="file" id="photo3">
  <div id="photo-preview"></div>
  <button id="saveProfile">Save Profile</button>
</div>

<!-- Chat -->
<div id="chat-box"></div>
<input type="text" id="chat-input" placeholder="Type message..." style="width:80%; padding:8px;">
<button id="send-chat">Send</button>

<!-- Bottom tabs -->
<div class="bottom-tabs">
  <button id="tab-swipe"><img src="assets/swipe.svg">Swipe</button>
  <button id="tab-like"><img src="assets/like.svg">Like</button>
  <button id="tab-message"><img src="assets/message.svg">Messages</button>
  <button id="tab-coins"><img src="assets/shop.svg">Coins</button>
  <button id="tab-profile"><img src="assets/user.svg">Profile</button>
</div>

<script>
// Populate countries dropdown
const countries = ["United States","Canada","United Kingdom","Australia","Germany","France","India","Japan","Brazil","China","Italy","Spain","Russia","Mexico","Netherlands","Sweden","Norway","Denmark","Finland","Switzerland","Belgium","Austria","New Zealand","South Africa","Argentina","Colombia","Chile","Peru","Portugal","Greece","Poland","Turkey","Egypt","Saudi Arabia","United Arab Emirates","Israel","Singapore","Malaysia","Thailand","Vietnam","Indonesia","Philippines","South Korea","North Korea","Pakistan","Bangladesh","Sri Lanka","Nepal","Bhutan","Maldives","Kazakhstan","Uzbekistan","Kyrgyzstan","Tajikistan","Iraq","Iran","Afghanistan","Morocco","Algeria","Tunisia","Nigeria","Kenya","Ethiopia","Ghana","Cameroon","Uganda","Tanzania","Zimbabwe","Zambia","Botswana","Mozambique","Namibia","Angola","Sudan","Libya","Jordan","Lebanon","Syria","Iraq","Kuwait","Qatar","Bahrain","Oman","Yemen","Thailand","Philippines","Malaysia","Singapore","Indonesia","Vietnam","Cambodia","Laos","Myanmar","Brunei","Mongolia","Nepal","Bhutan","Maldives","Fiji","Papua New Guinea","Samoa","Tonga","Vanuatu","Kiribati","Marshall Islands","Palau","Micronesia","Solomon Islands","Tuvalu","Nauru","Canada","Mexico","Greenland"];
const countrySelect = document.getElementById("myCountry");
countries.forEach(c => { const opt = document.createElement("option"); opt.value=c; opt.textContent=c; countrySelect.appendChild(opt); });

// Swipe demo profiles
let demoProfiles = [];
const swipeArea = document.getElementById("swipe-area");
async function loadDemoProfiles(count=20) {
  for(let i=0;i<count;i++){
    const res = await fetch('https://randomuser.me/api/');
    const data = await res.json();
    const user = data.results[0];
    demoProfiles.push({
      name: user.name.first,
      age: user.dob.age,
      country: user.location.country,
      gender: user.gender,
      photo: user.picture.large,
      interest: ["Friend 💖","Hangout 💚","Serious Relationship 💖","Marriage 💘"][Math.floor(Math.random()*4)]
    });
  }
  showProfile();
}
let currentProfileIndex=0;
function showProfile(){
  swipeArea.innerHTML='';
  if(currentProfileIndex>=demoProfiles.length){ swipeArea.innerHTML='<p>No more profiles</p>'; return;}
  const p = demoProfiles[currentProfileIndex];
  const card = document.createElement('div');
  card.className='profile-card';
  card.innerHTML=`
    <img src="${p.photo}">
    <h3>${p.name}, ${p.age}</h3>
    <p>${p.country} | ${p.interest}</p>
    <div class="profile-actions">
      <button class="like">❤️</button>
      <button class="ignore">❌</button>
      <button class="message">💬</button>
    </div>
  `;
  swipeArea.appendChild(card);

  card.querySelector(".like").onclick=()=>{ currentProfileIndex++; showProfile(); };
  card.querySelector(".ignore").onclick=()=>{ currentProfileIndex++; showProfile(); };
  card.querySelector(".message").onclick=()=>{ openChat(p); };
  card.onclick=()=>{ alert(`${p.name}'s Profile\nAge: ${p.age}\nCountry: ${p.country}\nInterest: ${p.interest}`); };
}

// Chat system
const chatBox = document.getElementById("chat-box");
function openChat(profile){
  swipeArea.style.display='none';
  chatBox.style.display='flex';
  chatBox.innerHTML='';
  const msg = document.createElement('p'); msg.textContent=`Chatting with ${profile.name}`; chatBox.appendChild(msg);
}
document.getElementById("send-chat").onclick=()=>{
  const input = document.getElementById("chat-input");
  if(!input.value) return;
  const msgDiv = document.createElement('div');
  msgDiv.className='chat-message user';
  msgDiv.innerHTML=`<p>${input.value}</p><img src="https://randomuser.me/api/portraits/lego/1.jpg">`;
  chatBox.appendChild(msgDiv);
  input.value='';
};

// Profile edit
const photoInputs = [document.getElementById("photo1"),document.getElementById("photo2"),document.getElementById("photo3")];
const previewDiv = document.getElementById("photo-preview");
photoInputs.forEach(input=>{
  input.onchange=()=>{ 
    previewDiv.innerHTML=''; 
    photoInputs.forEach(pi=>{
      if(pi.files[0]){
        const img=document.createElement('img');
        img.src=URL.createObjectURL(pi.files[0]);
        previewDiv.appendChild(img);
      }
    });
  };
});
document.getElementById("saveProfile").onclick=()=>{
  alert('Profile saved!');
};

// Load profiles
loadDemoProfiles(20);
</script>
</body>
</html>
