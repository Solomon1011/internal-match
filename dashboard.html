<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>💘 Internal Match Dashboard</title>
<link rel="stylesheet" href="style.css">
<style>
  body { font-family:sans-serif; margin:0; padding:0; background:#111; color:#f5d061; }
  h2 { text-align:center; margin:10px 0; }
  .tab-content > div { display:none; padding:10px; text-align:center; }
  .tab-bar { position:fixed; bottom:0; width:100%; display:flex; justify-content:space-around; background:#222; padding:10px 0; }
  .tab-bar button { background:none; border:none; color:#f5d061; font-size:24px; cursor:pointer; }
  input, select, button { margin:5px 0; padding:6px; border-radius:5px; border:none; }
  .card { background:#222; padding:10px; border-radius:10px; margin:10px auto; width:80%; }
  .actions button { margin:5px; padding:5px 10px; border-radius:6px; cursor:pointer; border:none; background:#f5d061; color:#111; }
  #chat-users button { display:block; width:90%; margin:5px auto; background:#333; color:#f5d061; padding:6px; border:none; border-radius:5px; cursor:pointer; }
  #chat-box { padding:10px; height:300px; overflow-y:auto; text-align:left; background:#222; margin-bottom:5px; display:flex; flex-direction:column; }
  .message { max-width:70%; margin:5px; padding:8px 12px; border-radius:15px; word-wrap:break-word; font-size:14px; }
  .message.user { background:#25D366; color:#fff; align-self:flex-end; }
  .message.other { background:#e5e5e5; color:#000; align-self:flex-start; }
  #chat-input { width:70%; padding:8px; border-radius:20px; border:1px solid #ccc; outline:none; }
  #chat-send-btn { margin-left:5px; padding:8px 15px; border:none; background:#25D366; color:white; border-radius:50%; font-weight:bold; cursor:pointer; }
  #chat-container { display:flex; flex-direction:column; }
</style>
</head>
<body>

<h2>💘 Internal Match Dashboard</h2>

<div class="tab-content">

  <!-- Profile Tab -->
  <div id="profile-tab">
    <h3>My Profile</h3>
    <div style="text-align:center; margin-bottom:20px;">
      <img id="user-profile-pic" src="https://randomuser.me/api/portraits/lego/1.jpg" style="width:120px;height:120px;border-radius:50%; display:block; margin:auto;">
      <input type="file" id="profilePicInput" accept="image/*" style="margin-top:10px;">
    </div>
    <input type="text" id="edit-username" placeholder="Username"><br>
    <input type="number" id="edit-age" placeholder="Age"><br>
    <select id="edit-location"><option value="">Select Country</option></select><br>
    <select id="edit-gender">
      <option value="">Select Gender</option>
      <option value="Male">Male</option>
      <option value="Female">Female</option>
    </select><br>
    <select id="edit-interest">
      <option value="">Select Interest</option>
      <option value="Friends 💚">Friends 💚</option>
      <option value="Hangout 🩵">Hangout 🩵</option>
      <option value="Serious Relationship 💖">Serious Relationship 💖</option>
      <option value="Marriage 💘">Marriage 💘</option>
    </select><br>
    <button onclick="saveProfile()">💾 Save Profile</button>
  </div>

  <!-- People Tab -->
  <div id="people-tab">
    <div class="filter-panel">
      <select id="filter-gender">
        <option value="">All Genders</option>
        <option value="Male">Male</option>
        <option value="Female">Female</option>
      </select>
      <select id="filter-location-people">
        <option value="">All Locations</option>
      </select>
      <select id="filter-interest">
        <option value="">All Interests</option>
        <option value="Friends 💚">Friends 💚</option>
        <option value="Hangout 🩵">Hangout 🩵</option>
        <option value="Serious Relationship 💖">Serious Relationship 💖</option>
        <option value="Marriage 💘">Marriage 💘</option>
      </select>
      <button onclick="applyFilters()">🔍 Apply Filters</button>
    </div>
    <div id="swipe-container">Loading profiles...</div>
  </div>

  <!-- Likes Tab -->
  <div id="liked-tab">
    <h3>Who Likes Me</h3>
    <div id="liked-container">No likes yet!</div>
  </div>

  <!-- Chats Tab -->
  <div id="chats-tab">
    <div id="chat-users"></div>
    <div id="chat-container" style="display:none;">
      <div style="display:flex; align-items:center; margin-bottom:5px;">
        <img id="chat-profile-pic" src="" style="width:50px;height:50px;border-radius:50%; margin-right:10px;">
        <span id="chat-name" style="font-weight:bold;"></span>
        <button onclick="deleteCurrentChat()" style="margin-left:auto; background:#f55; color:white; border:none; padding:5px 10px; border-radius:6px; cursor:pointer;">🗑️ Delete</button>
      </div>
      <div id="chat-box"></div>
      <div style="display:flex; margin-top:5px;">
        <input type="text" id="chat-input" placeholder="Type a message...">
        <button id="chat-send-btn" onclick="sendMessage()">➤</button>
      </div>
    </div>
  </div>

</div>

<!-- Bottom Navigation -->
<div class="tab-bar">
  <button onclick="showTab('profile')">👤</button>
  <button onclick="showTab('people')">🔥</button>
  <button onclick="showTab('liked')">💖</button>
  <button onclick="showTab('chats')">💬</button>
</div>

<script>
// ----- Countries -----
const countries = ["Afghanistan","Albania","Algeria","Andorra","Angola","Argentina","Australia","Austria","Belgium","Brazil","Canada","China","Denmark","Egypt","France","Germany","Ghana","India","Indonesia","Iran","Iraq","Ireland","Israel","Italy","Japan","Kenya","Malaysia","Mexico","Nepal","Netherlands","New Zealand","Nigeria","Norway","Pakistan","Philippines","Poland","Portugal","Qatar","Russia","Saudi Arabia","Singapore","South Africa","South Korea","Spain","Sweden","Switzerland","Thailand","Turkey","Ukraine","United Arab Emirates","United Kingdom","United States","Vietnam"];

const editLocation = document.getElementById('edit-location');
const filterLocationPeople = document.getElementById('filter-location-people');
countries.forEach(c => { editLocation.innerHTML += `<option value="${c}">${c}</option>`; });
countries.forEach(c => { filterLocationPeople.innerHTML += `<option value="${c}">${c}</option>`; });

// Inputs
const profilePicInput = document.getElementById('profilePicInput');
const profilePicPreview = document.getElementById('user-profile-pic');
const usernameInput = document.getElementById('edit-username');
const ageInput = document.getElementById('edit-age');
const genderInput = document.getElementById('edit-gender');
const interestInput = document.getElementById('edit-interest');

// ----- Load saved profile -----
let profileData = JSON.parse(localStorage.getItem('userProfile')) || {};
if(profileData.username) usernameInput.value = profileData.username;
if(profileData.age) ageInput.value = profileData.age;
if(profileData.location) editLocation.value = profileData.location;
if(profileData.gender) genderInput.value = profileData.gender;
if(profileData.interest) interestInput.value = profileData.interest;
if(profileData.profilePic) profilePicPreview.src = profileData.profilePic;

// ----- Profile Picture Upload -----
profilePicInput.addEventListener('change', function(e){
  const file = e.target.files[0];
  if(file){
    const reader = new FileReader();
    reader.onload = function(event){
      profilePicPreview.src = event.target.result;
      profileData.profilePic = event.target.result;
      localStorage.setItem('userProfile', JSON.stringify(profileData));
    }
    reader.readAsDataURL(file);
  }
});

// ----- Save Profile -----
function saveProfile(){
  const username = usernameInput.value.trim();
  const age = ageInput.value.trim();
  const location = editLocation.value;
  const gender = genderInput.value;
  const interest = interestInput.value;
  if(!username || !age || !location || !gender || !interest){ alert("Please fill all fields!"); return; }
  profileData = { username, age, location, gender, interest, profilePic: profilePicPreview.src };
  localStorage.setItem('userProfile', JSON.stringify(profileData));
  alert("Profile saved successfully!");
}

// ----- Tabs -----
function showTab(tab){
  ['profile-tab','people-tab','liked-tab','chats-tab'].forEach(t=>{ document.getElementById(t).style.display='none'; });
  document.getElementById(tab+'-tab').style.display='block';
}

// Show profile first
showTab('profile');

// ----- Demo People -----
const demoProfiles = [];
const demoNamesMale = ["John","David","Michael","James","Robert","William","Thomas","Henry","Jack","Luke"];
const demoNamesFemale = ["Alice","Emma","Olivia","Sophia","Clara","Mia","Grace","Eva","Lily","Amelia"];
const interests = ["Friends 💚","Hangout 🩵","Serious Relationship 💖","Marriage 💘"];
for(let i=0;i<20;i++){
  demoProfiles.push({name: demoNamesMale[Math.floor(Math.random()*demoNamesMale.length)], age:20+Math.floor(Math.random()*15), gender:"Male", location:countries[Math.floor(Math.random()*countries.length)], interest:interests[Math.floor(Math.random()*interests.length)], pic:`https://randomuser.me/api/portraits/men/${i}.jpg`, messages: [], addedToChat:false, ignored:false});
  demoProfiles.push({name: demoNamesFemale[Math.floor(Math.random()*demoNamesFemale.length)], age:20+Math.floor(Math.random()*15), gender:"Female", location:countries[Math.floor(Math.random()*countries.length)], interest:interests[Math.floor(Math.random()*interests.length)], pic:`https://randomuser.me/api/portraits/women/${i}.jpg`, messages: [], addedToChat:false, ignored:false});
}

// ----- Swipe Profiles -----
let currentIndex = 0;
let filteredProfiles = demoProfiles.slice();
const swipeContainer = document.getElementById('swipe-container');
const chatUsersDiv = document.getElementById('chat-users');
const chatBox = document.getElementById('chat-box');
const chatProfilePic = document.getElementById('chat-profile-pic');
const chatName = document.getElementById('chat-name');
const chatContainer = document.getElementById('chat-container');

function showProfileCard(){
  while(currentIndex < filteredProfiles.length && filteredProfiles[currentIndex].ignored) currentIndex++;
  if(currentIndex >= filteredProfiles.length){ swipeContainer.innerHTML="No more profiles!"; return; }
  const p = filteredProfiles[currentIndex];
  swipeContainer.innerHTML=`
    <div class="card">
      <img src="${p.pic}" style="width:120px;height:120px;border-radius:50%;"><br>
      <h3>${p.name}, ${p.age}</h3>
      <p>${p.gender} | ${p.location}</p>
      <p>Interest: ${p.interest}</p>
      <div class="actions">
        <button onclick="swipe('like')">💖 Like</button>
        <button onclick="swipe('ignore')">❌ Ignore</button>
        <button onclick="addChatAndOpen('${p.name}')">💬 Message</button>
      </div>
    </div>
  `;
}

function swipe(action){
  const p = filteredProfiles[currentIndex];
  if(action==="like") addChat(p);
  if(action==="ignore") p.ignored=true;
  currentIndex++;
  showProfileCard();
}

function messageCurrent(){
  const p = filteredProfiles[currentIndex];
  if(p) addChat(p);
}

// ----- Chats -----
let chats = JSON.parse(localStorage.getItem("chats")) || {};
let currentChatUser = "";

function updateChatList(){
  chatUsersDiv.innerHTML="";
  for(let user in chats){
    const prof = demoProfiles.find(p => p.name === user);
    const lastMsg = chats[user].length ? chats[user][chats[user].length -1] : "";
    
    const container = document.createElement("div");
    container.style.display = "flex";
    container.style.alignItems = "center";
    container.style.background = "#222";
    container.style.color = "#f5d061";
    container.style.padding = "5px 10px";
    container.style.margin = "5px";
    container.style.borderRadius = "8px";
    container.style.cursor = "pointer";

    const img = document.createElement("img");
    img.src = prof ? prof.pic : "";
    img.style.width = "40px";
    img.style.height = "40px";
    img.style.borderRadius = "50%";
    img.style.marginRight = "10px";

    const textDiv = document.createElement("div");
    textDiv.style.flex = "1";
    const nameDiv = document.createElement("div");
    nameDiv.innerText = user;
    nameDiv.style.fontWeight = "bold";
    const lastMsgDiv = document.createElement("div");
    lastMsgDiv.innerText = lastMsg.replace("You: ","");
    lastMsgDiv.style.fontSize = "12px";
    lastMsgDiv.style.color = "#ccc";

    textDiv.appendChild(nameDiv);
    textDiv.appendChild(lastMsgDiv);

    container.appendChild(img);
    container.appendChild(textDiv);

    container.onclick = ()=>openChat(user);

    chatUsersDiv.appendChild(container);
  }
}

    // Profile picture
    const img = document.createElement("img");
    img.src = prof ? prof.pic : profileData.profilePic;
    img.style.width = "40px";
    img.style.height = "40px";
    img.style.borderRadius = "50%";
    
    // Username text
    const span = document.createElement("span");
    span.innerText = user;
    
    btn.appendChild(img);
    btn.appendChild(span);
    btn.onclick = () => openChat(user);
    chatUsersDiv.appendChild(btn);
  }
}

function addChat(profile){
  const name = profile.name;
  if(!chats[name]) chats[name]=[];
  if(!profile.addedToChat){
    chats[name].push(`${name}: Hi there! 💖 Let's chat!`);
    profile.addedToChat=true;
    localStorage.setItem("chats", JSON.stringify(chats));
  }
  updateChatList();
  openChat(name);
}

function openChat(user){
  currentChatUser = user;
  chatContainer.style.display="flex";
  chatName.innerText = user;
  // Use profile pic from demoProfiles
  const prof = demoProfiles.find(p=>p.name===user);
  chatProfilePic.src = prof ? prof.pic : profileData.profilePic;
  displayMessages();
}

function displayMessages(){
  chatBox.innerHTML="";
  if(!currentChatUser || !chats[currentChatUser]) return;
  chats[currentChatUser].forEach(msg=>{
    const div = document.createElement("div");
    div.className = msg.startsWith("You:") ? "message user" : "message other";
    div.innerText = msg;
    chatBox.appendChild(div);
  });
  chatBox.scrollTop = chatBox.scrollHeight;
}

function sendMessage(){
  const msgInput = document.getElementById("chat-input");
  const text = msgInput.value.trim();
  if(!text || !currentChatUser) return;
  chats[currentChatUser].push("You: "+text);
  localStorage.setItem("chats", JSON.stringify(chats));
  msgInput.value="";
  displayMessages();
}

function deleteCurrentChat(){
  if(currentChatUser && chats[currentChatUser]){
    if(confirm("Delete chat with "+currentChatUser+"?")){
      delete chats[currentChatUser];
      localStorage.setItem("chats", JSON.stringify(chats));
      currentChatUser="";
      chatContainer.style.display="none";
      updateChatList();
    }
  }
}
// ----- Add chat and open immediately -----
function addChatAndOpen(profileName){
  // Find the profile object
  const profile = demoProfiles.find(p => p.name === profileName);
  if(!profile) return;

  if(!chats[profileName]) chats[profileName] = [];
  if(!profile.addedToChat){
    chats[profileName].push(`${profileName}: Hi there! 💖 Let's chat!`);
    profile.addedToChat = true;
    localStorage.setItem("chats", JSON.stringify(chats));
  }

  updateChatList();
  openChat(profileName);
  showTab('chats'); // switch to chat tab automatically
}
// ----- Filters -----
function applyFilters(){
  const gender = document.getElementById('filter-gender').value;
  const location = document.getElementById('filter-location-people').value;
  const interest = document.getElementById('filter-interest').value;
  filteredProfiles = demoProfiles.filter(p=>{
    return !p.ignored &&
           (!gender || p.gender===gender) &&
           (!location || p.location===location) &&
           (!interest || p.interest===interest);
  });
  currentIndex=0;
  showProfileCard();
}

// ----- Initial Load -----
showProfileCard();
updateChatList();

</script>
</body>
</html>
