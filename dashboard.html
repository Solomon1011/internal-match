<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Dashboard</title>
<style>
html, body {margin:0; padding:0; font-family:sans-serif; background:#000; color:#fff; overflow:hidden; touch-action: manipulation;}
body { -webkit-user-select: none; -ms-user-select: none; user-select: none; }
#swipe-container,.tab-content{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;justify-content:center;align-items:center;flex-direction:column}
.card{width:90%;max-width:400px;background:#111;border-radius:15px;padding:15px;box-shadow:0 4px 10px rgba(0,0,0,0.5);position:relative;text-align:center}
.card img{width:100%;border-radius:15px}
.card-info{margin-top:10px;text-align:left}
.actions{display:flex;justify-content:space-around;margin-top:10px}
button{cursor:pointer;font-size:18px;border:none;border-radius:8px;padding:5px 10px}
.online-dot{width:14px;height:14px;border-radius:50%;position:absolute;top:10px;right:10px;border:2px solid #fff}
.online-dot-small{width:12px;height:12px;border-radius:50%;position:absolute;top:8px;right:8px;border:2px solid #fff; z-index:10;}
#profile,#chat-box{display:none;position:absolute;width:100%;height:100%;top:0;left:0;flex-direction:column;align-items:center;overflow:auto}
#profile img,#chat-box img{width:120px;height:120px;border-radius:50%;object-fit:cover}
input,select{width:100%;padding:8px;margin:5px 0;border-radius:8px;border:none;background:#222;color:#fff}
.tab-bar{position:fixed;bottom:0;width:100%;display:flex;background:#111;justify-content:space-around;padding:10px 0;z-index:1000;border-top:1px solid #333;}
.tab-bar button{flex:1;background:none;color:#fff;font-size:16px;display:flex;flex-direction:column;align-items:center;}
.tab-bar button.active{color:#FFD700}
.chat-message{display:flex;align-items:center;margin:5px}
.chat-message img{width:40px;height:40px;border-radius:50%;margin-right:8px;border:2px solid lime}
.profile-container{background:#111;padding:15px;border-radius:15px;width:90%;max-width:400px;text-align:center}
.profile-fields{display:flex;flex-direction:column;margin-top:10px}
.profile-fields label{margin-top:10px;font-weight:bold}
#chat-box input{width:80%;margin:10px auto;border-radius:8px;padding:8px;background:#222;color:#fff;border:none}
#chat-box button{width:80%;margin:0 auto;padding:8px;background:#FFD700;color:#000;border:none;border-radius:8px;font-weight:bold}
#login-form, #signup-form {display:flex; flex-direction: column; width:90%; max-width:400px; margin:auto;}
#login-form input, #signup-form input {margin-bottom:10px;}
#login-form button, #signup-form button {background:#FFD700; color:#000; font-weight:bold;}
</style>
</head>
<body>

<!-- Swipe container -->
<div id="swipe-container"></div>

<!-- User Profile Tab -->
<div id="profile">
  <!-- Login Form -->
  <div id="login-form">
    <h2>Login</h2>
    <input type="email" id="login-email" placeholder="Email">
    <input type="password" id="login-password" placeholder="Password">
    <button onclick="login()">Login</button>
    <p style="text-align:center;">Don't have an account? <a href="#" onclick="showSignup()">Sign Up</a></p>
  </div>

  <!-- Signup Form -->
  <div id="signup-form" style="display:none;">
    <h2>Sign Up</h2>
    <input type="email" id="signup-email" placeholder="Email">
    <input type="password" id="signup-password" placeholder="Password">
    <button onclick="signup()">Sign Up</button>
    <p style="text-align:center;">Already have an account? <a href="#" onclick="showLogin()">Login</a></p>
  </div>

  <!-- Editable Profile -->
  <div class="profile-container" id="editable-profile" style="display:none;">
    <div style="position:relative">
      <img id="profile-pic" src="" alt="Profile">
      <div class="online-dot" id="profile-online"></div>
    </div>

    <div class="profile-fields">
      <label>Name</label>
      <input id="profile-name" placeholder="Name">
      <label>Age</label>
      <input id="profile-age" type="number" placeholder="Age">
      <label>Country</label>
      <select id="profile-country"></select>
      <label>Interest</label>
      <select id="profile-interest">
        <option value="Friend 💖">Friend 💖</option>
        <option value="Hangout 💚">Hangout 💚</option>
        <option value="Serious Relationship 💖">Serious Relationship 💖</option>
        <option value="Marriage 💘">Marriage 💘</option>
      </select>
    </div>

    <div class="profile-photos">
      <img id="photo-preview1" src="">
    </div>
    <input type="file" id="photo1" accept="image/*">

    <button id="save-profile" style="margin-top:10px;background:#FFD700;color:#000;font-weight:bold">Save Profile 💾</button>
  </div>
</div>

<!-- Chat box -->
<div id="chat-box">
  <div id="chat-messages" style="overflow-y:auto;height:80%;width:90%;margin:auto"></div>
  <input id="chat-input" placeholder="Type a message">
  <button onclick="sendMessage()">Send</button>
</div>

<!-- Bottom Tabs -->
<div class="tab-bar" id="tabs">
  <button class="active" onclick="showTab('swipe', event)">🏠<br>Home</button>
  <button onclick="showTab('likes', event)">💖<br>Likes</button>
  <button onclick="showTab('messages', event)">💬<br>Messages</button>
  <button onclick="showTab('profile-tab', event)">👤<br>Profile</button>
  <button onclick="showTab('coins', event)">💰<br>Coins</button>
</div>

<script>
// --- Countries ---
const countries = ["United States","United Kingdom","Nigeria","South Africa","India","Canada","Brazil","France","Germany","China","Japan","Russia","Italy","Spain","Mexico","Australia","Egypt","Kenya","Ghana","Morocco","Algeria","Others"];
const profileCountry = document.getElementById("profile-country");
countries.forEach(c=>{let o=document.createElement("option");o.value=c;o.textContent=c;profileCountry.appendChild(o)});

// --- Demo Profiles ---
const demoProfiles=[];
const firstNames=["Alice","Bob","Charlie","Diana","Eve","Frank","Grace","Hank","Ivy","Jack","Kathy","Leo","Mona","Nate","Olivia","Paul","Quincy","Rachel","Steve","Tina","Uma","Victor","Wendy","Xander","Yara","Zane"];
const lastNames=["Smith","Johnson","Williams","Brown","Jones","Garcia","Miller","Davis","Martinez","Hernandez"];
const malePhotos=[]; const femalePhotos=[];
for(let i=1;i<=50;i++){ malePhotos.push(`https://randomuser.me/api/portraits/men/${i}.jpg`); femalePhotos.push(`https://randomuser.me/api/portraits/women/${i}.jpg`);}
for(let i=0;i<5000;i++){
  let gender=Math.random()>0.5?'male':'female';
  let first=firstNames[Math.floor(Math.random()*firstNames.length)];
  let last=lastNames[Math.floor(Math.random()*lastNames.length)];
  demoProfiles.push({
    name:first+' '+last+i,
    age:18+Math.floor(Math.random()*30),
    location:countries[Math.floor(Math.random()*countries.length)],
    interest:["Friend 💖","Hangout 💚","Serious Relationship 💖","Marriage 💘"][Math.floor(Math.random()*4)],
    online:Math.random()>0.5,
    photo:gender==='male'?malePhotos[Math.floor(Math.random()*malePhotos.length)]:femalePhotos[Math.floor(Math.random()*femalePhotos.length)],
    likesMe:false,
    viewedMe:false,
    messages:[]
  });
}

// --- Swipe ---
let currentIndex=0;
const swipeContainer=document.getElementById("swipe-container");
function showProfileCard(i){
  if(i>=demoProfiles.length) return;
  swipeContainer.innerHTML="";
  const p=demoProfiles[i];
  const card=document.createElement("div");
  card.className="card";
  card.addEventListener("click",()=>openUserProfile(p,false));
  card.innerHTML=`
    <div class="online-dot-small" style="background:${p.online?'lime':'gray'}"></div>
    <img src="${p.photo}">
    <div class="card-info">
      <span><b>${p.name}</b>, ${p.age}</span>
      <span>${p.location}</span>
      <span>${p.interest}</span>
    </div>
    <div class="actions">
      <button onclick="event.stopPropagation(); likeProfile(${i})">💖</button>
      <button onclick="event.stopPropagation(); openChat(demoProfiles[${i}])">💬</button>
      <button onclick="event.stopPropagation(); ignoreProfile(${i})">❌</button>
    </div>`;
  swipeContainer.appendChild(card);
}
function likeProfile(i){demoProfiles[i].likesMe=true; nextProfile();}
function ignoreProfile(i){nextProfile();}
function nextProfile(){currentIndex++;showProfileCard(currentIndex);}
showProfileCard(currentIndex);

// --- User Login/Signup ---
let currentUser=null;
function showSignup(){document.getElementById("login-form").style.display="none"; document.getElementById("signup-form").style.display="flex";}
function showLogin(){document.getElementById("signup-form").style.display="none"; document.getElementById("login-form").style.display="flex";}
function login(){
  const email=document.getElementById("login-email").value;
  const password=document.getElementById("login-password").value;
  if(email && password){
    alert("Login successful!");
    currentUser=demoProfiles[0]; // my demo profile
    showProfileTab();
  } else alert("Enter email and password");
}
function signup(){
  const email=document.getElementById("signup-email").value;
  const password=document.getElementById("signup-password").value;
  if(email && password){
    alert("Signup successful!");
    currentUser=demoProfiles[0];
    showProfileTab();
  } else alert("Enter email and password");
}

function showProfileTab(){
  document.getElementById("login-form").style.display="none";
  document.getElementById("signup-form").style.display="none";
  document.getElementById("editable-profile").style.display="block";
  openUserProfile(currentUser,true);
}

// --- Profile Editing ---
function openUserProfile(user,isEditable=false){
  document.getElementById("profile").style.display="flex";
  swipeContainer.style.display="none";
  document.getElementById("profile-pic").src=user.photo;
  document.getElementById("profile-name").value=user.name;
  document.getElementById("profile-age").value=user.age;
  document.getElementById("profile-country").value=user.location;
  document.getElementById("profile-interest").value=user.interest;
  document.getElementById("profile-online").style.background=user.online?'lime':'gray';
  document.getElementById("save-profile").style.display = (user===currentUser) ? "block":"none";
  document.getElementById("photo1").style.display = (user===currentUser) ? "block":"none";
}

// Save profile
document.getElementById("save-profile").addEventListener("click",()=>{
  currentUser.name=document.getElementById("profile-name").value;
  currentUser.age=document.getElementById("profile-age").value;
  currentUser.location=document.getElementById("profile-country").value;
  currentUser.interest=document.getElementById("profile-interest").value;
  alert("Profile saved!");
});

// Photo preview
document.getElementById('photo1').addEventListener("change",function(e){
  if(e.target.files[0]){
    const reader=new FileReader();
    reader.onload=function(ev){
      document.getElementById('photo-preview1').src=ev.target.result;
      document.getElementById('profile-pic').src=ev.target.result;
      currentUser.photo=ev.target.result;
    }
    reader.readAsDataURL(e.target.files[0]);
  }
});

// --- Chat ---
let currentChatUser=null;
function openChat(user){
  currentChatUser=user;
  document.getElementById("chat-box").style.display="flex";
  document.getElementById("swipe-container").style.display="none";
  loadChatMessages();
}
function loadChatMessages(){
  const container=document.getElementById("chat-messages");
  container.innerHTML="";
  if(!currentChatUser) return;
  currentChatUser.messages.forEach(msg=>{
    const div=document.createElement("div");
    div.className="chat-message";
    div.innerHTML=`<img src="${msg.sender==='me'?currentUser.photo:currentChatUser.photo}"> <span>${msg.text}</span>`;
    container.appendChild(div);
  });
  container.scrollTop=container.scrollHeight;
  refreshOnlineDots();
}
function sendMessage(){
  const input=document.getElementById("chat-input");
  if(!input.value || !currentChatUser) return;
  currentChatUser.messages.push({sender:'me',text:input.value});
  input.value="";
  loadChatMessages();
}

// --- Tabs ---
function showTab(tab,event){
  document.getElementById("swipe-container").style.display="none";
  document.getElementById("chat-box").style.display="none";
  document.getElementById("profile").style.display="none";

  if(tab==='swipe') swipeContainer.style.display="flex";
  if(tab==='messages') document.getElementById("chat-box").style.display="flex";
  if(tab==='profile-tab') {
    if(currentUser) showProfileTab(); 
    else document.getElementById("login-form").style.display="flex";
  }
  if(tab==='likes'){
    swipeContainer.innerHTML="";
    demoProfiles.filter(p=>p.likesMe||p.viewedMe).forEach((p,i)=>{
      const card=document.createElement("div");
      card.className="card";
      card.addEventListener("click",()=>openUserProfile(p,false));
      card.innerHTML=`<div class="online-dot-small" style="background:${p.online?'lime':'gray'}"></div>
      <img src="${p.photo}">
      <div class="card-info"><b>${p.name}</b>, ${p.age}, ${p.location}, ${p.interest}</div>
      <div class="actions"><button onclick="event.stopPropagation(); openChat(demoProfiles[${i}])">💬</button></div>`;
      swipeContainer.appendChild(card);
    });
    swipeContainer.style.display="flex";
  }
  if(tab==='coins'){
    swipeContainer.innerHTML="<h2 style='color:#FFD700'>Coming Soon 💰</h2>";
    swipeContainer.style.display="flex";
  }
  document.querySelectorAll(".tab-bar button").forEach(b=>b.classList.remove("active"));
  event.currentTarget.classList.add("active");
  refreshOnlineDots();
}

// Live online dot
function refreshOnlineDots(){
  document.querySelectorAll(".online-dot-small").forEach((dot,i)=>{
    if(demoProfiles[currentIndex])
      dot.style.background = demoProfiles[currentIndex].online ? 'lime':'gray';
  });
  if(currentUser)
    document.getElementById("profile-online").style.background=currentUser.online?'lime':'gray';
  document.querySelectorAll(".chat-message img").forEach((img,i)=>{
    if(currentChatUser)
      img.style.border=currentChatUser.online?'2px solid lime':'2px solid gray';
  });
}

// Update online status randomly to simulate live users
setInterval(()=>{
  demoProfiles.forEach(p=>p.online=Math.random()>0.3);
  refreshOnlineDots();
},5000);

</script>
</body>
</html>
