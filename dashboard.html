<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Internal Match</title>

<style>

body{
font-family:Arial;
margin:0;
background:#fff0f5;
text-align:center;
padding-bottom:80px;
}

h2{
color:#ff2a6d;
}

/* tabs */

.tab{
display:none;
padding:20px;
}

.active{
display:block;
}

/* swipe card */

.card-container{
position:relative;
width:90%;
max-width:350px;
margin:auto;
height:420px;
}

.card{
position:absolute;
width:100%;
height:100%;
background:white;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
overflow:hidden;
}

.card img{
width:100%;
height:60%;
object-fit:cover;
}

.card h3{
margin:10px;
}

.card p{
margin:0;
color:#666;
}

.actions{
display:flex;
justify-content:space-around;
padding:10px;
}

.actions button{
border:none;
padding:8px 12px;
border-radius:8px;
color:white;
cursor:pointer;
}

.like{background:#28a745;}
.ignore{background:#dc3545;}
.msg{background:#007bff;}
.view{background:#ff2a6d;}

/* bottom nav */

.nav{
position:fixed;
bottom:0;
width:100%;
background:white;
border-top:1px solid #ddd;
display:flex;
justify-content:space-around;
height:65px;
}

.nav button{
background:none;
border:none;
font-size:12px;
display:flex;
flex-direction:column;
align-items:center;
cursor:pointer;
}

.nav button.active{
color:#ff2a6d;
}

/* messages */

.message{
background:white;
margin:6px;
padding:10px;
border-radius:8px;
}

/* profile form */

form input,form select{
width:80%;
padding:10px;
margin:6px;
border-radius:8px;
border:1px solid #ccc;
}

.save{
background:#ff2a6d;
color:white;
border:none;
padding:10px 20px;
border-radius:8px;
cursor:pointer;
}

</style>
</head>

<body>

<h2>💘 Internal Match</h2>

<!-- SWIPE TAB -->

<div id="swipe" class="tab active">
<div class="card-container" id="cards"></div>
</div>

<!-- LIKE TAB -->

<div id="likes" class="tab">
<h3>People You Liked</h3>
<div id="likedList"></div>
</div>

<!-- MESSAGE TAB -->

<div id="messages" class="tab">

<h3 id="chatTitle">Messages</h3>

<div id="chatBox"></div>

<input id="msgInput" placeholder="Type message">

<button onclick="sendMessage()">Send</button>

</div>

<!-- PROFILE TAB -->

<div id="profile" class="tab">

<h3>Edit Profile</h3>

<form onsubmit="saveProfile(event)">

<input id="username" placeholder="Username" required>

<input id="age" type="number" placeholder="Age">

<select id="country">

<option>Nigeria</option>
<option>United States</option>
<option>United Kingdom</option>
<option>Canada</option>
<option>France</option>
<option>Germany</option>
<option>India</option>
<option>China</option>
<option>Japan</option>
<option>South Africa</option>
<option>Brazil</option>
<option>Australia</option>
<option>Mexico</option>
<option>Spain</option>
<option>Italy</option>
<option>Kenya</option>
<option>Ghana</option>
<option>Argentina</option>
<option>Netherlands</option>
<option>Sweden</option>
<option>Norway</option>
<option>Denmark</option>
<option>Finland</option>
<option>Belgium</option>
<option>Portugal</option>

</select>

<p>Select Interest</p>

<label><input type="radio" name="interest" value="Friend 💖"> Friend 💖</label><br>
<label><input type="radio" name="interest" value="Hangout 💚"> Hangout 💚</label><br>
<label><input type="radio" name="interest" value="Serious Relationship 💖"> Serious Relationship 💖</label><br>
<label><input type="radio" name="interest" value="Marriage 💘"> Marriage 💘</label>

<br><br>

<button class="save">Save Profile</button>

</form>

</div>

<!-- COINS TAB -->

<div id="coins" class="tab">

<h3>Your Coins</h3>

<h1 id="coinsCount">100</h1>

</div>

<!-- PROFILE VIEW MODAL -->

<div id="viewProfile" class="tab">

<h3 id="viewName"></h3>

<img id="viewImg" width="200">

<p id="viewCountry"></p>

<button onclick="showTab('swipe')">Back</button>

</div>

<!-- BOTTOM NAV -->

<div class="nav">

<button onclick="showTab('swipe')" class="active">🔥<br>Swipe</button>

<button onclick="showTab('likes')">❤️<br>Likes</button>

<button onclick="showTab('messages')">💬<br>Messages</button>

<button onclick="showTab('profile')">👤<br>Profile</button>

<button onclick="showTab('coins')">🪙<br>Coins</button>

</div>

<script>

/* demo users */

let users=[

{
id:1,
name:"Alice",
age:24,
interest:"Friend 💖",
country:"USA",
photo:"https://randomuser.me/api/portraits/women/65.jpg"
},

{
id:2,
name:"Bob",
age:27,
interest:"Serious Relationship 💖",
country:"UK",
photo:"https://randomuser.me/api/portraits/men/32.jpg"
},

{
id:3,
name:"Clara",
age:22,
interest:"Marriage 💘",
country:"Canada",
photo:"https://randomuser.me/api/portraits/women/45.jpg"
}

]

let liked=[]
let messages=[]
let currentChat=null

/* tab switch */

function showTab(id){

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))

document.getElementById(id).classList.add("active")

}

/* render swipe */

function renderCards(){

const container=document.getElementById("cards")

container.innerHTML=""

users.slice().reverse().forEach(u=>{

const card=document.createElement("div")

card.className="card"

card.innerHTML=`

<img src="${u.photo}">

<h3>${u.name}, ${u.age} • ${u.interest}</h3>

<p>${u.country}</p>

<div class="actions">

<button class="like" onclick="likeUser(${u.id})">Like</button>

<button class="msg" onclick="openChat(${u.id})">Message</button>

<button class="ignore" onclick="ignoreUser(${u.id})">Ignore</button>

<button class="view" onclick="viewProfile(${u.id})">View</button>

</div>
`

container.appendChild(card)

})

}

/* like */

function likeUser(id){

let u=users.find(x=>x.id==id)

liked.push(u)

users=users.filter(x=>x.id!=id)

renderCards()

renderLikes()

}

/* ignore */

function ignoreUser(id){

users=users.filter(x=>x.id!=id)

renderCards()

}

/* likes tab */

function renderLikes(){

const list=document.getElementById("likedList")

list.innerHTML=""

liked.forEach(u=>{

list.innerHTML+=`

<div class="message">

<img src="${u.photo}" width="40">

${u.name}, ${u.age} • ${u.interest}

</div>

`

})

}

/* chat */

function openChat(id){

let u=liked.find(x=>x.id==id) || users.find(x=>x.id==id)

currentChat=u

document.getElementById("chatTitle").innerText="Chat with "+u.name

showTab("messages")

}

function sendMessage(){

let text=document.getElementById("msgInput").value

if(!text) return

messages.push({user:currentChat.name,text})

renderMessages()

document.getElementById("msgInput").value=""

}

function renderMessages(){

const box=document.getElementById("chatBox")

box.innerHTML=""

messages.forEach(m=>{

box.innerHTML+=`<div class="message">${m.user}: ${m.text}</div>`

})

}

/* view profile */

function viewProfile(id){

let u=users.find(x=>x.id==id) || liked.find(x=>x.id==id)

document.getElementById("viewName").innerText=u.name+", "+u.age+" • "+u.interest

document.getElementById("viewImg").src=u.photo

document.getElementById("viewCountry").innerText=u.country

showTab("viewProfile")

}

/* profile save */

function saveProfile(e){

e.preventDefault()

alert("Profile Saved!")

}

renderCards()

</script>

</body>
</html>
