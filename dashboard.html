<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Internal Match Dashboard</title>
<style>
body{margin:0;font-family:Arial;background:#111;color:white;}
h2{text-align:center;margin-top:10px;}
.tab-content{padding-bottom:80px;}
.tab{display:none;padding:15px;text-align:center;}
.card{background:#1c1c1c;padding:20px;border-radius:20px;margin:10px;}
input,select{width:90%;padding:10px;margin:5px;border-radius:10px;border:none;}
button{background:gold;border:none;padding:10px 20px;border-radius:20px;margin-top:10px;font-weight:bold;cursor:pointer;}
.tab-bar{position:fixed;bottom:0;width:100%;background:black;display:flex;justify-content:space-around;padding:10px 0;border-top:2px solid gold;}
.tab-bar button{background:none;border:none;color:gold;font-size:22px;cursor:pointer;}
#chat-box{height:300px;overflow-y:auto;background:#000;padding:10px;margin-bottom:10px;border-radius:10px;}
.message{padding:8px;margin:5px;border-radius:10px;max-width:70%;}
.user{background:#25D366;margin-left:auto;}
.other{background:#333;}
#swipe-container img{width:120px;height:120px;border-radius:50%;}
#profile-pic{width:120px;height:120px;border-radius:50%;margin-bottom:10px;}
</style>
</head>
<body>

<h2>💘 Internal Match</h2>
<div class="tab-content">

<!-- PROFILE TAB -->
<div id="profile-tab" class="tab">
  <div class="card">
    <h3>My Profile</h3>
    <img id="profile-pic" src="https://randomuser.me/api/portraits/lego/1.jpg">
    <p id="profile-username">Username</p>
    <p id="profile-age">Age</p>
    <p id="profile-gender">Gender</p>
    <p id="profile-location">Location</p>
    <button onclick="editProfile()">Edit Profile</button>
  </div>
</div>

<!-- SWIPE TAB -->
<div id="swipe-tab" class="tab">
  <div id="swipe-container"></div>
</div>

<!-- LIKED TAB -->
<div id="liked-tab" class="tab">
  <div class="card">
    <h3>Liked Users</h3>
    <div id="liked-container"></div>
  </div>
</div>

<!-- CHAT TAB -->
<div id="chats-tab" class="tab">
  <div id="chat-box"></div>
  <input id="chat-input" placeholder="Type message">
  <button onclick="sendMessage()">Send</button>
</div>

<!-- SHOP COINS TAB -->
<div id="shop-tab" class="tab">
  <div class="card">
    <h3>Shop Coins</h3>
    <p>Buy coins to unlock features!</p>
    <button>Buy Coins</button>
  </div>
</div>

</div>

<!-- bottom navigation -->
<div class="tab-bar">
  <button onclick="showTab('swipe')">🔄</button>
  <button onclick="showTab('liked')">❤️</button>
  <button onclick="showTab('chats')">💬</button>
  <button onclick="showTab('profile')">👤</button>
  <button onclick="showTab('shop')">🛒</button>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// --- Firebase Config ---
const firebaseConfig = {
  apiKey: "AIzaSyDIZnZjeCROX5UmcqUQIfTdt6oRU6AmvOg",
  authDomain: "internal-match.firebaseapp.com",
  projectId: "internal-match",
  storageBucket: "internal-match.appspot.com",
  messagingSenderId: "129707008837",
  appId: "1:129707008837:web:f3f0033bbbe673107a542c"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

// --- Tabs ---
function showTab(tab){
  ['profile','swipe','liked','chats','shop'].forEach(t=>document.getElementById(t+'-tab').style.display='none');
  document.getElementById(tab+'-tab').style.display='block';
}

// --- Current User ---
let currentUser = null;
auth.onAuthStateChanged(user=>{
  if(user){
    currentUser=user;
    loadUserProfile();
    loadDemoProfiles();
    showTab('swipe');
  } else {
    window.location='login.html';
  }
});

// --- Load User Profile ---
function loadUserProfile(){
  if(!currentUser) return;
  db.ref('users/'+currentUser.uid).once('value').then(snapshot=>{
    const data = snapshot.val();
    if(!data) return;
    document.getElementById('profile-pic').src = data.profilePic || 'https://randomuser.me/api/portraits/lego/1.jpg';
    document.getElementById('profile-username').innerText = data.username || '';
    document.getElementById('profile-age').innerText = "Age: "+(data.age||'');
    document.getElementById('profile-gender').innerText = "Gender: "+(data.gender||'');
    document.getElementById('profile-location').innerText = "Location: "+(data.location||'');
  });
}

function editProfile(){ alert("Edit profile in Profile Setup page."); }

// --- Load Demo/Other Users ---
let demoProfiles=[];
let currentIndex=0;
function loadDemoProfiles(){
  db.ref('users').once('value').then(snapshot=>{
    const users = snapshot.val();
    demoProfiles = Object.keys(users)
      .filter(uid=>uid!==currentUser.uid)
      .map(uid=>({uid, ...users[uid]}));
    currentIndex=0;
    showProfile();
  });
}

// --- Swipe Cards ---
function showProfile(){
  if(currentIndex>=demoProfiles.length){
    document.getElementById('swipe-container').innerHTML="No more profiles!";
    return;
  }
  const p = demoProfiles[currentIndex];
  document.getElementById('swipe-container').innerHTML=`
    <div class="card">
      <img src="${p.profilePic}">
      <h3>${p.username}, ${p.age}</h3>
      <p>${p.gender} | ${p.location}</p>
      <button onclick="likeProfile()">💖 Like</button>
      <button onclick="startChat('${p.uid}')">💬 Message</button>
      <button onclick="nextProfile()">❌ Ignore</button>
    </div>
  `;
}

function likeProfile(){
  demoProfiles[currentIndex].liked = true;
  addLike(demoProfiles[currentIndex]);
  nextProfile();
}

function nextProfile(){ currentIndex++; showProfile(); }

function addLike(profile){
  const container = document.getElementById('liked-container');
  const div = document.createElement('div');
  div.innerText = profile.username + " 💖";
  container.appendChild(div);
}

// --- Real-time Chat ---
let currentChatUid = null;
let chatRef = null;
function startChat(uid){
  if(!currentUser) return;
  currentChatUid = uid;
  showTab('chats');

  const chatId = [currentUser.uid,currentChatUid].sort().join("_");
  chatRef = db.ref('chats/' + chatId);

  chatRef.off();
  chatRef.on('value', snapshot=>{
    const box = document.getElementById('chat-box');
    box.innerHTML='';
    const messages = snapshot.val() || [];
    messages.forEach(msg=>{
      const div = document.createElement('div');
      div.className = 'message '+(msg.from===currentUser.uid?'user':'other');
      div.innerText = msg.text;
      box.appendChild(div);
    });
    box.scrollTop = box.scrollHeight;
  });
}

function sendMessage(){
  if(!currentChatUid || !currentUser) return;
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if(!text) return;
  const chatId = [currentUser.uid,currentChatUid].sort().join("_");
  const chatRef = db.ref('chats/' + chatId);
  chatRef.once('value').then(snapshot=>{
    const messages = snapshot.val() || [];
    messages.push({from: currentUser.uid,text});
    chatRef.set(messages);
  });
  input.value='';
}
</script>
</body>
</html>
