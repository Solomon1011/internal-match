<!DOCTYPE html>
<html>
<head>
  <title>Internal Match Dashboard</title>

  <!-- STOP ZOOMING -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <script src="https://js.paystack.co/v1/inline.js"></script>

  <style>
    body { 
      background-color:#1a1a1a; 
      color:#f5d061; 
      font-family:Arial; 
      margin:0; 
      padding:20px; 
    }

    h2{text-align:center;}

    .tab-bar { 
      position:fixed; 
      bottom:0; 
      width:100%; 
      display:flex; 
      justify-content:space-around; 
      background:#111; 
      border-top:1px solid #f5d061; 
      padding:10px 0; 
    }

    .tab-bar button { 
      background:none; 
      border:none; 
      color:#f5d061; 
      font-size:14px; 
      cursor:pointer; 
      display:flex; 
      flex-direction:column; 
      align-items:center; 
      flex:1;
    }

    .tab-bar img{
      width:24px; 
      height:24px; 
      margin-bottom:3px;
    }

    /* CENTER CONTENT */
    .tab-content{
      margin-bottom:100px;
      display:flex;
      flex-direction:column;
      align-items:center;
    }

    #profile-tab,
    #people-tab,
    #liked-tab,
    #chats-tab{
      width:100%;
      max-width:400px;
    }

    #swipe-container, 
    #liked-container, 
    #chat-box { 
      margin-bottom:10px; 
    }

    #chat-box{
      border:1px solid #f5d061; 
      padding:10px; 
      height:200px; 
      overflow-y:scroll;
      text-align:left;
    }

    button{
      background:#f5d061; 
      color:#1a1a1a; 
      border:none; 
      padding:8px 12px; 
      margin:2px; 
      border-radius:4px; 
      cursor:pointer;
    }

    input[type=text]{
      padding:6px; 
      width:70%; 
      margin-right:5px; 
      border-radius:4px; 
      border:1px solid #f5d061; 
      background:#111; 
      color:#f5d061;
    }

    img.profile-small{
      width:40px; 
      height:40px; 
      border-radius:50%; 
      margin-right:5px; 
      vertical-align:middle;
    }
  </style>
</head>

<body>

<h2>💘 Internal Match Dashboard</h2>

<div class="tab-content">

  <!-- Profile Tab -->
  <div id="profile-tab" style="display:none;">
    <h3>My Profile</h3>
    <img id="user-profile-pic" src="" alt="Profile" 
    style="width:120px; height:120px; border-radius:50%; border:2px solid #f5d061;"><br>
    <p>Email: <span id="user-email"></span></p>
    <p>Username: <span id="user-username"></span></p>
    <p>Age: <span id="user-age"></span></p>
    <p>Location: <span id="user-location"></span></p>
    <p>Gender: <span id="user-gender"></span></p>
    <p>Interest: <span id="user-interest"></span></p>
    <p>Coins: <span id="user-coins"></span></p>
    <p>Premium: <span id="user-premium"></span></p>
    <button onclick="buyPremium()">Buy Premium</button>
    <button onclick="useCoin()">Use 1 Coin</button>
    <button onclick="editProfile()">Edit Profile</button>
    <br><br>
    <button onclick="logout()">Logout</button>
  </div>

  <!-- People Profiles Tab -->
  <div id="people-tab" style="display:none;">
    <h3>People Profiles</h3>
    <div id="swipe-container">Loading profiles...</div>
    <button onclick="swipe('like')">Like</button>
    <button onclick="swipe('dislike')">Dislike</button>
  </div>

  <!-- Who Likes Me Tab -->
  <div id="liked-tab" style="display:none;">
    <h3>Who Likes Me</h3>
    <div id="liked-container">Loading...</div>
  </div>

  <!-- Chat Tab -->
  <div id="chats-tab" style="display:none;">
    <h3>Chats</h3>
    <div id="chat-users" style="margin-bottom:10px;"></div>
    <div id="chat-box"></div>
    <input type="text" id="message-input" placeholder="Type a message">
    <button onclick="sendMessage()">Send</button>
  </div>

</div>

<!-- Bottom Tab Bar -->
<div class="tab-bar">
  <button onclick="showTab('profile')">
    <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
    Profile
  </button>
  <button onclick="showTab('people')">
    <img src="https://cdn-icons-png.flaticon.com/512/1077/1077114.png">
    People
  </button>
  <button onclick="showTab('liked')">
    <img src="https://cdn-icons-png.flaticon.com/512/833/833472.png">
    Likes
  </button>
  <button onclick="showTab('chats')">
    <img src="https://cdn-icons-png.flaticon.com/512/2462/2462719.png">
    Chats
  </button>
</div>
