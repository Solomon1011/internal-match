<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💘 Internal Match - Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Welcome to 💘 Internal Match!</h2>
<p id="welcomeMessage"></p>

<!-- Bottom Tabs -->
<div class="bottom-tabs">
  <a href="#"><img src="assets/swipe.svg" alt="Swipe"><span>Swipe</span></a>
  <a href="#"><img src="assets/like.svg" alt="Like"><span>Like</span></a>
  <a href="#"><img src="assets/message.svg" alt="Message"><span>Message</span></a>
  <a href="#"><img src="assets/shop.svg" alt="Shop"><span>Shop</span></a>
  <a href="profile_setup.html"><img src="assets/user.svg" alt="Profile"><span>Profile</span></a>
  <a href="#" id="logoutBtn"><img src="assets/logout.svg" alt="Logout"><span>Logout</span></a>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.6.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.6.1/firebase-auth.js";

// Firebase config - same as auth.js
const firebaseConfig = {
  apiKey: "AIzaSyDIZnZjeCROX5UmcqUQIfTdt6oRU6AmvOg",
  authDomain: "internal-match.firebaseapp.com",
  projectId: "internal-match",
  storageBucket: "internal-match.appspot.com",
  messagingSenderId: "129707008837",
  appId: "1:129707008837:web:f3f0033bbbe673107a542c"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// Check if user is logged in
onAuthStateChanged(auth, user => {
  if (!user) {
    window.location.href = "login.html"; // redirect if not logged in
  } else {
    document.getElementById("welcomeMessage").textContent = `Hello, ${user.displayName || "User"}!`;
  }
});

// Logout button
document.getElementById("logoutBtn").addEventListener("click", async () => {
  await signOut(auth);
  window.location.href = "index.html";
});
</script>

</body>
</html>
