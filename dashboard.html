<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>💘 Internal Match - Dashboard</title>
  <style>
    /* Your existing CSS styles */
  </style>
</head>
<body>

<h2>💘 Internal Match</h2>

<div class="tab-content">

  <!-- PROFILE -->
  <div id="profile" class="tab">
    <div class="card">
      <h3>My Profile</h3>
      <img id="profilePicPreview" src="https://randomuser.me/api/portraits/lego/1.jpg"><br>
      <input type="file" id="profilePicInput" accept="image/*">
      <input id="username" placeholder="Username">
      <input id="age" type="number" placeholder="Age">
      <select id="gender">
        <option value="">Select Gender</option>
        <option value="Male">Male</option>
        <option value="Female">Female</option>
      </select>
      <select id="location">
        <option value="">Select Country</option>
      </select>
      <select id="interest">
        <option value="">Select Interest</option>
        <option value="Friends 💚">Friends 💚</option>
        <option value="Hangout 🩵">Hangout 🩵</option>
        <option value="Serious Relationship 💖">Serious Relationship 💖</option>
        <option value="Marriage 💘">Marriage 💘</option>
      </select>
      <button onclick="saveProfile()">Save Profile</button>
      <div id="errorProfile"></div>
    </div>
  </div>

  <!-- Other tabs (People, Liked, etc.) -->
  
</div>

<!-- Bottom navigation -->
<div class="tab-bar">
  <button onclick="showTab('people')">💘 Swipe</button>
  <button onclick="showTab('liked')">❤️ Likes</button>
  <button onclick="showTab('chat')">💬 Chat <span id="chatBadge"></span></button>
  <button onclick="showTab('profile')">👤 Profile</button>
  <button onclick="showTab('shop')">💰 Shop</button>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<!-- Agora SDK -->
<script src="https://cdn.agora.io/sdk/release/AgoraRTC_N.js"></script>

<script>
// --- Firebase Config ---
const firebaseConfig = {
  apiKey: "YOUR_FIREBASE_API_KEY",
  authDomain: "internal-match.firebaseapp.com",
  projectId: "internal-match",
  storageBucket: "internal-match.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

// --- Check if the user is logged in ---
auth.onAuthStateChanged(user => {
  if (!user) {
    // If the user is not logged in, redirect to the login page
    window.location = "login.html";
  } else {
    // If logged in, proceed to load the dashboard
    currentUser = user;
    loadProfile();
    setOnlineStatus();
    loadPeopleProfiles();
    listenForUnreadMessages();
    showTab('people'); // Show the first tab by default
  }
});

// --- Function to load the user profile ---
function loadProfile() {
  if (!currentUser) return;
  db.ref('users/' + currentUser.uid).once('value').then(snapshot => {
    const data = snapshot.val();
    if (!data) return;
    document.getElementById('username').value = data.username || '';
    document.getElementById('age').value = data.age || '';
    document.getElementById('gender').value = data.gender || '';
    document.getElementById('location').value = data.location || '';
    document.getElementById('interest').value = data.interest || '';
    document.getElementById('profilePicPreview').src = data.profilePic || 'https://randomuser.me/api/portraits/lego/1.jpg';
  });
}

// --- Tab switching logic ---
function showTab(tab) {
  document.querySelectorAll(".tab").forEach(el => el.style.display = 'none');
  document.getElementById(tab).style.display = 'block';
}

// --- Set online status ---
function setOnlineStatus() {
  if (!currentUser) return;
  db.ref('users/' + currentUser.uid + '/online').set(true);
  window.addEventListener("beforeunload", () => db.ref('users/' + currentUser.uid + '/online').set(false));
}

// Add your remaining functions like saving profile, chat, etc.
</script>

</body>
</html>
