
<!DOCTYPE html><html>
<head>
  <title>Internal Match Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <script src="https://js.paystack.co/v1/inline.js"></script>
  <style>
    body { background-color:#1a1a1a; color:#f5d061; font-family:Arial; margin:0; padding:20px; }
    h2{text-align:center;}
    .tab-bar { position:fixed; bottom:0; width:100%; display:flex; justify-content:space-around; background:#111; border-top:1px solid #f5d061; padding:10px 0; }
    .tab-bar button { background:none; border:none; color:#f5d061; font-size:14px; cursor:pointer; display:flex; flex-direction:column; align-items:center; }
    .tab-bar img{width:24px; height:24px; margin-bottom:3px;}
    .tab-content{margin-bottom:100px; text-align:center;}
    #swipe-container, #liked-container, #chat-box { margin-bottom:10px; display:flex; flex-direction:column; align-items:center; }
    #chat-box{border:1px solid #f5d061; padding:10px; height:200px; overflow-y:scroll; width:90%;}
    button{background:#f5d061; color:#1a1a1a; border:none; padding:8px 12px; margin:2px; border-radius:4px; cursor:pointer;}
    input[type=text]{padding:6px; width:70%; margin-right:5px; border-radius:4px; border:1px solid #f5d061; background:#111; color:#f5d061;}
    img.profile-small{width:50px; height:50px; border-radius:50%; margin-right:5px; vertical-align:middle;}
    .profile-card{display:flex; align-items:center; justify-content:space-between; background:#222; padding:10px; border-radius:8px; margin:5px; width:90%;}
    .online-dot{width:12px; height:12px; background:green; border-radius:50%; display:inline-block; margin-left:5px;}
    .filter-section{margin-top:10px; text-align:center;}
    .filter-section select{padding:5px; border-radius:4px; margin:2px; border:1px solid #f5d061; background:#111; color:#f5d061;}
  </style>
</head>
<body><h2>💘 Internal Match Dashboard</h2><div class="tab-content">
