<!DOCTYPE html>
<html>
<head>
  <title>Internal Match Dashboard</title>
  <script src="https://js.paystack.co/v1/inline.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <style>
    body { background-color:#1a1a1a; color:#f5d061; font-family:Arial; margin:0; padding:20px; }
    h2{text-align:center;}
    .tab-bar { position:fixed; bottom:0; width:100%; display:flex; justify-content:space-around; background:#111; border-top:1px solid #f5d061; padding:10px 0; }
    .tab-bar button { background:none; border:none; color:#f5d061; font-size:14px; cursor:pointer; display:flex; flex-direction:column; align-items:center; }
    .tab-bar img{width:24px; height:24px; margin-bottom:3px;}
    .tab-content{margin-bottom:100px; text-align:center;}
    #swipe-container, #liked-container { margin-bottom:10px; display:flex; flex-direction:column; align-items:center; }
    .profile-card { display:flex; align-items:center; justify-content:space-between; width:80%; background:#111; border:1px solid #f5d061; padding:10px; border-radius:8px; margin:5px 0; }
    .profile-info { display:flex; align-items:center; }
    .profile-info img { width:50px; height:50px; border-radius:50%; margin-right:10px; }
    .online-dot { width:12px; height:12px; border-radius:50%; background:#00FF00; margin-left:5px; }
    .chat-box { margin-top:10px; padding:10px; border:1px solid #f5d061; width:80%; border-radius:8px; }
    button{background:#f5d061; color:#1a1a1a; border:none; padding:8px 12px; margin:2px; border-radius:4px; cursor:pointer;}
    input[type=text], select, input[type=file]{padding:6px; width:70%; margin:5px 0; border-radius:4px; border:1px solid #f5d061; background:#111; color:#f5d061;}
  </style>
</head>
<body>

<h2>💘 Internal Match Dashboard</h2>

<div class="tab-content">

  <!-- Profile Tab -->
  <div id="profile-tab" style="display:none;">
    <h3>My Profile</h3>
    <img id="user-profile-pic" src="" alt="Profile" style="width:120px; height:120px; border-radius:50%; border:2px solid #f5d061;"><br>
    <p>Email: <span id="user-email"></span></p>
    <p>Username: <span id="user-username"></span></p>
    <p>Age: <span id="user-age"></span></p>
    <p>Location: <span id="user-location"></span></p>
    <p>Gender: <span id="user-gender"></span></p>
    <p>Interest: <span id="user-interest"></span></p>
    <p>Coins: <span id="user-coins"></span></p>
    <p>Premium: <span id="user-premium"></span></p>
    
    <h4>Edit Profile</h4>
    <input type="text" id="edit-username" placeholder="Username">
    <input type="number" id="edit-age" placeholder="Age">
    <input type="text" id="edit-location" placeholder="Location">
    <select id="edit-gender">
      <option value="">Gender</option>
      <option value="Male">Male</option>
      <option value="Female">Female</option>
      <option value="Other">Other</option>
    </select>
    <select id="edit-interest">
      <option value="">Interest</option>
      <option value="Hangout 🩵">Hangout 🩵</option>
      <option value="Friends 💚">Friends 💚</option>
      <option value="Serious Relationship 💖">Serious Relationship 💖</option>
      <option value="Marriage 💘">Marriage 💘</option>
    </select>
    <input type="file" id="edit-profile-pic" accept="image/*">
    <button onclick="saveProfileEdit()">Save Changes</button>
    <br><br>
    <button onclick="logout()">Logout</button>
  </div>

  <!-- People Profiles Tab -->
  <div id="people-tab" style="display:none;">
    <h3>People Profiles</h3>
    <div id="swipe-container"></div>
  </div>

  <!-- Chat Tab -->
  <div id="chats-tab" style="display:none;">
    <h3 id="chat-with-name"></h3>
    <img id="chat-with-pic" src="" style="width:80px; height:80px; border-radius:50%; border:2px solid #f5d061;"><br>
    <div id="chat-box" class="chat-box"></div>
  </div>

</div>

<!-- Bottom Tab Bar -->
<div class="tab-bar">
  <button onclick="showTab('profile')">
    <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="">Profile
  </button>
  <button onclick="showTab('people')">
    <img src="https://cdn-icons-png.flaticon.com/512/1077/1077114.png" alt="">People
  </button>
  <button onclick="showTab('chats')">
    <img src="https://cdn-icons-png.flaticon.com/512/2462/2462719.png" alt="">Chats
  </button>
</div>

<script>
  // Prevent zooming on mobile
  document.addEventListener('touchstart', e=>{ if(e.touches.length>1) e.preventDefault(); }, {passive:false});
  document.addEventListener('gesturestart', e=>e.preventDefault());

  const demoProfiles=[];
  const countries=["USA","UK","Nigeria","Brazil","India","Germany","France","Canada","Australia","Kenya","Ghana","South Africa"];
  const interests=["Hangout 🩵","Friends 💚","Serious Relationship 💖","Marriage 💘"];
  const maleNames=["John","James","Michael","Robert","William"];
  const femaleNames=["Mary","Patricia","Jennifer","Linda","Elizabeth"];

  // Generate 20,000 demo profiles
  for(let i=1;i<=20000;i++){
    const isMale=Math.random()<0.5;
    const name=isMale ? maleNames[Math.floor(Math.random()*maleNames.length)] : femaleNames[Math.floor(Math.random()*femaleNames.length)];
    demoProfiles.push({
      id:"demo"+i,
      username:name+i,
      age:18+Math.floor(Math.random()*40),
      location:countries[Math.floor(Math.random()*countries.length)],
      gender:isMale?"Male":"Female",
      interest:interests[Math.floor(Math.random()*interests.length)],
      profilePic:`https://randomuser.me/api/portraits/${isMale?"men":"women"}/${i%100}.jpg`,
      online:true
    });
  }

  // Tab switching
  function showTab(tab){
    document.getElementById('profile-tab').style.display='none';
    document.getElementById('people-tab').style.display='none';
    document.getElementById('chats-tab').style.display='none';
    document.getElementById(tab+'-tab').style.display='block';
  }

  let currentUser={id:"user1", username:"Solo", profilePic:"https://randomuser.me/api/portraits/men/1.jpg"};

  function logout(){ alert("Logged out"); }

  // Load demo profiles in People tab
  function loadPeople(){
    const container=document.getElementById('swipe-container');
    container.innerHTML='';
    demoProfiles.slice(0,100).forEach(profile=>{
      const card=document.createElement('div');
      card.className="profile-card";
      card.innerHTML=`
        <div class="profile-info">
          <img src="${profile.profilePic}">
          <div>
            <b>${profile.username}</b> (${profile.age})<br>${profile.location}<br>${profile.interest}
          </div>
          <div class="online-dot"></div>
        </div>
        <button onclick="openChatWith('${profile.username}','${profile.profilePic}')">💬</button>
      `;
      container.appendChild(card);
    });
  }

  function openChatWith(username,pic){
    showTab('chats');
    document.getElementById('chat-with-name').innerText=username;
    document.getElementById('chat-with-pic').src=pic;
    document.getElementById('chat-box').innerHTML="Chatting with "+username;
  }

  // Profile edit
  function saveProfileEdit(){
    alert("Profile saved!");
    document.getElementById('user-username').innerText=document.getElementById('edit-username').value;
    document.getElementById('user-age').innerText=document.getElementById('edit-age').value;
    document.getElementById('user-location').innerText=document.getElementById('edit-location').value;
    document.getElementById('user-gender').innerText=document.getElementById('edit-gender').value;
    document.getElementById('user-interest').innerText=document.getElementById('edit-interest').value;
    const fileInput=document.getElementById('edit-profile-pic');
    if(fileInput.files[0]){
      const reader=new FileReader();
      reader.onload=e=>{ document.getElementById('user-profile-pic').src=e.target.result; };
      reader.readAsDataURL(fileInput.files[0]);
    }
  }

  showTab('profile');
  loadPeople();
</script>

</body>
</html>
