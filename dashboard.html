
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💘 Internal Match Dashboard</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#1a1a1a;
  color:#f5d061;
  text-align:center;
}

.tab-content {
  padding:20px;
  padding-bottom:80px;
}

.tab-bar {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#111;
  border-top:1px solid #f5d061;
}

.tab-bar button {
  flex:1;
  background:none;
  border:none;
  color:#f5d061;
  padding:15px 5px;
  font-weight:bold;
  cursor:pointer;
}

.card {
  background:#222;
  border:1px solid #f5d061;
  border-radius:12px;
  padding:15px;
  margin:15px auto;
  width:90%;
  max-width:350px;
}

.card img {
  width:140px;
  height:140px;
  border-radius:50%;
  border:2px solid #f5d061;
}

button.action {
  margin:5px;
  padding:8px 15px;
  border:none;
  border-radius:6px;
  font-weight:bold;
  cursor:pointer;
}

.like { background:#f5d061; color:#1a1a1a; }
.ignore { background:#444; color:white; }
</style>
</head>
<body>

<h2>💘 Internal Match</h2>

<div class="tab-content">

  <!-- PROFILE -->
  <div id="profileTab">
    <h3>My Profile</h3>
    <img id="myPic">
    <p id="myInfo"></p>
    <button onclick="logout()" class="action ignore">Logout</button>
  </div>

  <!-- PEOPLE -->
  <div id="peopleTab" style="display:none;">
    <div id="peopleContainer">Loading...</div>
  </div>

  <!-- LIKES -->
  <div id="likesTab" style="display:none;">
    <h3>People Who Liked You</h3>
    <div id="likesContainer">Loading...</div>
  </div>

</div>

<div class="tab-bar">
  <button onclick="showTab('profileTab')">Profile</button>
  <button onclick="showTab('peopleTab')">People</button>
  <button onclick="showTab('likesTab')">Likes</button>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDIZnZjeCROX5UmcqUQIfTdt6oRU6AmvOg",
  authDomain: "internal-match.firebaseapp.com",
  projectId: "internal-match",
  storageBucket: "internal-match.firebasestorage.app",
  messagingSenderId: "129707008837",
  appId: "1:129707008837:web:f3f0033bbbe673107a542c"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let currentUser = null;
let currentProfile = null;

function showTab(tab){
  profileTab.style.display="none";
  peopleTab.style.display="none";
  likesTab.style.display="none";
  document.getElementById(tab).style.display="block";
}

auth.onAuthStateChanged(user=>{
  if(!user){
    window.location.href="profile_setup.html";
  } else {
    currentUser = user;
    loadMyProfile();
    loadPeople();
    loadLikes();
  }
});

function loadMyProfile(){
  db.collection("users").doc(currentUser.uid).get()
  .then(doc=>{
    if(doc.exists){
      currentProfile = doc.data();
      myPic.src = currentProfile.pic;
      myInfo.innerHTML = `
        <b>${currentProfile.username}</b><br>
        Age: ${currentProfile.age}<br>
        ${currentProfile.location}<br>
        ${currentProfile.interest}
      `;
    }
  });
}

function loadPeople(){
  peopleContainer.innerHTML="";
  db.collection("users").get().then(snapshot=>{
    snapshot.forEach(doc=>{
      if(doc.id !== currentUser.uid){
        const p = doc.data();
        peopleContainer.innerHTML += `
          <div class="card">
            <img src="${p.pic}">
            <h3>${p.username}, ${p.age}</h3>
            <p>${p.location}</p>
            <button class="action like" onclick="likeUser('${doc.id}')">💖 Like</button>
          </div>
        `;
      }
    });
  });
}

function likeUser(userId){
  db.collection("likes").add({
    from: currentUser.uid,
    to: userId,
    timestamp: firebase.firestore.FieldValue.serverTimestamp()
  }).then(()=>alert("Liked!"));
}

function loadLikes(){
  likesContainer.innerHTML="";
  db.collection("likes")
  .where("to","==",currentUser.uid)
  .get()
  .then(snapshot=>{
    if(snapshot.empty){
      likesContainer.innerHTML="No likes yet.";
    }
    snapshot.forEach(doc=>{
      db.collection("users").doc(doc.data().from).get()
      .then(userDoc=>{
        const u = userDoc.data();
        likesContainer.innerHTML += `
          <div class="card">
            <img src="${u.pic}">
            <h3>${u.username}</h3>
          </div>
        `;
      });
    });
  });
}

function logout(){
  auth.signOut().then(()=>{
    window.location.href="profile_setup.html";
  });
}
</script>

</body>
</html>
