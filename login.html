<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>💘 Internal Match - Login</title>
  <style>
    body { font-family: Arial, sans-serif; background: #111; color: white; text-align: center; }
    .card { background: #1c1c1c; padding: 20px; border-radius: 10px; margin: 20px; max-width: 400px; }
    input, button { padding: 10px; margin: 10px; width: 90%; border-radius: 5px; }
    button { background-color: gold; }
  </style>
</head>
<body>

  <div class="card">
    <h2>💘 Internal Match - Login</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button id="loginBtn">Login</button>
    <p>Don't have an account? <a href="signup.html">Sign Up</a></p>
    <div id="errorMsg"></div>
  </div>

  <!-- Firebase SDK (Modular) -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

    // Your Firebase configuration
    const firebaseConfig = {
      apiKey: "AIzaSyDIZnZjeCROX5UmcqUQIfTdt6oRU6AmvOg",
      authDomain: "internal-match.firebaseapp.com",
      projectId: "internal-match",
      storageBucket: "internal-match.firebasestorage.app",
      messagingSenderId: "129707008837",
      appId: "1:129707008837:web:f3f0033bbbe673107a542c"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Redirect to dashboard if already logged in
    onAuthStateChanged(auth, (user) => {
      if (user) {
        window.location = "dashboard.html";  // Redirect to dashboard if logged in
      }
    });

    // Handle login button click
    document.getElementById('loginBtn').addEventListener('click', function() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();

      if (!email || !password) {
        alert("Please enter both email and password.");
        return;
      }

      signInWithEmailAndPassword(auth, email, password)
        .then((userCredential) => {
          window.location = "dashboard.html";  // Redirect to dashboard after successful login
        })
        .catch((error) => {
          console.error("Login failed:", error.message);
          alert("Login failed. Error: " + error.message);  // Show specific error message
        });
    });
  </script>

</body>
</html>
