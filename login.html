<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>💘 Internal Match - Login</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
    }
    .card {
      background: #1c1c1c;
      padding: 20px;
      border-radius: 20px;
      margin: 20px auto;
      width: 90%;
      max-width: 400px;
    }
    input {
      width: 90%;
      padding: 10px;
      margin: 5px;
      border-radius: 10px;
      border: none;
    }
    button {
      background: gold;
      border: none;
      padding: 10px 20px;
      border-radius: 20px;
      margin-top: 10px;
      font-weight: bold;
      cursor: pointer;
      width: 95%;
    }
    a {
      color: gold;
      display: block;
      margin-top: 10px;
      text-decoration: none;
    }
    #errorMsg {
      color: #ff4c4c;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <div class="card">
    <h2>💘 Internal Match - Login</h2>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>
    <a href="#" onclick="forgotPassword()">Forgot Password?</a>
    <p>Don't have an account? <a href="signup.html">Sign Up</a></p>

    <div id="errorMsg"></div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

  <script>
    // --- Firebase Config ---
    const firebaseConfig = {
      apiKey: "AIzaSyDIZnZjeCROX5UmcqUQIfTdt6oRU6AmvOg",
      authDomain: "internal-match.firebaseapp.com",
      projectId: "internal-match",
      storageBucket: "internal-match.appspot.com",
      messagingSenderId: "129707008837",
      appId: "1:129707008837:web:f3f0033bbbe673107a542c"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // --- Elements ---
    const errorMsg = document.getElementById('errorMsg');

    // --- Ensure session persists across reloads ---
    firebase.auth().setPersistence(firebase.auth.Auth.Persistence.LOCAL)
      .then(() => {
        // Check if the user is logged in
        firebase.auth().onAuthStateChanged(user => {
          console.log("Auth State Changed:", user);
          if (user) {
            // If logged in, redirect to dashboard
            window.location = "dashboard.html";
          }
        });
      })
      .catch(error => {
        console.log("Persistence failed:", error);
      });

    // --- Login Function ---
    function login() {
      errorMsg.innerText = "";
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        errorMsg.innerText = "Please enter email and password!";
        return;
      }

      auth.signInWithEmailAndPassword(email, password)
        .then(userCredential => {
          // Successful login: redirect silently
          window.location = "dashboard.html";
        })
        .catch(error => {
          // Friendly error messages
          if (error.code === "auth/wrong-password") {
            errorMsg.innerText = "Wrong password, try again!";
          } else if (error.code === "auth/user-not-found") {
            errorMsg.innerText = "User not found!";
          } else if (error.code === "auth/invalid-email") {
            errorMsg.innerText = "Invalid email address!";
          } else {
            errorMsg.innerText = "Login failed, try again!";
          }
        });
    }

    // --- Forgot Password ---
    function forgotPassword() {
      const email = prompt("Enter your email to reset password:");
      if (!email) return;
      auth.sendPasswordResetEmail(email)
        .then(() => {
          alert("Password reset email sent! Check your inbox.");
        })
        .catch(error => {
          alert("Failed to send reset email: " + error.message);
        });
    }
  </script>
</body>
</html>
