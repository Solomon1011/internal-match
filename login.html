<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>💘 Internal Match - Login</title>
  <style>
    /* Your existing CSS */
  </style>
</head>
<body>

  <div class="card">
    <h2>💘 Internal Match - Login</h2>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>
    <a href="#" onclick="forgotPassword()">Forgot Password?</a>
    <p>Don't have an account? <a href="signup.html">Sign Up</a></p>

    <div id="errorMsg"></div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

  <script>
    // --- Firebase Config ---
    const firebaseConfig = {
      apiKey: "AIzaSyDIZnZjeCROX5UmcqUQIfTdt6oRU6AmvOg",
      authDomain: "internal-match.firebaseapp.com",
      projectId: "internal-match",
      storageBucket: "internal-match.appspot.com",
      messagingSenderId: "129707008837",
      appId: "1:129707008837:web:f3f0033bbbe673107a542c"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // --- Elements ---
    const errorMsg = document.getElementById('errorMsg');

    // --- Check if the user is already logged in on page load ---
    firebase.auth().onAuthStateChanged(user => {
      if (user) {
        // Redirect to dashboard if user is already logged in
        window.location = "dashboard.html";
      }
    });

    // --- Login Function ---
    function login() {
      errorMsg.innerText = "";
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        errorMsg.innerText = "Please enter email and password!";
        return;
      }

      auth.signInWithEmailAndPassword(email, password)
        .then(userCredential => {
          // Successful login: redirect to dashboard
          window.location = "dashboard.html";
        })
        .catch(error => {
          // Handle errors
          if (error.code === "auth/wrong-password") {
            errorMsg.innerText = "Wrong password, try again!";
          } else if (error.code === "auth/user-not-found") {
            errorMsg.innerText = "User not found!";
          } else if (error.code === "auth/invalid-email") {
            errorMsg.innerText = "Invalid email address!";
          } else {
            errorMsg.innerText = "Login failed, try again!";
          }
        });
    }

    // --- Forgot Password Function ---
    function forgotPassword() {
      const email = prompt("Enter your email to reset password:");
      if (!email) return;
      auth.sendPasswordResetEmail(email)
        .then(() => {
          alert("Password reset email sent! Check your inbox.");
        })
        .catch(error => {
          alert("Failed to send reset email: " + error.message);
        });
    }
  </script>
</body>
</html>
