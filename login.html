<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Login - Internal Match</title>
<style>
body {margin:0;font-family:Arial;background:#111;color:white;display:flex;justify-content:center;align-items:center;height:100vh;}
.card {background:#1c1c1c;padding:30px;border-radius:20px;width:90%;max-width:400px;text-align:center;}
input {width:90%;padding:12px;margin:10px 0;border-radius:10px;border:none;font-size:16px;}
button {background:gold;border:none;padding:12px 25px;border-radius:20px;font-weight:bold;cursor:pointer;margin:5px;font-size:16px;}
a {color:gold;cursor:pointer;text-decoration:underline;}
</style>
</head>
<body>

<div class="card">
  <h2>💘 Internal Match</h2>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">
  <button onclick="login()">Login</button>
  <p><a onclick="forgotPassword()">Forgot Password?</a></p>
  <p>Don't have an account? <a href="signup.html">Sign Up</a></p>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// --- Firebase Config ---
const firebaseConfig = {
  apiKey: "AIzaSyDIZnZjeCROX5UmcqUQIfTdt6oRU6AmvOg",
  authDomain: "internal-match.firebaseapp.com",
  projectId: "internal-match",
  storageBucket: "internal-match.appspot.com",
  messagingSenderId: "129707008837",
  appId: "1:129707008837:web:f3f0033bbbe673107a542c"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

// --- Login Function ---
function login(){
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  if(!email || !password){ alert("Fill all fields"); return; }
  auth.signInWithEmailAndPassword(email,password)
    .then(()=> { window.location.href="dashboard.html"; })
    .catch(err=> alert(err.message));
}

// --- Forgot Password ---
function forgotPassword(){
  const email = prompt("Enter your email to reset password:");
  if(!email) return;
  auth.sendPasswordResetEmail(email)
    .then(()=> alert("Password reset email sent! Check your inbox."))
    .catch(err=> alert(err.message));
}
</script>
</body>
</html>
