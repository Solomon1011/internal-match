<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>💘 Internal Match - Login</title>
  <style>
    /* Your existing CSS styling */
  </style>
</head>
<body>

  <div class="card">
    <h2>💘 Internal Match - Login</h2>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>
    <a href="#" onclick="forgotPassword()">Forgot Password?</a>
    <p>Don't have an account? <a href="signup.html">Sign Up</a></p>

    <div id="errorMsg"></div>
  </div>

  <!-- Firebase v9 SDK (Modular) -->
  <script type="module">
    // Import the necessary Firebase SDK modules
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

    // Firebase configuration
    const firebaseConfig = {
      apiKey: "AIzaSyDIZnZjeCROX5UmcqUQIfTdt6oRU6AmvOg", 
      authDomain: "internal-match.firebaseapp.com", 
      projectId: "internal-match",
      storageBucket: "internal-match.appspot.com", 
      messagingSenderId: "129707008837", 
      appId: "1:129707008837:web:f3f0033bbbe673107a542c"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Check if the user is already logged in (redirect if logged in)
    onAuthStateChanged(auth, (user) => {
      if (user) {
        // If the user is logged in, redirect them to the dashboard
        window.location = "dashboard.html";
      }
    });

    // Login function
    function login() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        alert("Please enter both email and password.");
        return;
      }

      signInWithEmailAndPassword(auth, email, password)
        .then((userCredential) => {
          window.location = "dashboard.html";  // Redirect to dashboard after successful login
        })
        .catch((error) => {
          console.error("Login failed: ", error.message);
          alert("Login failed. Please try again.");
        });
    }
  </script>

</body>
</html>
