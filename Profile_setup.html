<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💘 Internal Match</title>

<style>
body {
  background:#1a1a1a;
  color:#f5d061;
  font-family:Arial;
  text-align:center;
  padding:20px;
}

input, select, button {
  display:block;
  margin:10px auto;
  padding:10px;
  width:85%;
  border-radius:6px;
  border:1px solid #f5d061;
  background:#111;
  color:#f5d061;
}

button {
  background:#f5d061;
  color:#1a1a1a;
  font-weight:bold;
  cursor:pointer;
}

img {
  width:120px;
  height:120px;
  border-radius:50%;
  border:2px solid #f5d061;
  margin:10px 0;
}

p { cursor:pointer; text-decoration:underline; }
</style>
</head>
<body>

<h2>💘 Internal Match</h2>

<!-- LOGIN -->
<div id="loginDiv">
  <h3>Login</h3>
  <input type="email" id="loginEmail" placeholder="Email">
  <input type="password" id="loginPass" placeholder="Password">
  <button onclick="login()">Login</button>
  <p onclick="showSignup()">Create account</p>
</div>

<!-- SIGNUP -->
<div id="signupDiv" style="display:none;">
  <h3>Sign Up</h3>
  <input type="email" id="signEmail" placeholder="Email">
  <input type="password" id="signPass" placeholder="Password">
  <button onclick="signup()">Sign Up</button>
  <p onclick="showLogin()">Already have account?</p>
</div>

<!-- PROFILE SETUP -->
<div id="profileDiv" style="display:none;">
  <h3>Set Up Profile</h3>

  <img id="profile-preview" src="https://randomuser.me/api/portraits/lego/1.jpg">

  <input type="text" id="username" placeholder="Username">
  <input type="number" id="age" placeholder="Age">
  <input type="text" id="location" placeholder="Location">

  <select id="gender">
    <option value="">Select Gender</option>
    <option>Male</option>
    <option>Female</option>
  </select>

  <select id="interest">
    <option value="">Select Interest</option>
    <option>Hangout 🩵</option>
    <option>Friends 💚</option>
    <option>Serious Relationship 💖</option>
    <option>Marriage 💘</option>
  </select>

  <input type="file" id="profile-pic" accept="image/*">

  <button onclick="saveProfile()">Save Profile</button>
</div>

<!-- FIREBASE COMPAT VERSION -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDIZnZjeCROX5UmcqUQIfTdt6oRU6AmvOg",
  authDomain: "internal-match.firebaseapp.com",
  projectId: "internal-match",
  storageBucket: "internal-match.firebasestorage.app",
  messagingSenderId: "129707008837",
  appId: "1:129707008837:web:f3f0033bbbe673107a542c"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

// SWITCH PAGES
function showSignup(){
  loginDiv.style.display="none";
  signupDiv.style.display="block";
}

function showLogin(){
  signupDiv.style.display="none";
  loginDiv.style.display="block";
}

// SIGNUP
function signup(){
  const email = signEmail.value;
  const pass = signPass.value;

  auth.createUserWithEmailAndPassword(email, pass)
  .then(() => {
    alert("Account Created!");
    showProfile();
  })
  .catch(err => alert(err.message));
}

// LOGIN
function login(){
  const email = loginEmail.value;
  const pass = loginPass.value;

  auth.signInWithEmailAndPassword(email, pass)
  .then(() => {
    alert("Login Successful!");
    showProfile();
  })
  .catch(err => alert(err.message));
}

// SHOW PROFILE SETUP
function showProfile(){
  loginDiv.style.display="none";
  signupDiv.style.display="none";
  profileDiv.style.display="block";
}

// IMAGE PREVIEW
profilePic = document.getElementById("profile-pic");
profilePic.addEventListener("change", function(e){
  const file = e.target.files[0];
  if(file){
    const reader = new FileReader();
    reader.onload = function(ev){
      document.getElementById("profile-preview").src = ev.target.result;
    }
    reader.readAsDataURL(file);
  }
});

// SAVE PROFILE
function saveProfile(){
  const user = auth.currentUser;
  if(!user){ alert("Login first"); return; }

  const profile = {
    username: username.value,
    age: age.value,
    location: location.value,
    gender: gender.value,
    interest: interest.value,
    pic: document.getElementById("profile-preview").src
  };

  if(!profile.username || !profile.age || !profile.location || !profile.gender || !profile.interest){
    alert("Fill all fields");
    return;
  }

  db.collection("users").doc(user.uid).set(profile)
  .then(() => {
    alert("Profile Saved!");
    window.location.href = "dashboard.html";
  })
  .catch(err => alert(err.message));
}

// AUTO LOGIN CHECK
auth.onAuthStateChanged(user=>{
  if(user){
    showProfile();
  }
});
</script>

</body>
</html>
