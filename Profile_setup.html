<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💘 Internal Match</title>

<style>
body {
  background:#111;
  color:#f5d061;
  font-family:Arial;
  text-align:center;
  padding-top:60px;
}
input {
  display:block;
  margin:10px auto;
  padding:12px;
  width:80%;
  border-radius:6px;
  border:1px solid #f5d061;
  background:#222;
  color:#f5d061;
}
button {
  display:block;
  margin:10px auto;
  padding:12px;
  width:85%;
  border-radius:6px;
  border:none;
  background:#f5d061;
  color:#111;
  font-weight:bold;
  font-size:16px;
}
#msg {
  color:red;
  margin-top:10px;
}
</style>
</head>

<body>

<h2>💘 Internal Match</h2>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>
<button onclick="signup()">Create Account</button>

<p id="msg"></p>

<!-- Firebase OLD CDN (works everywhere) -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
var firebaseConfig = {
  apiKey: "AIzaSyDIZnZjeCROX5UmcqUQIfTdt6oRU6AmvOg",
  authDomain: "internal-match.firebaseapp.com",
  projectId: "internal-match",
  storageBucket: "internal-match.appspot.com",
  messagingSenderId: "129707008837",
  appId: "1:129707008837:web:f3f0033bbbe673107a542c"
};

firebase.initializeApp(firebaseConfig);
var auth = firebase.auth();
var db = firebase.firestore();

function login() {
  var email = document.getElementById("email").value;
  var password = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email, password)
  .then(function() {
      window.location.href = "dashboard.html";
  })
  .catch(function(error) {
      document.getElementById("msg").innerHTML = error.message;
  });
}

function signup() {
  var email = document.getElementById("email").value;
  var password = document.getElementById("password").value;

  auth.createUserWithEmailAndPassword(email, password)
  .then(function(user) {

      db.collection("users").doc(user.user.uid).set({
        username:"",
        age:"",
        location:"",
        gender:"Male",
        interest:"",
        pic:""
      });

      window.location.href = "dashboard.html";
  })
  .catch(function(error) {
      document.getElementById("msg").innerHTML = error.message;
  });
}
</script>

</body>
</html>
