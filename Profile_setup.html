
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💘 Internal Match - Login/Signup</title>
<style>
body {
  background: #111;
  color: #f5d061;
  font-family: Arial, sans-serif;
  text-align: center;
  padding: 50px 20px;
}
h1 {
  margin-bottom: 40px;
}
input {
  padding: 12px;
  margin: 10px 0;
  width: 90%;
  border-radius: 6px;
  border: 1px solid #f5d061;
  background: #222;
  color: #f5d061;
  font-size: 16px;
}
button {
  padding: 12px 25px;
  margin: 10px 5px;
  border-radius: 6px;
  border: none;
  background: #f5d061;
  color: #111;
  font-weight: bold;
  cursor: pointer;
  font-size: 16px;
}
button:hover {
  opacity: 0.9;
}
#error-msg {
  color: #ff5555;
  margin-top: 15px;
  font-size: 14px;
}
</style>
</head>
<body>

<h1>💘 Internal Match</h1>

<div id="auth-container">
  <input type="email" id="email" placeholder="Email" required><br>
  <input type="password" id="password" placeholder="Password" required><br>
  <button id="login-btn">Login</button>
  <button id="signup-btn">Create Account</button>
  <p id="error-msg"></p>
</div>

<!-- Firebase Modular SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";
  import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDIZnZjeCROX5UmcqUQIfTdt6oRU6AmvOg",
    authDomain: "internal-match.firebaseapp.com",
    projectId: "internal-match",
    storageBucket: "internal-match.appspot.com",
    messagingSenderId: "129707008837",
    appId: "1:129707008837:web:f3f0033bbbe673107a542c"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  const emailInput = document.getElementById("email");
  const passInput = document.getElementById("password");
  const errorMsg = document.getElementById("error-msg");

  // LOGIN
  document.getElementById("login-btn").addEventListener("click", async () => {
    const email = emailInput.value.trim();
    const password = passInput.value.trim();
    errorMsg.innerText = "";

    if (!email || !password) {
      errorMsg.innerText = "Email and password required!";
      return;
    }

    try {
      await signInWithEmailAndPassword(auth, email, password);
      window.location.href = "dashboard.html";
    } catch (err) {
      errorMsg.innerText = err.message;
    }
  });

  // SIGNUP
  document.getElementById("signup-btn").addEventListener("click", async () => {
    const email = emailInput.value.trim();
    const password = passInput.value.trim();
    errorMsg.innerText = "";

    if (!email || !password) {
      errorMsg.innerText = "Email and password required!";
      return;
    }

    if (password.length < 6) {
      errorMsg.innerText = "Password must be at least 6 characters!";
      return;
    }

    try {
      const userCredential = await createUserWithEmailAndPassword(auth, email, password);
      await setDoc(doc(db, "users", userCredential.user.uid), {
        username: "",
        age: "",
        location: "",
        gender: "Male",
        interest: "",
        pic: ""
      });
      window.location.href = "dashboard.html";
    } catch (err) {
      errorMsg.innerText = err.message;
    }
  });
</script>

</body>
</html>
