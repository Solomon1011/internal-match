<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💘 Internal Match - Profile Setup</title>
<link rel="stylesheet" href="style.css">
<style>
body {
    background-color: #1a1a1a;
    color: #f5d061;
    font-family: Arial, sans-serif;
    padding: 20px;
    text-align: center;
}

h2 {
    margin-bottom: 20px;
}

input, select, button {
    display: block;
    margin: 10px auto;
    padding: 10px;
    width: 80%;
    border-radius: 6px;
    border: 1px solid #f5d061;
    background: #111;
    color: #f5d061;
    font-size: 16px;
}

button {
    background: #f5d061;
    color: #1a1a1a;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    background: #e0c850;
}

img {
    max-width: 120px;
    border-radius: 50%;
    margin: 10px 0;
    border: 2px solid #f5d061;
}
</style>
</head>
<body>

<h2>💘 Internal Match - Set Up Your Profile</h2>

<img id="profile-preview" src="https://randomuser.me/api/portraits/lego/1.jpg" alt="Profile Picture">

<input type="text" id="username" placeholder="Username">
<input type="number" id="age" placeholder="Age">
<input type="text" id="location" placeholder="Location">

<select id="gender">
    <option value="">Select Gender</option>
    <option value="Male">Male</option>
    <option value="Female">Female</option>
</select>

<select id="interest">
    <option value="">Select Your Interest</option>
    <option value="Hangout 🩵">Hangout 🩵</option>
    <option value="Friends 💚">Friends 💚</option>
    <option value="Serious Relationship 💖">Serious Relationship 💖</option>
    <option value="Marriage 💘">Marriage 💘</option>
</select>

<label for="profile-pic" style="cursor:pointer;">📷 Upload Profile Picture</label>
<input type="file" id="profile-pic" accept="image/*" style="display:none;">

<button onclick="saveProfile()">Save Profile</button>

<script>
// Preview uploaded image
document.getElementById('profile-pic').addEventListener('change', function(e){
    const file = e.target.files[0];
    if(file){
        const reader = new FileReader();
        reader.onload = function(ev){
            document.getElementById('profile-preview').src = ev.target.result;
        }
        reader.readAsDataURL(file);
    }
});

// Save profile locally
function saveProfile(){
    const profile = {
        username: document.getElementById('username').value.trim(),
        age: document.getElementById('age').value.trim(),
        location: document.getElementById('location').value.trim(),
        gender: document.getElementById('gender').value,
        interest: document.getElementById('interest').value,
        pic: document.getElementById('profile-preview').src
    };

    if(!profile.username || !profile.age || !profile.location || !profile.gender || !profile.interest){
        alert("Please fill in all fields!");
        return;
    }

    // Save to localStorage
    localStorage.setItem('userProfile', JSON.stringify(profile));
    alert("Profile saved successfully!");
    window.location.href = "dashboard.html"; // Redirect to dashboard
}

// Load saved profile if exists
window.onload = function(){
    const saved = localStorage.getItem('userProfile');
    if(saved){
        const profile = JSON.parse(saved);
        document.getElementById('username').value = profile.username;
        document.getElementById('age').value = profile.age;
        document.getElementById('location').value = profile.location;
        document.getElementById('gender').value = profile.gender;
        document.getElementById('interest').value = profile.interest;
        document.getElementById('profile-preview').src = profile.pic;
    }
}
</script>

</body>
</html>
