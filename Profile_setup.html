<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💘 Internal Match - Login/Signup</title>
<style>
  body {
    background: #111;
    color: #f5d061;
    font-family: Arial, sans-serif;
    text-align: center;
    padding: 50px;
  }
  input {
    padding: 10px;
    margin: 8px 0;
    width: 90%;
    border-radius: 6px;
    border: 1px solid #f5d061;
    background: #222;
    color: #f5d061;
  }
  button {
    padding: 10px 20px;
    margin: 10px;
    border-radius: 6px;
    border: none;
    background: #f5d061;
    color: #111;
    font-weight: bold;
    cursor: pointer;
  }
  #error-msg {
    color: #ff5555;
    margin-top: 10px;
  }
</style>
</head>
<body>

<h1>💘 Internal Match</h1>

<div id="auth-container">
  <input type="email" id="email" placeholder="Email" required><br>
  <input type="password" id="password" placeholder="Password" required><br>
  <button id="login-btn">Login</button>
  <button id="signup-btn">Create Account</button>
  <p id="error-msg"></p>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

<script>
  // ---------------------------
  // 🔹 Firebase Config
  // ---------------------------
  const firebaseConfig = {
    apiKey: "AIzaSyDIZnZjeCROX5UmcqUQIfTdt6oRU6AmvOg",
    authDomain: "internal-match.firebaseapp.com",
    projectId: "internal-match",
    storageBucket: "internal-match.appspot.com",
    messagingSenderId: "129707008837",
    appId: "1:129707008837:web:f3f0033bbbe673107a542c"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  // ---------------------------
  // 🔹 LOGIN
  // ---------------------------
  document.getElementById("login-btn").addEventListener("click", () => {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();

    if (!email || !password) {
      document.getElementById("error-msg").innerText = "Email and password required!";
      return;
    }

    auth.signInWithEmailAndPassword(email, password)
      .then(() => {
        window.location.href = "dashboard.html";
      })
      .catch((error) => {
        document.getElementById("error-msg").innerText = error.message;
      });
  });

  // ---------------------------
  // 🔹 SIGNUP
  // ---------------------------
  document.getElementById("signup-btn").addEventListener("click", () => {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();

    if (!email || !password) {
      document.getElementById("error-msg").innerText = "Email and password required!";
      return;
    }

    if (password.length < 6) {
      document.getElementById("error-msg").innerText = "Password must be at least 6 characters!";
      return;
    }

    auth.createUserWithEmailAndPassword(email, password)
      .then(userCredential => {
        // Create user profile in Firestore
        db.collection("users").doc(userCredential.user.uid).set({
          username: "",
          age: "",
          location: "",
          gender: "Male",
          interest: "",
          pic: ""
        });
        window.location.href = "dashboard.html";
      })
      .catch(error => {
        document.getElementById("error-msg").innerText = error.message;
      });
  });
</script>
</body>
</html>
